# AIDA — nginx reverse proxy + TLS termination
#
# Domains:
#   seer.${DOMAIN}      → Verdandi (Seiðr Studio)   :15173
#   heimdall.${DOMAIN}  → Heimdallr (admin UI)       :25174
#   ${DOMAIN} / www     → redirect to seer.${DOMAIN}
#
# Shared Chur BFF  :13000  — auth, graphql, api, prefs, heimdall API
# Keycloak         :18180   (/kc)
# Dali             :19090   (/dali/, seer only)
#
# TLS: single SAN cert at /etc/letsencrypt/live/${DOMAIN}/ covering all subdomains.
# Issued via: certbot certonly --standalone -d ${DOMAIN} -d seer.${DOMAIN} -d heimdall.${DOMAIN}
# All server blocks share the same cert file (SAN covers all three domains).
# Inline TLS settings replace the certbot options-ssl-nginx.conf include.

# ── Shared TLS params (reused across all HTTPS vhosts) ────────────────────────
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1440m;
ssl_session_tickets off;
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

# ── HTTP → HTTPS redirect (all vhosts) ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN} www.${DOMAIN} seer.${DOMAIN} heimdall.${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Root domain + www → redirect to seer.${DOMAIN} ───────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DOMAIN} www.${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    return 301 https://seer.${DOMAIN}$request_uri;
}

# ── seer.${DOMAIN} — Verdandi (Seiðr Studio) ──────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name seer.${DOMAIN};

    # SAN cert issued for all three domains — same file used in all vhosts
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header X-Frame-Options           SAMEORIGIN                                      always;
    add_header Referrer-Policy           strict-origin-when-cross-origin                 always;

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Keycloak ──────────────────────────────────────────────────────────────
    location /kc/ {
        proxy_pass         http://127.0.0.1:18180/kc/;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ── Chur BFF ──────────────────────────────────────────────────────────────
    location /auth {
        proxy_pass http://127.0.0.1:13000;
    }

    location /graphql {
        proxy_pass         http://127.0.0.1:13000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 1h;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:13000;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1h;
    }

    location /prefs {
        proxy_pass http://127.0.0.1:13000;
    }

    # ── Dali ──────────────────────────────────────────────────────────────────
    location /dali/ {
        proxy_pass           http://127.0.0.1:19090/;
        client_max_body_size 200M;
        proxy_read_timeout   300s;
    }

    # ── Verdandi SPA (catch-all) ──────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:15173;
        proxy_intercept_errors on;
        error_page 404 = @verdandi_fallback;
    }

    location @verdandi_fallback {
        rewrite ^ /index.html break;
        proxy_pass http://127.0.0.1:15173;
    }
}

# ── heimdall.${DOMAIN} — Heimdallr (admin UI) ─────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name heimdall.${DOMAIN};

    # SAN cert issued for all three domains — same file used in all vhosts
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    # ── IP whitelist — HEIMDALL_CIDR substituted by CD pipeline (GitHub Secret) ──
    # Set HEIMDALL_CIDR secret in GitHub repo settings (e.g. 203.0.113.0/24).
    allow ${HEIMDALL_CIDR};
    allow 127.0.0.1;
    deny all;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header X-Frame-Options           SAMEORIGIN                                      always;
    add_header Referrer-Policy           strict-origin-when-cross-origin                 always;

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Auth (login/logout/me/callback) ───────────────────────────────────────
    location /auth {
        proxy_pass http://127.0.0.1:13000;
    }

    # ── Heimdall API → Chur → heimdall-backend ────────────────────────────────
    location ~ ^/(health|metrics|control|users|services) {
        proxy_pass         http://127.0.0.1:13000/heimdall$request_uri;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 60s;
    }

    # ── Docs + Team-docs → Chur → heimdall-backend ────────────────────────────
    location ~ ^/(docs|team-docs)(/|$) {
        proxy_pass         http://127.0.0.1:13000/heimdall$request_uri;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 30s;
    }

    location /prefs {
        proxy_pass http://127.0.0.1:13000;
    }

    # ── Chur admin API (/chur/* → strip prefix → Chur) ───────────────────────
    # Frontend uses BASE='/chur/api/admin' for tenant/user management routes.
    location /chur/ {
        proxy_pass         http://127.0.0.1:13000/;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 60s;
    }

    # ── Heimdall WebSocket ────────────────────────────────────────────────────
    # api.ts hardcodes wss://heimdall.*/heimdall/ws/events at runtime
    location ^~ /heimdall/ws/ {
        proxy_pass         http://127.0.0.1:13000/heimdall/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 1h;
    }

    # ── Heimdall frontend SPA (catch-all) ─────────────────────────────────────
    # CORS: shell (seer.*) loads remoteEntry.js and chunks cross-origin from here
    location / {
        add_header Access-Control-Allow-Origin  "https://seer.${DOMAIN}" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS"            always;
        add_header Access-Control-Allow-Headers "Content-Type"            always;
        proxy_pass http://127.0.0.1:25174/;
        proxy_intercept_errors on;
        error_page 404 = @heimdall_fallback;
    }

    location @heimdall_fallback {
        add_header Access-Control-Allow-Origin "https://seer.${DOMAIN}" always;
        rewrite ^ /index.html break;
        proxy_pass http://127.0.0.1:25174;
    }
}
