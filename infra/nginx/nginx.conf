# AIDA — nginx reverse proxy + TLS termination
# Managed by certbot; TLS blocks auto-generated on first certbot run.
#
# Services behind this proxy:
#   Verdandi UI       → localhost:15173
#   Chur BFF          → localhost:13000  (/auth, /graphql, /api)
#   Keycloak          → localhost:18180  (/kc)
#   HEIMDALL frontend → localhost:25174  (/heimdall) — IP-restricted

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    # certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DOMAIN};

    # TLS — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header X-Frame-Options           SAMEORIGIN                                      always;
    add_header Referrer-Policy           strict-origin-when-cross-origin                 always;

    # Proxy timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Common proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Keycloak (/kc) ──────────────────────────────────────────────────────
    location /kc/ {
        proxy_pass         http://127.0.0.1:18180/kc/;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
        # Keycloak OIDC discovery needs larger headers
        proxy_busy_buffers_size 256k;
    }

    # ── Chur BFF — auth endpoints ───────────────────────────────────────────
    location /auth {
        proxy_pass http://127.0.0.1:13000;
    }

    # ── Chur BFF — GraphQL ──────────────────────────────────────────────────
    location /graphql {
        proxy_pass http://127.0.0.1:13000;

        # WebSocket upgrade for GraphQL subscriptions
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Chur BFF — REST API ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:13000;
    }

    # ── HEIMDALL admin UI — IP-restricted ───────────────────────────────────
    # Replace OFFICE_CIDR with your office IP range before deploy
    location /heimdall {
        # allow  <OFFICE_CIDR>;      # e.g. 203.0.113.0/24
        # deny   all;
        proxy_pass http://127.0.0.1:25174;
    }

    # ── Verdandi main UI (catch-all) ─────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:15173;

        # SPA history-mode fallback
        proxy_intercept_errors on;
        error_page 404 = @verdandi_fallback;
    }

    location @verdandi_fallback {
        proxy_pass http://127.0.0.1:15173/index.html;
    }
}
