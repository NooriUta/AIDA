# AIDA — local Docker HTTPS (self-signed cert, nginx container)
#
# Services (Docker network aida_net):
#   Verdandi SPA         → verdandi:5173
#   Heimdall frontend    → heimdall-frontend:5174
#   Chur BFF             → chur:3000  (/auth /api /graphql /prefs /heimdall/*)
#   Keycloak admin       → keycloak:8180  (/kc/)
#   Dali parse service   → dali:9090  (/dali/)
#
# Self-signed cert auto-generated on first start into named volume nginx_certs.

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/local.crt;
        ssl_certificate_key /etc/nginx/certs/local.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff                                always;
        add_header X-Frame-Options           SAMEORIGIN                             always;
        add_header Referrer-Policy           strict-origin-when-cross-origin        always;

        # Tell upstream it came via HTTPS
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # ── Keycloak admin console (/kc/) ────────────────────────────────────
        location /kc/ {
            proxy_pass              http://keycloak:8180/kc/;
            proxy_buffer_size       128k;
            proxy_buffers           4 256k;
            proxy_busy_buffers_size 256k;
        }

        # ── Chur BFF — auth ──────────────────────────────────────────────────
        location /auth {
            proxy_pass http://chur:3000;
        }

        # ── Chur BFF — GraphQL + WS subscriptions ───────────────────────────
        location /graphql {
            proxy_pass         http://chur:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 1h;
        }

        # ── Chur BFF — REST API (SSE-safe) ───────────────────────────────────
        location /api/ {
            proxy_pass         http://chur:3000;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 1h;
        }

        # ── Chur BFF — prefs ─────────────────────────────────────────────────
        location /prefs {
            proxy_pass http://chur:3000;
        }

        # ── Chur BFF — /me (session info) ────────────────────────────────────
        location /me {
            proxy_pass http://chur:3000;
        }

        # ── Chur BFF — /admin (user/tenant self-service + admin API) ─────────
        location /admin {
            proxy_pass http://chur:3000;
        }

        # ── Heimdall event stream WebSocket (MUST precede /heimdall block) ───
        # Route: browser ↔ wss://localhost/heimdall/ws/events → chur:3000
        # chur then proxies upstream to heimdall-backend ws://heimdall-backend:9093/ws/events
        location /heimdall/ws/ {
            proxy_pass         http://chur:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 1h;
        }

        # ── Heimdall API routes → Chur (health, metrics, control, users) ─────
        location ~ ^/heimdall/(health|metrics|control|users) {
            proxy_pass         http://chur:3000;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 60s;
        }

        # ── Heimdall frontend SPA ─────────────────────────────────────────────
        # Strip /heimdall/ prefix — assets are built with base='/heimdall/'
        # so the browser requests /heimdall/assets/... which must reach heimdall-frontend
        location = /heimdall {
            return 301 /heimdall/;
        }
        location /heimdall/ {
            proxy_pass http://heimdall-frontend:5174/;
        }

        # ── Dali parse service ────────────────────────────────────────────────
        # /dali/ is stripped — dali API is at root internally
        location /dali/ {
            proxy_pass           http://dali:9090/;
            client_max_body_size 200M;
            proxy_read_timeout   300s;
        }

        # ── Verdandi SPA (catch-all) ─────────────────────────────────────────
        # Vite dev server handles all routes internally (serves index.html for unknown paths).
        location / {
            proxy_pass http://verdandi:5173;
        }
    }
}
