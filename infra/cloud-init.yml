#cloud-config
# AIDA VM bootstrap — Ubuntu 22.04 LTS
# Applied once on first boot via Terraform metadata.user-data
#
# Template variables (injected by Terraform templatefile()):
#   ssh_public_key    — public key for ubuntu user
#   domain            — public domain (e.g. aida.example.com)
#   lockbox_secret_id — Lockbox secret ID for lockbox-sync.sh
#
# NOTE: bash ${VAR} inside write_files content blocks are escaped as $${VAR}
# so Terraform templatefile() does not try to interpolate them.

package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose-plugin
  - nginx
  - certbot
  - python3-certbot-nginx
  - jq
  - curl
  - wget
  - unzip
  - awscli          # Yandex Object Storage is S3-compatible

users:
  - default
  - name: ubuntu
    groups: docker
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_public_key}

write_files:
  - path: /opt/seer-studio/infra/scripts/lockbox-sync.sh
    permissions: '0750'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      # Lockbox secret ID is baked in at VM creation time by Terraform cloud-init.
      # Auth: VM service account via instance metadata (no credentials on disk).
      LOCKBOX_SECRET_ID="${lockbox_secret_id}"
      yc lockbox payload get --id "$${LOCKBOX_SECRET_ID}" \
        --format json | jq -r '.entries[] | "\(.key)=\(.value)"' \
        > /opt/seer-studio/.env.prod
      chmod 600 /opt/seer-studio/.env.prod
      echo "[lockbox-sync] secrets written to .env.prod ($$(wc -l < /opt/seer-studio/.env.prod) keys)"

  - path: /opt/seer-studio/infra/scripts/backup-arcadedb.sh
    permissions: '0750'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      DATE=$$(date +%Y%m%d-%H%M%S)
      BUCKET="s3://aida-arcadedb-backups"
      source /opt/seer-studio/.env.prod

      echo "[backup] triggering ArcadeDB backup API..."
      curl -su "root:$${ARCADEDB_ADMIN_PASSWORD}" \
        -X POST http://localhost:2480/api/v1/server \
        -H 'Content-Type: application/json' \
        -d '{"command":"backup database hound"}' \
        --fail --silent --show-error

      echo "[backup] uploading to Object Storage..."
      AWS_ACCESS_KEY_ID="$${AWS_ACCESS_KEY_ID}" \
      AWS_SECRET_ACCESS_KEY="$${AWS_SECRET_ACCESS_KEY}" \
      aws s3 sync /var/lib/arcadedb/backup \
        "$${BUCKET}/$${DATE}/" \
        --endpoint-url https://storage.yandexcloud.net

      echo "[backup] pruning old backups (keep last 30)..."
      KEYS=$$(AWS_ACCESS_KEY_ID="$${AWS_ACCESS_KEY_ID}" \
              AWS_SECRET_ACCESS_KEY="$${AWS_SECRET_ACCESS_KEY}" \
              aws s3 ls "$${BUCKET}/" \
              --endpoint-url https://storage.yandexcloud.net \
              | awk '{print $2}' | sort | head -n -30)
      for key in $${KEYS}; do
        AWS_ACCESS_KEY_ID="$${AWS_ACCESS_KEY_ID}" \
        AWS_SECRET_ACCESS_KEY="$${AWS_SECRET_ACCESS_KEY}" \
        aws s3 rm "$${BUCKET}/$${key}" \
          --recursive \
          --endpoint-url https://storage.yandexcloud.net
      done

      echo "[backup] done — $${DATE}"

  - path: /etc/nginx/sites-available/aida
    permissions: '0644'
    content: |
      # Placeholder — replaced by certbot after TLS cert issuance
      server {
          listen 80;
          server_name _;
          return 301 https://$host$request_uri;
      }

  - path: /opt/seer-studio/docker-compose-start.sh
    permissions: '0750'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd /opt/seer-studio
      /opt/seer-studio/infra/scripts/lockbox-sync.sh
      # IF-04: use --pull missing instead of --pull always so that reboot
      # doesn't fail when YCR registry is unreachable during VM startup.
      docker compose \
        -f docker-compose.prod.yml \
        -f docker-compose.yc.yml \
        up -d --remove-orphans --pull missing

  - path: /etc/systemd/system/aida-compose.service
    permissions: '0644'
    content: |
      [Unit]
      Description=AIDA Docker Compose Stack
      Requires=docker.service
      After=docker.service network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/seer-studio
      EnvironmentFile=/opt/seer-studio/.env.prod
      ExecStart=/opt/seer-studio/docker-compose-start.sh
      ExecStop=/usr/bin/docker compose \
        -f docker-compose.prod.yml \
        -f docker-compose.yc.yml down
      Restart=on-failure
      RestartSec=30s
      TimeoutStartSec=300

      [Install]
      WantedBy=multi-user.target

runcmd:
  # Enable docker
  - systemctl enable --now docker
  - usermod -aG docker ubuntu

  # Create app directory
  - mkdir -p /opt/seer-studio/infra/scripts

  # Install yc CLI
  - curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- --install-dir /usr/local
  - ln -sf /usr/local/yandex-cloud/bin/yc /usr/bin/yc
  - ln -sf /usr/local/yandex-cloud/bin/docker-credential-yc /usr/local/bin/docker-credential-yc

  # Set up nginx
  - rm -f /etc/nginx/sites-enabled/default
  - ln -sf /etc/nginx/sites-available/aida /etc/nginx/sites-enabled/aida
  - nginx -t && systemctl enable --now nginx

  # Set up backup cron (daily at 03:00)
  - |
    echo "0 3 * * * ubuntu /opt/seer-studio/infra/scripts/backup-arcadedb.sh >> /var/log/aida-backup.log 2>&1" \
      > /etc/cron.d/aida-backup
    chmod 644 /etc/cron.d/aida-backup

  # Register systemd service (enable autostart on reboot)
  - systemctl daemon-reload
  - systemctl enable aida-compose

  # TLS certificate — SAN cert covering root + subdomains.
  # Note: succeeds only after DNS A records propagate to this VM's IP.
  # If DNS is not ready yet, this will fail gracefully; run manually later.
  - |
    certbot --nginx \
      -d ${domain} -d seer.${domain} -d heimdall.${domain} \
      --non-interactive --agree-tos \
      -m admin@${domain} || \
      echo "[certbot] DNS not ready — run manually after DNS propagation"

final_message: |
  AIDA VM bootstrap complete.
  Manual steps remaining:
    1. If certbot failed: ssh ubuntu@<ip> 'sudo certbot --nginx -d ${domain} -d seer.${domain} -d heimdall.${domain} --non-interactive --agree-tos -m admin@${domain}'
    2. Ensure Lockbox is filled (run set-github-secrets.sh output command)
    3. Merge PR: sprint/dali-file-upload-apr16 → master  →  CD auto-deploys
