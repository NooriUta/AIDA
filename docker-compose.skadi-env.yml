###############################################################################
# AIDA — SKADI test environment
# SQL source databases for Hound/SKADI integration testing.
# NOT part of application delivery — start manually when needed.
#
# Usage:
#   docker compose -f docker-compose.skadi-env.yml up -d
#   docker compose -f docker-compose.skadi-env.yml down
#
# Connections:
#   PostgreSQL  localhost:5432  user=aida  password=aida  db=aida_src
#               jdbc:postgresql://localhost:5432/aida_src
#   Oracle XE   localhost:1521  user=aida  password=aida  service=XEPDB1
#               jdbc:oracle:thin:@localhost:1521/XEPDB1
#   Oracle EM   http://localhost:5500/em  (optional)
###############################################################################

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     aida
      POSTGRES_PASSWORD: aida
      POSTGRES_DB:       aida_src
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aida -d aida_src"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Oracle XE 21c ─────────────────────────────────────────────────────────
  # ⚠️  First pull ~1.7 GB. Startup takes ~3-4 min.
  oracle:
    image: gvenzl/oracle-xe:21-slim
    environment:
      ORACLE_PASSWORD:     aida
      ORACLE_DATABASE:     AIDA_SRC
      APP_USER:            aida
      APP_USER_PASSWORD:   aida
    ports:
      - "127.0.0.1:1521:1521"
      - "127.0.0.1:5500:5500"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./infra/sql/oracle/init:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

volumes:
  postgres_data:
  oracle_data:
