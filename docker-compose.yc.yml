###############################################################################
# docker-compose.yc.yml — Yandex Cloud overrides
#
# Usage (on VM):
#   docker compose \
#     -f docker-compose.prod.yml \
#     -f docker-compose.yc.yml \
#     up -d --remove-orphans
#
# What this file changes vs docker-compose.prod.yml:
#   • Images: GHCR → YCR (faster in-region pulls, no traffic cost)
#   • env_file: reads secrets from /opt/seer-studio/.env.prod (Lockbox-synced)
#   • resource limits: tuned for 4 vCPU / 16 GB RAM VM
#   • logging: json-file with rotation (stdout → /var/lib/docker/containers)
#   • keycloak: switches from start-dev → start (production mode)
###############################################################################

# IMAGE_TAG is set by CD pipeline (= git SHA); falls back to 'latest'
x-ycr-image: &ycr_base
  cr.yandex/${YC_REGISTRY_ID}

x-logging: &default_logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-env-file: &env_file
  env_file:
    - .env.prod

services:
  # ── Keycloak (production mode) ─────────────────────────────────────────────
  keycloak:
    command: start --import-realm
    environment:
      KC_HOSTNAME: "https://seer.${DOMAIN:-seidrstudio.pro}/kc"
      KC_HOSTNAME_STRICT: "false"    # KC is behind nginx (xforwarded headers) — strict not needed
      KC_HTTP_RELATIVE_PATH: "/kc"
      KC_PROXY_HEADERS: "xforwarded" # KC 26: replaces deprecated KC_PROXY=edge
      KC_HTTP_ENABLED: "true"        # nginx handles TLS termination
      JAVA_OPTS_APPEND: "-XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=25.0"
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M
    logging: *default_logging

  # ── SHUTTLE ────────────────────────────────────────────────────────────────
  shuttle:
    image: cr.yandex/${YC_REGISTRY_ID}/shuttle:${IMAGE_TAG:-latest}
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=25.0"
      QUARKUS_HTTP_CORS_ORIGINS: "https://${DOMAIN:-seidrstudio.pro},https://seer.${DOMAIN:-seidrstudio.pro},https://heimdall.${DOMAIN:-seidrstudio.pro},http://localhost:13000,http://localhost:15173"
      # CD-16: FriggYggLineageRegistry default frigg.url=localhost:2481 — override for Docker
      FRIGG_URL: "http://frigg:2480"
      FRIGG_USER: "root"
      # FRIGG_PASSWORD comes from env_file (.env.prod) → frigg.password config property ✓
      # CD-17: FriggYggLineageRegistry ygg.password → env var YGG_PASSWORD (not YGG_PASS)
      # yggInstanceUrl in DaliTenantConfig is null → falls back to ygg.url config property
      YGG_URL: "http://ygg:2480"
      YGG_USER: "root"
      YGG_PASSWORD: ${ARCADEDB_ADMIN_PASSWORD}
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 384M
        reservations:
          memory: 192M
    logging: *default_logging

  # ── Chur (BFF) ─────────────────────────────────────────────────────────────
  chur:
    image: cr.yandex/${YC_REGISTRY_ID}/chur:${IMAGE_TAG:-latest}
    environment:
      COOKIE_SECURE:  "true"
      COOKIE_DOMAIN:  ".${DOMAIN:-seidrstudio.pro}"
      CORS_ORIGIN:    "https://${DOMAIN:-seidrstudio.pro},https://seer.${DOMAIN:-seidrstudio.pro},https://heimdall.${DOMAIN:-seidrstudio.pro}"
      # Docker-internal FRIGG address (default in code is localhost:2481 — dev only)
      FRIGG_URL:         "http://frigg:2480"
      FRIGG_SESSION_DB:  "frigg-sessions"
      FRIGG_USER:        "root"
      # FRIGG_PASSWORD intentionally omitted — read from .env.prod via <<: *env_file below.
      # Explicit value here would be shadowed by env_file anyway (env_file wins in Compose merge order).
      # CD-18: provisioning.ts reads YGG_URL / YGG_USER / YGG_PASS for tenant pre-flight and
      # DB creation. Default in code is localhost:2480 (dev only) — must override for Docker.
      YGG_URL:  "http://ygg:2480"
      YGG_USER: "root"
      YGG_PASS: ${ARCADEDB_ADMIN_PASSWORD}
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    logging: *default_logging

  # ── Verdandi (React frontend) ───────────────────────────────────────────────
  verdandi:
    image: cr.yandex/${YC_REGISTRY_ID}/verdandi:${IMAGE_TAG:-latest}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M
    logging: *default_logging

  # ── Dali ───────────────────────────────────────────────────────────────────
  dali:
    image: cr.yandex/${YC_REGISTRY_ID}/dali:${IMAGE_TAG:-latest}
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=25.0"
      CORS_ORIGINS: "https://${DOMAIN:-seidrstudio.pro},https://seer.${DOMAIN:-seidrstudio.pro},https://heimdall.${DOMAIN:-seidrstudio.pro}"
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M
        reservations:
          memory: 768M
    logging: *default_logging

  # ── Heimdall Backend ────────────────────────────────────────────────────────
  heimdall-backend:
    image: cr.yandex/${YC_REGISTRY_ID}/heimdall-backend:${IMAGE_TAG:-latest}
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=25.0"
      CORS_ORIGINS: "https://${DOMAIN:-seidrstudio.pro},https://seer.${DOMAIN:-seidrstudio.pro},https://heimdall.${DOMAIN:-seidrstudio.pro},http://localhost:13000,http://localhost:5174"
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    logging: *default_logging

  # ── Heimdall Frontend ───────────────────────────────────────────────────────
  heimdall-frontend:
    image: cr.yandex/${YC_REGISTRY_ID}/heimdall-frontend:${IMAGE_TAG:-latest}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M
    logging: *default_logging

  # ── ANVIL (Impact + IDE backend) ───────────────────────────────────────────
  anvil:
    image: cr.yandex/${YC_REGISTRY_ID}/anvil:${IMAGE_TAG:-latest}
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=25.0"
      YGG_URL: "http://ygg:2480"
      YGG_USER: "root"
      YGG_PASSWORD: ${ARCADEDB_ADMIN_PASSWORD}
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          memory: 192M
    logging: *default_logging

  # ── MIMIR (LLM orchestrator) ───────────────────────────────────────────────
  mimir:
    image: cr.yandex/${YC_REGISTRY_ID}/mimir:${IMAGE_TAG:-latest}
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=25.0"
      CORS_ORIGINS: "https://${DOMAIN:-seidrstudio.pro},https://seer.${DOMAIN:-seidrstudio.pro},http://localhost:13000"
      ANVIL_URL: "http://anvil:9095"
      SHUTTLE_URL: "http://shuttle:8080"
      HEIMDALL_URL: "http://heimdall-backend:9093"
      YGG_URL: "http://ygg:2480"
      YGG_USER: "root"
      YGG_PASSWORD: ${ARCADEDB_ADMIN_PASSWORD}
      # Quarkiverse LangChain4j REQUIRES non-empty api-key strings at startup
      # even if model not used (Anthropic+Ollama are CDI stubs до 02.06.2026 Decision #71).
      # Empty string in .env.prod → SmallRye SRCFG00040 NoSuchElementException.
      # Use placeholder if env unset/empty.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-sk-placeholder-not-real}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-placeholder-not-real}
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          memory: 192M
    logging: *default_logging

  # Shell removed 2026-05-01 — replaced by independent SPAs.

  # ── FRIGG (ArcadeDB state store) ───────────────────────────────────────────
  frigg:
    environment:
      # ArcadeDB 26.3.2 image bakes in ARCADEDB_OPTS_MEMORY=-Xms2G -Xmx2G.
      # That variable is appended AFTER JAVA_OPTS in the start script, so it
      # silently overrides MaxRAMPercentage. We override it here with values
      # safe for the 3G container limit (~1.8G heap + ~600M JVM overhead = ~2.4G < 3G).
      ARCADEDB_OPTS_MEMORY: "-Xms512m -Xmx1843m"
      JAVA_OPTS: "-XX:InitialRAMPercentage=20.0"
      # JDK_JAVA_OPTIONS is parsed by the JVM itself (not by the shell), so
      # special characters in FRIGG_PASSWORD ($, !, spaces, etc.) are safe —
      # no shell word-splitting or variable expansion occurs.
      # Double-quoting the option value handles passwords with spaces.
      # ArcadeDB 26.x ignores ARCADEDB_SERVER_ROOTPASSWORD env var and requires
      # the JVM system property to bypass the interactive password setup loop.
      JDK_JAVA_OPTIONS: '"-Darcadedb.server.rootPassword=${FRIGG_PASSWORD}"'
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 3G
        reservations:
          memory: 1536M
    logging: *default_logging

  # ── Ygg (ArcadeDB lineage graph) ───────────────────────────────────
  ygg:
    environment:
      # Same image bakes in ARCADEDB_OPTS_MEMORY=-Xms2G -Xmx2G.
      # Override to explicit safe values for 4G container limit
      # (~2.8G heap + ~600M overhead = ~3.4G < 4G).
      ARCADEDB_OPTS_MEMORY: "-Xms1G -Xmx2867m"
      JAVA_OPTS: "-XX:InitialRAMPercentage=25.0"
      # Same rationale as FRIGG — JDK_JAVA_OPTIONS bypasses shell expansion.
      JDK_JAVA_OPTIONS: '"-Darcadedb.server.rootPassword=${ARCADEDB_ADMIN_PASSWORD}"'
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          memory: 2G
    logging: *default_logging
