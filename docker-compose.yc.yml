###############################################################################
# docker-compose.yc.yml — Yandex Cloud overrides
#
# Usage (on VM):
#   docker compose \
#     -f docker-compose.prod.yml \
#     -f docker-compose.yc.yml \
#     up -d --remove-orphans
#
# What this file changes vs docker-compose.prod.yml:
#   • Images: GHCR → YCR (faster in-region pulls, no traffic cost)
#   • env_file: reads secrets from /opt/seer-studio/.env.prod (Lockbox-synced)
#   • resource limits: tuned for 4 vCPU / 8 GB RAM VM
#   • logging: json-file with rotation (stdout → /var/lib/docker/containers)
#   • keycloak: switches from start-dev → start (production mode)
###############################################################################

# IMAGE_TAG is set by CD pipeline (= git SHA); falls back to 'latest'
x-ycr-image: &ycr_base
  cr.yandex/${YC_REGISTRY_ID}

x-logging: &default_logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-env-file: &env_file
  env_file:
    - .env.prod

services:
  # ── Keycloak (production mode) ─────────────────────────────────────────────
  keycloak:
    command: start --import-realm
    environment:
      KC_HOSTNAME: ${DOMAIN}
      KC_PROXY: edge
      KC_HTTP_ENABLED: "true"       # nginx handles TLS termination
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    logging: *default_logging

  # ── SHUTTLE ────────────────────────────────────────────────────────────────
  shuttle:
    image: cr.yandex/${YC_REGISTRY_ID}/shuttle:${IMAGE_TAG:-latest}
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 384M
        reservations:
          memory: 192M
    logging: *default_logging

  # ── Chur (BFF) ─────────────────────────────────────────────────────────────
  chur:
    image: cr.yandex/${YC_REGISTRY_ID}/chur:${IMAGE_TAG:-latest}
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    logging: *default_logging

  # ── Verdandi (React frontend) ───────────────────────────────────────────────
  verdandi:
    image: cr.yandex/${YC_REGISTRY_ID}/verdandi:${IMAGE_TAG:-latest}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M
    logging: *default_logging

  # ── Dali (async PL/SQL parse service) ──────────────────────────────────────
  dali:
    image: cr.yandex/${YC_REGISTRY_ID}/dali:${IMAGE_TAG:-latest}
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 384M
        reservations:
          memory: 192M
    logging: *default_logging

  # ── Heimdall Backend ────────────────────────────────────────────────────────
  heimdall-backend:
    image: cr.yandex/${YC_REGISTRY_ID}/heimdall-backend:${IMAGE_TAG:-latest}
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    logging: *default_logging

  # ── Heimdall Frontend ───────────────────────────────────────────────────────
  heimdall-frontend:
    image: cr.yandex/${YC_REGISTRY_ID}/heimdall-frontend:${IMAGE_TAG:-latest}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M
    logging: *default_logging

  # ── Shell (Module Federation host) ─────────────────────────────────────────
  shell:
    image: cr.yandex/${YC_REGISTRY_ID}/shell:${IMAGE_TAG:-latest}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M
    logging: *default_logging
