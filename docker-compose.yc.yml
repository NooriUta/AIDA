###############################################################################
# docker-compose.yc.yml — Yandex Cloud overrides
#
# Usage (on VM):
#   docker compose \
#     -f docker-compose.prod.yml \
#     -f docker-compose.yc.yml \
#     up -d --remove-orphans
#
# What this file changes vs docker-compose.prod.yml:
#   • Images: GHCR → YCR (faster in-region pulls, no traffic cost)
#   • env_file: reads secrets from /opt/seer-studio/.env.prod (Lockbox-synced)
#   • resource limits: tuned for 4 vCPU / 16 GB RAM VM
#   • logging: json-file with rotation (stdout → /var/lib/docker/containers)
#   • keycloak: switches from start-dev → start (production mode)
###############################################################################

# IMAGE_TAG is set by CD pipeline (= git SHA); falls back to 'latest'
x-ycr-image: &ycr_base
  cr.yandex/${YC_REGISTRY_ID}

x-logging: &default_logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-env-file: &env_file
  env_file:
    - .env.prod

services:
  # ── Keycloak (production mode) ─────────────────────────────────────────────
  keycloak:
    command: start --import-realm
    environment:
      KC_HOSTNAME: "https://seer.${DOMAIN:-seidrstudio.pro}/kc"
      KC_HOSTNAME_STRICT: "false"    # KC is behind nginx (xforwarded headers) — strict not needed
      KC_HTTP_RELATIVE_PATH: "/kc"
      KC_PROXY_HEADERS: "xforwarded" # KC 26: replaces deprecated KC_PROXY=edge
      KC_HTTP_ENABLED: "true"        # nginx handles TLS termination
      JAVA_OPTS_APPEND: "-XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=25.0"
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M
    logging: *default_logging

  # ── SHUTTLE ────────────────────────────────────────────────────────────────
  shuttle:
    image: cr.yandex/${YC_REGISTRY_ID}/shuttle:${IMAGE_TAG:-latest}
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=25.0"
      QUARKUS_HTTP_CORS_ORIGINS: "https://${DOMAIN:-seidrstudio.pro},https://seer.${DOMAIN:-seidrstudio.pro},https://heimdall.${DOMAIN:-seidrstudio.pro},http://localhost:13000,http://localhost:15173"
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 384M
        reservations:
          memory: 192M
    logging: *default_logging

  # ── Chur (BFF) ─────────────────────────────────────────────────────────────
  chur:
    image: cr.yandex/${YC_REGISTRY_ID}/chur:${IMAGE_TAG:-latest}
    environment:
      COOKIE_SECURE:  "true"
      COOKIE_DOMAIN:  ".${DOMAIN:-seidrstudio.pro}"
      CORS_ORIGIN:    "https://${DOMAIN:-seidrstudio.pro},https://seer.${DOMAIN:-seidrstudio.pro},https://heimdall.${DOMAIN:-seidrstudio.pro}"
      # Docker-internal FRIGG address (default in code is localhost:2481 — dev only)
      FRIGG_URL:         "http://frigg:2480"
      FRIGG_SESSION_DB:  "frigg-sessions"
      FRIGG_USER:        "root"
      # FRIGG_PASSWORD intentionally omitted — read from .env.prod via <<: *env_file below.
      # Explicit value here would be shadowed by env_file anyway (env_file wins in Compose merge order).
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    logging: *default_logging

  # ── Verdandi (React frontend) ───────────────────────────────────────────────
  verdandi:
    image: cr.yandex/${YC_REGISTRY_ID}/verdandi:${IMAGE_TAG:-latest}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M
    logging: *default_logging

  # ── Dali ───────────────────────────────────────────────────────────────────
  dali:
    image: cr.yandex/${YC_REGISTRY_ID}/dali:${IMAGE_TAG:-latest}
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=25.0"
      CORS_ORIGINS: "https://${DOMAIN:-seidrstudio.pro},https://seer.${DOMAIN:-seidrstudio.pro},https://heimdall.${DOMAIN:-seidrstudio.pro}"
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M
        reservations:
          memory: 768M
    logging: *default_logging

  # ── Heimdall Backend ────────────────────────────────────────────────────────
  heimdall-backend:
    image: cr.yandex/${YC_REGISTRY_ID}/heimdall-backend:${IMAGE_TAG:-latest}
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=25.0"
      CORS_ORIGINS: "https://${DOMAIN:-seidrstudio.pro},https://seer.${DOMAIN:-seidrstudio.pro},https://heimdall.${DOMAIN:-seidrstudio.pro},http://localhost:13000,http://localhost:5174"
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    logging: *default_logging

  # ── Heimdall Frontend ───────────────────────────────────────────────────────
  heimdall-frontend:
    image: cr.yandex/${YC_REGISTRY_ID}/heimdall-frontend:${IMAGE_TAG:-latest}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M
    logging: *default_logging

  # ── Shell ───────────────────────────────────────────────────────────────────
  shell:
    image: cr.yandex/${YC_REGISTRY_ID}/shell:${IMAGE_TAG:-latest}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M
    logging: *default_logging

  # ── FRIGG (ArcadeDB state store) ───────────────────────────────────────────
  frigg:
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M
        reservations:
          memory: 768M
    logging: *default_logging

  # ── Ygg (ArcadeDB lineage graph) ───────────────────────────────────
  ygg:
    <<: *env_file
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          memory: 2G
    logging: *default_logging
