server {
    listen 5173;
    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS — resolve upstreams at request time, not at startup
    resolver 127.0.0.11 valid=10s;
    set $chur_upstream http://chur:3000;

    location /prefs {
        proxy_pass $chur_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy auth requests to Chur (no trailing slash — matches /auth and /auth/*)
    location /auth {
        proxy_pass $chur_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy /me (session info, activity) to Chur
    location /me {
        proxy_pass $chur_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy /admin (tenant list, user management) to Chur
    location /admin {
        proxy_pass $chur_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy GraphQL to Chur (which forwards to SHUTTLE with X-Seer headers)
    location /graphql {
        proxy_pass $chur_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy raw API queries to Chur
    location /api/ {
        proxy_pass $chur_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # TIER2 MT-04: MIMIR sidebar — Chur fronts /mimir/{ask,sessions/*,health,admin/*}
    location /mimir {
        proxy_pass $chur_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # HEIMDALL event relay (also goes through Chur)
    location /heimdall {
        proxy_pass $chur_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
