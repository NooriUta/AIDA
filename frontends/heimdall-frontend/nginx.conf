server {
    listen 5174;
    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS вЂ” resolve upstreams at request time, not at startup
    resolver 127.0.0.11 valid=10s;
    set $chur_upstream       http://chur:3000;
    set $heimdall_upstream   http://heimdall-backend:9093;
    set $dali_upstream       http://dali:9090;
    set $dali_jobrunr        http://dali:29091;

    # Allow large file uploads (matches Dali quarkus.http.limits.max-body-size)
    client_max_body_size 200M;

    # SPA fallback вЂ” all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # в”Ђв”Ђ /chur/* в†’ Chur (strip /chur prefix) вЂ” main API path used by React app в”Ђ
    # React app calls /chur/api/admin/*, /chur/me, etc. Strip /chur and forward.
    location /chur/ {
        rewrite ^/chur(/.*)$ $1 break;
        proxy_pass $chur_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # в”Ђв”Ђ Auth в†’ Chur (direct, no /chur prefix) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location /auth {
        proxy_pass $chur_upstream$uri$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # в”Ђв”Ђ Session info / activity в†’ Chur в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location /me {
        proxy_pass $chur_upstream$uri$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # в”Ђв”Ђ Metrics/Control в†’ Chur (auth-gated) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    # NOTE: Chur expects /heimdall/* prefix вЂ” must be added back after main-nginx strips it.
    location /metrics/ {
        proxy_pass $chur_upstream/heimdall$uri$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /control/ {
        proxy_pass $chur_upstream/heimdall$uri$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /users/ {
        proxy_pass $chur_upstream/heimdall$uri$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # в”Ђв”Ђ Databases inventory в†’ Chur /heimdall/databases в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location /databases {
        proxy_pass $chur_upstream/heimdall/databases$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # в”Ђв”Ђ JobRunr dashboard HTTP server (separate port 29091) в†’ Dali в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    # Strip /jobrunr prefix вЂ” JobRunr API lives at root (e.g. /api/jobs, not /jobrunr/api/jobs)
    location = /jobrunr {
        return 301 /jobrunr/dashboard;
    }
    location /jobrunr/ {
        proxy_pass $dali_jobrunr/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_request_buffering off;
    }

    # в”Ђв”Ђ Services в†’ heimdall-backend (Quarkus OIDC guards this directly) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location /services/ {
        proxy_pass $heimdall_upstream$uri$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # в”Ђв”Ђ Docs / Team-docs в†’ heimdall-backend (DocsResource / TeamDocsResource) в”Ђ
    # Bare paths received after main-nginx strips /heimdall/ prefix.
    # Go directly to heimdall-backend вЂ” Chur proxy route was added later (not yet deployed).
    location ~ ^/docs(/|$) {
        proxy_pass $heimdall_upstream$uri$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/team-docs(/|$) {
        proxy_pass $heimdall_upstream$uri$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # в”Ђв”Ђ HighLoad plan HTML в†’ heimdall-backend в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location /highload-plan {
        proxy_pass $heimdall_upstream/highload-plan;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # в”Ђв”Ђ Dali API (strip /dali prefix в†’ http://dali:9090/api/...) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location /dali/ {
        rewrite ^/dali(/.*)$ $1 break;
        proxy_pass $dali_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_request_buffering off;
    }

    # в”Ђв”Ђ WebSocket (bare /ws/ вЂ” received after main-nginx strips /heimdall/) в”Ђв”Ђв”Ђ
    # Chur expects /heimdall/ws/events; re-add the prefix via set.
    location /ws/ {
        set $ws_target $chur_upstream/heimdall$uri$is_args$args;
        proxy_pass $ws_target;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # в”Ђв”Ђ Direct port-25174 access: VITE_HEIMDALL_API="/heimdall" в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    # When the React app is loaded directly (not via main nginx), all API calls
    # include the /heimdall/ prefix. Handle WebSocket first (longest match wins),
    # then strip /heimdall/ from all other paths and re-match bare-path locations above.

    location ^~ /heimdall/ws/ {
        proxy_pass $chur_upstream$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location ^~ /heimdall/ {
        rewrite ^/heimdall(/.*)$ $1 last;
    }
}
