server {
    listen 5174;
    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS — resolve upstreams at request time, not at startup
    resolver 127.0.0.11 valid=10s;
    set $chur_upstream     http://chur:3000;
    set $heimdall_upstream http://heimdall-backend:9093;
    set $dali_upstream     http://dali:9090;

    # Allow large file uploads (matches Dali quarkus.http.limits.max-body-size)
    client_max_body_size 200M;

    # SPA fallback — all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy auth requests to Chur
    location /auth/ {
        proxy_pass $chur_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy HEIMDALL metrics/control/events to Chur (auth-gated)
    location /metrics/ {
        proxy_pass $chur_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /control/ {
        proxy_pass $chur_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /services/ {
        proxy_pass $heimdall_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Dali API (strip /dali prefix → http://dali:9090/api/...)
    location /dali/ {
        rewrite ^/dali(/.*)$ $1 break;
        proxy_pass $dali_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_request_buffering off;
    }

    # Docs API → Chur (auth-gated, proxied to heimdall-backend /docs and /team-docs)
    location /heimdall/docs {
        proxy_pass $chur_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /heimdall/team-docs {
        proxy_pass $chur_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket proxy for event stream (via Chur auth gateway)
    # Path is /ws/ (not /heimdall/ws/) because base is now '/' — outer nginx
    # rewrites /ws/ → /heimdall/ws/ before hitting Chur in production.
    location /ws/ {
        proxy_pass $chur_upstream/heimdall/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
