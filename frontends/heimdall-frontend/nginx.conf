server {
    listen 5174;
    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS — resolve upstreams at request time, not at startup
    resolver 127.0.0.11 valid=10s;
    set $chur_upstream     http://chur:3000;
    set $heimdall_upstream http://heimdall-backend:9093;
    set $dali_upstream     http://dali:9090;

    # Allow large file uploads (matches Dali quarkus.http.limits.max-body-size)
    client_max_body_size 200M;

    # SPA fallback — all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Auth → Chur ──────────────────────────────────────────────────────────
    location /auth/ {
        proxy_pass $chur_upstream$uri$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Metrics/Control → Chur (auth-gated) ──────────────────────────────────
    # NOTE: Chur expects /heimdall/* prefix — must be added back after main-nginx strips it.
    location /metrics/ {
        proxy_pass $chur_upstream/heimdall$uri$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /control/ {
        proxy_pass $chur_upstream/heimdall$uri$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /users/ {
        proxy_pass $chur_upstream/heimdall$uri$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Services → heimdall-backend (Quarkus OIDC guards this directly) ──────
    location /services/ {
        proxy_pass $heimdall_upstream$uri$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Docs / Team-docs → heimdall-backend (DocsResource / TeamDocsResource) ─
    # Bare paths received after main-nginx strips /heimdall/ prefix.
    # Go directly to heimdall-backend — Chur proxy route was added later (not yet deployed).
    location ~ ^/docs(/|$) {
        proxy_pass $heimdall_upstream$uri$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/team-docs(/|$) {
        proxy_pass $heimdall_upstream$uri$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── HighLoad plan HTML → heimdall-backend ─────────────────────────────────
    location /highload-plan {
        proxy_pass $heimdall_upstream/highload-plan;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Dali API (strip /dali prefix → http://dali:9090/api/...) ─────────────
    location /dali/ {
        rewrite ^/dali(/.*)$ $1 break;
        proxy_pass $dali_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_request_buffering off;
    }

    # ── WebSocket (bare /ws/ — received after main-nginx strips /heimdall/) ───
    location /ws/ {
        proxy_pass $chur_upstream/heimdall/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ── Direct port-25174 access: VITE_HEIMDALL_API="/heimdall" ──────────────
    # When the React app is loaded directly (not via main nginx), all API calls
    # include the /heimdall/ prefix. Handle WebSocket first (longest match wins),
    # then strip /heimdall/ from all other paths and re-match bare-path locations above.

    location ^~ /heimdall/ws/ {
        proxy_pass $chur_upstream/heimdall/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location ^~ /heimdall/ {
        rewrite ^/heimdall(/.*)$ $1 last;
    }
}
