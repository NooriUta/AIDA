name: CD Staging

on:
  push:
    branches: ['prerelease']
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: 'Deploy mode'
        required: false
        default: 'merge'
        type: choice
        options:
          - merge
          - init
      run_load_test:
        description: 'Run load test (k6) after deploy'
        required: false
        default: false
        type: boolean

concurrency:
  group: cd-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build + push Docker images to GHCR ──────────────────────────────────────
  build-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: verdandi
            context: ./frontends/verdandi
            dockerfile: ./frontends/verdandi/Dockerfile
          - service: chur
            context: ./bff/chur
            dockerfile: ./bff/chur/Dockerfile
          - service: shuttle
            context: .
            dockerfile: ./services/shuttle/Dockerfile
          - service: dali
            context: .
            dockerfile: ./services/dali/Dockerfile
          - service: heimdall-backend
            context: .
            dockerfile: ./services/heimdall-backend/Dockerfile
          - service: heimdall-frontend
            context: .
            dockerfile: ./frontends/heimdall-frontend/Dockerfile
          - service: anvil
            context: .
            dockerfile: ./services/anvil/Dockerfile
          - service: mimir
            context: .
            dockerfile: ./services/mimir/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file:    ${{ matrix.dockerfile }}
          push: true
          build-args: |
            ${{ matrix.build_args }}
          cache-from: type=gha,scope=staging-${{ matrix.service }}
          cache-to:   type=gha,scope=staging-${{ matrix.service }},mode=max
          tags: |
            ghcr.io/${{ env.OWNER }}/verdandi/${{ matrix.service }}:staging
            ghcr.io/${{ env.OWNER }}/verdandi/${{ matrix.service }}:staging-${{ github.sha }}

  # ── Mirror GHCR → Yandex Container Registry ─────────────────────────────────
  mirror-to-ycr:
    name: Mirror ${{ matrix.service }} → YCR
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        service: [verdandi, chur, shuttle, dali, heimdall-backend, heimdall-frontend, anvil, mimir]
    steps:
      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.YC_SA_KEY }}

      - name: Pull from GHCR and push to YCR
        env:
          GHCR: ghcr.io/${{ env.OWNER }}/verdandi/${{ matrix.service }}
          YCR:  cr.yandex/${{ secrets.YC_REGISTRY_ID }}/${{ matrix.service }}
        run: |
          for attempt in 1 2 3; do
            echo "=== Mirror attempt ${attempt}/3 ==="
            docker pull ${GHCR}:staging \
              && docker tag  ${GHCR}:staging ${YCR}:staging \
              && docker push ${YCR}:staging \
              && break
            [ ${attempt} -lt 3 ] && echo "Attempt ${attempt} failed, retrying in 30s..." && sleep 30
          done

  # ── Deploy to staging ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to staging
    needs: mirror-to-ycr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix file permissions for scp
        run: |
          chmod -R a+r docker-compose.prod.yml docker-compose.yc.yml infra/keycloak/ infra/scripts/ infra/nginx/ scripts/ tests/
          chmod a+x infra/scripts/*.sh scripts/*.sh

      - name: Ensure deploy dir is writable
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST_STAGING }}
          username: ${{ secrets.DEPLOY_USER_STAGING }}
          key:      ${{ secrets.DEPLOY_KEY_STAGING }}
          script: |
            sudo mkdir -p /opt/seer-studio/infra/scripts /opt/seer-studio/infra/nginx /opt/seer-studio/scripts /opt/seer-studio/tests
            # Clean stale test fixtures so SCP only lands the minimal repo dataset
            sudo rm -rf /opt/seer-studio/tests/data/
            sudo chown -R ubuntu:ubuntu /opt/seer-studio

      - name: Copy prod compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST_STAGING }}
          username: ${{ secrets.DEPLOY_USER_STAGING }}
          key:      ${{ secrets.DEPLOY_KEY_STAGING }}
          source:   docker-compose.prod.yml,docker-compose.yc.yml,infra/keycloak/,infra/scripts/,infra/nginx/,scripts/,tests/
          target:   /opt/seer-studio/

      - name: Write compose .env on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST_STAGING }}
          username: ${{ secrets.DEPLOY_USER_STAGING }}
          key:      ${{ secrets.DEPLOY_KEY_STAGING }}
          script: |
            cat > /opt/seer-studio/.env << 'ENVEOF'
            DOMAIN=${{ secrets.DOMAIN_STAGING }}
            YC_REGISTRY_ID=${{ secrets.YC_REGISTRY_ID }}
            IMAGE_TAG=staging
            ENVEOF

      - name: Install nginx config on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST_STAGING }}
          username: ${{ secrets.DEPLOY_USER_STAGING }}
          key:      ${{ secrets.DEPLOY_KEY_STAGING }}
          script: |
            set -e
            DOMAIN=${{ secrets.DOMAIN_STAGING }}
            HEIMDALL_CIDR="${{ secrets.HEIMDALL_CIDR_STAGING }}"
            CONF=/opt/seer-studio/infra/nginx/nginx.conf
            CIDR="${HEIMDALL_CIDR:-0.0.0.0/0}"
            # Используем | как разделитель sed — CIDR содержит '/' что ломает стандартный s/.../
            sudo bash -c "sed 's|\${DOMAIN}|'"${DOMAIN}"'|g; s|\${HEIMDALL_CIDR}|'"${CIDR}"'|g' ${CONF} \
              > /etc/nginx/sites-available/aida"
            sudo ln -sf /etc/nginx/sites-available/aida /etc/nginx/sites-enabled/aida
            # Single SAN cert covers all three domains (certbot certonly with -d seer.* -d heimdall.*)
            # Directory is named after the first -d argument only.
            if [ -f "/etc/letsencrypt/live/${DOMAIN}/fullchain.pem" ]; then
              sudo nginx -t && sudo systemctl restart nginx
            else
              echo "TLS cert not yet provisioned for ${DOMAIN} — skipping nginx reload"
            fi

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST_STAGING }}
          username: ${{ secrets.DEPLOY_USER_STAGING }}
          key:      ${{ secrets.DEPLOY_KEY_STAGING }}
          command_timeout: 30m
          script: |
            set -e
            cd /opt/seer-studio

            # Sync secrets from Lockbox → .env.prod
            if [ -f infra/scripts/lockbox-sync.sh ]; then
              LOCKBOX_SECRET_ID=${{ secrets.LOCKBOX_SECRET_ID_STAGING }} \
              infra/scripts/lockbox-sync.sh || echo "Lockbox sync skipped (not configured)"
            fi

            set -a; source .env.prod 2>/dev/null || true; set +a

            # Remove yc credential helper for cr.yandex
            if [ -f ~/.docker/config.json ]; then
              jq 'del(.credHelpers["cr.yandex"])' ~/.docker/config.json \
                > /tmp/dc.json && mv /tmp/dc.json ~/.docker/config.json
            fi

            # Login to YCR via VM service account IAM token
            IAM_TOKEN=$(curl -sf -H "Metadata-Flavor: Google" \
              http://169.254.169.254/computeMetadata/v1/instance/service-accounts/default/token \
              | jq -r .access_token)
            echo "$IAM_TOKEN" | docker login cr.yandex -u iam --password-stdin

            export IMAGE_TAG=staging
            export YC_REGISTRY_ID=${{ secrets.YC_REGISTRY_ID }}
            export DOMAIN=${{ secrets.DOMAIN_STAGING }}
            export REPO=cr.yandex/${YC_REGISTRY_ID}

            # Pull new images from YCR
            for svc in verdandi chur shuttle dali heimdall-backend heimdall-frontend anvil mimir; do
              docker pull ${REPO}/${svc}:${IMAGE_TAG}
              docker tag  ${REPO}/${svc}:${IMAGE_TAG} ${REPO}/${svc}:latest
            done

            DEPLOY_MODE="${{ github.event.inputs.deploy_mode || 'merge' }}"

            # ── MERGE deploy: graceful DB stop before new images ──────────────
            # Graceful stop of DB containers ensures clean shutdown before new
            # version starts (avoids journal corruption on ArcadeDB upgrade).
            # No backup on staging — no real persistent data to preserve.
            if [ "$DEPLOY_MODE" = "merge" ]; then
              echo "=== MERGE DEPLOY: graceful DB stop ==="
              docker compose -f docker-compose.prod.yml -f docker-compose.yc.yml \
                stop frigg ygg 2>/dev/null || true
              sleep 5  # Wait for graceful ArcadeDB shutdown (flushes WAL)
            fi

            # ── INIT deploy: wipe volumes ─────────────────────────────────────
            if [ "$DEPLOY_MODE" = "init" ]; then
              echo "=== INIT DEPLOY: wiping DB volumes ==="
              docker compose \
                -f docker-compose.prod.yml \
                -f docker-compose.yc.yml \
                down --remove-orphans || true
              docker volume rm seer-studio_frigg_data   || true
              docker volume rm hound_databases          || true
              docker volume rm seer-studio_hound_config || true
              docker volume rm seer-studio_hound_logs   || true
              echo "=== Volumes removed ==="
            fi

            # Ensure external volumes exist
            docker volume create hound_databases || true

            # ── Step 1: Start / update all app services (new images) ────────────
            docker compose \
              -f docker-compose.prod.yml \
              -f docker-compose.yc.yml \
              up -d --remove-orphans || {
                echo "=== docker compose up failed ==="
                docker ps -a
                docker logs seer-studio-chur-1     --tail 60 2>&1 || true
                docker logs seer-studio-keycloak-1 --tail 40 2>&1 || true
                exit 1
              }

            # ── Step 2: Force-recreate Keycloak ──────────────────────────────────
            # KC uses an in-container H2 database (no volume).
            # Without --force-recreate, KC keeps running with its existing H2 state
            # across deploys, so manual password changes in KC admin console
            # persist and break smoke-test S-01 (admin/admin → 401).
            # Recreating KC wipes the H2 DB and re-imports seer-realm.json,
            # guaranteeing deterministic auth state (admin:admin) for every CI run.
            # KC startup takes ~90s — wait_infra "KC" below handles the delay.
            echo "=== Force-recreating Keycloak (fresh H2 DB + realm re-import) ==="
            docker compose \
              -f docker-compose.prod.yml \
              -f docker-compose.yc.yml \
              up -d --force-recreate keycloak || {
                echo "=== KC force-recreate failed ==="
                docker logs seer-studio-keycloak-1 --tail 40 2>&1 || true
                exit 1
              }

            # ── Wait for infrastructure ───────────────────────────────────────
            # Matches prod wait_infra: pre-check, configurable retries, diagnostics.
            wait_infra() {
              local url="$1" name="$2" retries="${3:-60}"
              # Quick pre-check: if already ready (e.g. services Up across deploys), return immediately
              if curl -sf "${url}" > /dev/null 2>&1; then
                echo "  [${name}] already ready"; return 0
              fi
              local i
              for i in $(seq 1 "$retries"); do
                if curl -sf "${url}" > /dev/null 2>&1; then
                  echo "  [${name}] ready in $((i * 10))s"; return 0
                fi
                echo "  [${name}] retry ${i}/${retries}..."; sleep 10
              done
              echo "=== ${name} not ready after $((retries * 10))s — diagnostics ==="
              docker ps -a --format "  {{.Names}}  {{.Status}}  {{.Image}}" 2>/dev/null || true
              docker stats --no-stream --format "  {{.Name}}  mem={{.MemUsage}}  cpu={{.CPUPerc}}" 2>/dev/null || true
              local svcname="${name,,}"; svcname="${svcname//(seer)/}"; svcname="${svcname//(/}"; svcname="${svcname//)/}"
              svcname="${svcname// /}"
              docker logs "seer-studio-${svcname}-1" --tail 40 2>&1 || \
              docker logs "${svcname}-1"             --tail 40 2>&1 || true
              return 1
            }

            echo "=== Waiting for infrastructure ==="
            wait_infra "http://localhost:2481/api/v1/ready"    "FRIGG"    60 || exit 1
            wait_infra "http://localhost:2480/api/v1/ready"    "YGG"      60 || exit 1
            # Wait for the seer realm specifically — master realm can be ready
            # before --import-realm finishes seeding seer-realm.json (race condition).
            wait_infra "http://localhost:18180/kc/realms/seer" "KC(seer)" 60 || exit 1

            # ── Version assertions (warn-only on staging) ─────────────────────
            # docker inspect reads the image tag directly — ArcadeDB /api/v1/server
            # and KC realm endpoint don't expose a parseable version in these releases.
            echo "=== Version assertions ==="
            check_image_ver() {
              local container="$1" expected="$2" label="$3"
              local image
              image=$(docker inspect "${container}" --format='{{.Config.Image}}' 2>/dev/null || echo "?")
              if echo "${image}" | grep -qF "${expected}"; then
                echo "  [${label}] OK — ${image}"
              else
                echo "  [${label}] WARN: expected ${expected}, got: ${image} — check image pin in docker-compose.prod.yml"
              fi
            }
            check_image_ver "seer-studio-frigg-1"    "26.4.2" "FRIGG"
            check_image_ver "Ygg-1"                  "26.4.2" "YGG"
            check_image_ver "seer-studio-keycloak-1" "26.6.1" "KC"

            # ── DB bootstrap ──────────────────────────────────────────────────
            echo "=== Running init-arcadedb.sh ==="
            INIT_ARCADEDB_TIMEOUT=300 \
            FRIGG_URL=http://localhost:2481 \
            FRIGG_USER=root \
            FRIGG_PASS="${FRIGG_PASSWORD}" \
            YGG_URL=http://localhost:2480 \
            YGG_USER=root \
            YGG_PASS="${ARCADEDB_ADMIN_PASSWORD}" \
            KC_URL=http://localhost:18180/kc \
            KC_ADMIN_USER="${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}" \
            KC_ADMIN_PASS="${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}" \
            bash scripts/init-arcadedb.sh || {
              echo "=== init-arcadedb.sh FAILED (non-fatal on upgrade) ==="
            }

            # ── YGG + FRIGG warm-up probe ─────────────────────────────────────
            # ArcadeDB lists databases on disk (/api/v1/databases) before opening them.
            # init-arcadedb.sh skips creation when a DB name appears in the list, but
            # the DB may still be unavailable (not opened, WAL replay, or corrupted).
            # Probing with SELECT 1 forces ArcadeDB to open each database.
            # On staging, corrupted databases are auto-recreated (no prod data here).
            echo "=== YGG/FRIGG database warm-up probe ==="
            probe_or_recreate() {
              local base_url="$1" pass="$2" db="$3" recreate_ok="$4"
              local ok=0
              for i in $(seq 1 18); do
                CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
                  -u "root:${pass}" -X POST "${base_url}/api/v1/query/${db}" \
                  -H "Content-Type: application/json" \
                  -d '{"language":"sql","command":"SELECT 1","params":{}}' 2>/dev/null || echo "000")
                if [ "$CODE" = "200" ]; then
                  echo "  [${db}] warm — OK (attempt ${i})"; ok=1; break
                fi
                echo "  [${db}] probe ${i}/18 HTTP ${CODE}..."; sleep 5
              done
              if [ "$ok" = "0" ] && [ "$recreate_ok" = "1" ]; then
                echo "  [${db}] WARN: not available after 90s — dropping and recreating"
                curl -sf --max-time 10 -u "root:${pass}" \
                  -X DELETE "${base_url}/api/v1/drop/${db}" 2>/dev/null || true
                sleep 2
                curl -sf --max-time 10 -u "root:${pass}" \
                  -X POST "${base_url}/api/v1/create/${db}" 2>/dev/null && \
                  echo "  [${db}] recreated" || echo "  [${db}] ERROR: recreate failed"
              elif [ "$ok" = "0" ]; then
                echo "  [${db}] ERROR: not available after 90s"
              fi
            }
            # YGG key databases (staging: recreate on failure — no persistent data)
            probe_or_recreate "http://localhost:2480" "${ARCADEDB_ADMIN_PASSWORD}" "hound_default"     "1"
            probe_or_recreate "http://localhost:2480" "${ARCADEDB_ADMIN_PASSWORD}" "hound_src_default" "1"
            # FRIGG key databases (staging: recreate on failure)
            probe_or_recreate "http://localhost:2481" "${FRIGG_PASSWORD}" "frigg-tenants"  "1"
            probe_or_recreate "http://localhost:2481" "${FRIGG_PASSWORD}" "frigg-sessions" "1"
            probe_or_recreate "http://localhost:2481" "${FRIGG_PASSWORD}" "dali"           "1"
            probe_or_recreate "http://localhost:2481" "${FRIGG_PASSWORD}" "dali_default"   "1"
            probe_or_recreate "http://localhost:2481" "${FRIGG_PASSWORD}" "heimdall"       "1"

            # ── Health checks ─────────────────────────────────────────────────
            echo "=== Waiting for services ==="
            wait_infra "http://localhost:13000/health"   "Chur"             || { echo "Chur FAILED";             exit 1; }
            wait_infra "http://localhost:18080/q/health" "Shuttle"          || { echo "Shuttle FAILED";          exit 1; }
            wait_infra "http://localhost:15173/"         "Verdandi"         || { echo "Verdandi FAILED";         exit 1; }
            wait_infra "http://localhost:19090/q/health" "Dali"             || { echo "Dali FAILED";             exit 1; }
            wait_infra "http://localhost:19093/q/health" "heimdall-backend" || { echo "heimdall-backend FAILED"; exit 1; }
            wait_infra "http://localhost:19095/q/health" "Anvil"            || { echo "Anvil FAILED";            exit 1; }
            wait_infra "http://localhost:19094/q/health" "Mimir"            || { echo "Mimir FAILED";            exit 1; }
            echo "=== All services OK ==="

            # ── Integration test pre-clean ────────────────────────────────────
            # On merge deploys, FRIGG/YGG volumes persist. The CI test tenant
            # 'acme-ci' may be stuck in PROVISIONING_FAILED from a prior run.
            # Clean it up here (before integration tests) so provisioning starts
            # fresh. Uses KC admin API + ArcadeDB direct SQL — no Chur auth needed.
            echo "=== Integration test pre-clean: acme-ci ==="
            set -a; source .env.prod 2>/dev/null || true; set +a
            FRIGG_PASS_ACTUAL="${FRIGG_PASSWORD:-${ARCADEDB_ADMIN_PASSWORD:-playwithdata}}"
            KC_TOKEN=$(curl -sf --max-time 10 \
              -X POST "http://localhost:18180/kc/realms/master/protocol/openid-connect/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "grant_type=password&client_id=admin-cli&username=admin&password=admin" \
              2>/dev/null | python -c 'import json,sys; print(json.load(sys.stdin).get("access_token",""))' 2>/dev/null || echo "")
            if [ -n "$KC_TOKEN" ]; then
              KC_ORG_ID=$(curl -sf --max-time 5 \
                -H "Authorization: Bearer $KC_TOKEN" \
                "http://localhost:18180/kc/admin/realms/seer/organizations?search=acme-ci" \
                2>/dev/null | python -c 'import json,sys; orgs=json.load(sys.stdin); r=[o for o in orgs if o.get("alias")=="acme-ci"]; print(r[0]["id"] if r else "")' 2>/dev/null || echo "")
              if [ -n "$KC_ORG_ID" ]; then
                curl -sf -X DELETE -H "Authorization: Bearer $KC_TOKEN" \
                  "http://localhost:18180/kc/admin/realms/seer/organizations/${KC_ORG_ID}" 2>/dev/null || true
                echo "  KC org acme-ci deleted"
              else
                echo "  KC org acme-ci not found (clean)"
              fi
            else
              echo "  KC admin token unavailable — skipping KC org cleanup"
            fi
            curl -sf --max-time 5 -X POST "http://localhost:2481/api/v1/command/frigg-tenants" \
              -u "root:${FRIGG_PASS_ACTUAL}" -H "Content-Type: application/json" \
              -d '{"language":"sql","command":"DELETE FROM DaliTenantConfig WHERE tenantAlias = '\''acme-ci'\''"}' \
              2>/dev/null || true
            echo "  FRIGG acme-ci record deleted"
            echo "=== Pre-clean done ==="

            echo "Staging deploy OK — ${{ github.sha }}"

      # ── Smoke tests ───────────────────────────────────────────────────────────
      - name: Run smoke tests
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST_STAGING }}
          username: ${{ secrets.DEPLOY_USER_STAGING }}
          key:      ${{ secrets.DEPLOY_KEY_STAGING }}
          command_timeout: 10m
          script: |
            # Restart Chur to reset its in-memory rate limiter before smoke tests.
            # Chur uses an in-process sliding-window rate limiter for /auth/login.
            # When the image digest hasn't changed, `docker compose up -d` does NOT
            # recreate the container — so the rate limiter accumulates across pipeline
            # runs. Explicit restart guarantees a clean slate for S-01/S-03 tests.
            docker restart seer-studio-chur-1
            for i in $(seq 1 15); do
              curl -sf http://localhost:13000/health >/dev/null 2>&1 && break
              echo "Waiting for Chur health... (${i}/15)"; sleep 3
            done

            cd /opt/seer-studio
            DOMAIN=${{ secrets.DOMAIN_STAGING }} \
            bash scripts/smoke-test.sh

      # ── Integration tests ─────────────────────────────────────────────────────
      - name: Run integration tests
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST_STAGING }}
          username: ${{ secrets.DEPLOY_USER_STAGING }}
          key:      ${{ secrets.DEPLOY_KEY_STAGING }}
          command_timeout: 40m
          script: |
            # Restart Chur to reset rate limiter state accumulated during smoke tests.
            docker restart seer-studio-chur-1
            for i in $(seq 1 15); do
              curl -sf http://localhost:13000/health >/dev/null 2>&1 && break
              echo "Waiting for Chur health... (${i}/15)"; sleep 3
            done

            cd /opt/seer-studio
            # Minimal repo fixtures (2 SQL files per module) — stale full datasets
            # are wiped in "Ensure deploy dir is writable" before each SCP.
            DATA_DIR=/opt/seer-studio/tests/data/erp
            DOMAIN=${{ secrets.DOMAIN_STAGING }} \
            TENANT=acme-ci \
            DATA_DIR=${DATA_DIR} \
            bash scripts/integration-test.sh

      # ── Load test (опционально) ───────────────────────────────────────────────
      - name: Run load test (k6)
        if: ${{ github.event.inputs.run_load_test == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST_STAGING }}
          username: ${{ secrets.DEPLOY_USER_STAGING }}
          key:      ${{ secrets.DEPLOY_KEY_STAGING }}
          command_timeout: 30m
          script: |
            which k6 || {
              K6_VER=v0.55.0
              curl -sL "https://github.com/grafana/k6/releases/download/${K6_VER}/k6-${K6_VER}-linux-amd64.tar.gz" \
                -o /tmp/k6.tar.gz
              tar -xzf /tmp/k6.tar.gz -C /tmp
              sudo mv /tmp/k6-${K6_VER}-linux-amd64/k6 /usr/local/bin/k6
              rm -rf /tmp/k6.tar.gz /tmp/k6-${K6_VER}-linux-amd64
            }
            cd /opt/seer-studio
            DOMAIN=${{ secrets.DOMAIN_STAGING }} \
            k6 run scripts/load-test.js

      - name: Notify success
        if: success() && env.TELEGRAM_TOKEN != ''
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        uses: appleboy/telegram-action@v0.1.1
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Staging deployed
            SHA: `${{ github.sha }}`
            By: ${{ github.actor }}
            URL: https://seer.${{ secrets.DOMAIN_STAGING }}

      - name: Notify failure
        if: failure() && env.TELEGRAM_TOKEN != ''
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        uses: appleboy/telegram-action@v0.1.1
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Staging deploy FAILED
            SHA: `${{ github.sha }}`
            By: ${{ github.actor }}
            Check: https://github.com/${{ github.repository }}/actions
