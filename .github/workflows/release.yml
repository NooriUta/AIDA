name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release + CHANGELOG
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CHANGELOG for this release
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES_THIS_RELEASE.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Prepend to CHANGELOG.md
        run: |
          echo "## [${{ github.ref_name }}] — $(date -u +%Y-%m-%d)" > /tmp/header.md
          cat /tmp/header.md CHANGES_THIS_RELEASE.md CHANGELOG.md > /tmp/NEW_CHANGELOG.md
          mv /tmp/NEW_CHANGELOG.md CHANGELOG.md

      - name: Commit CHANGELOG.md to release
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin release
          git checkout release
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore(release): update CHANGELOG for ${{ github.ref_name }} [skip ci]"
          git push origin release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body_path: CHANGES_THIS_RELEASE.md
          draft: false
          prerelease: false
