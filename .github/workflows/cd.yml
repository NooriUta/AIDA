name: CD

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g. v1.0.0)'
        required: true
      deploy_mode:
        description: 'Deploy mode'
        required: false
        default: 'merge'
        type: choice
        options:
          - merge
          - init

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build + push Docker images to GHCR ──────────────────────────────────────
  build-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: verdandi
            context: ./frontends/verdandi
            dockerfile: ./frontends/verdandi/Dockerfile
          - service: chur
            context: ./bff/chur
            dockerfile: ./bff/chur/Dockerfile
          - service: shuttle
            context: .
            dockerfile: ./services/shuttle/Dockerfile
          - service: dali
            context: .
            dockerfile: ./services/dali/Dockerfile
          - service: heimdall-backend
            context: .
            dockerfile: ./services/heimdall-backend/Dockerfile
          - service: heimdall-frontend
            context: .
            dockerfile: ./frontends/heimdall-frontend/Dockerfile
          - service: shell
            context: .
            dockerfile: ./frontends/shell/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file:    ${{ matrix.dockerfile }}
          push: true
          build-args: |
            ${{ matrix.build_args }}
            ${{ matrix.service == 'shell' && format('DOMAIN={0}', secrets.DOMAIN) || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          tags: |
            ghcr.io/${{ env.OWNER }}/verdandi/${{ matrix.service }}:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER }}/verdandi/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/verdandi/${{ matrix.service }}:latest

  # ── Mirror GHCR → Yandex Container Registry (N-2) ───────────────────────────
  mirror-to-ycr:
    name: Mirror ${{ matrix.service }} → YCR
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        service: [verdandi, chur, shuttle, dali, heimdall-backend, heimdall-frontend, shell]
    steps:
      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.YC_SA_KEY }}

      - name: Pull from GHCR and push to YCR
        env:
          GHCR: ghcr.io/${{ env.OWNER }}/verdandi/${{ matrix.service }}
          YCR:  cr.yandex/${{ secrets.YC_REGISTRY_ID }}/${{ matrix.service }}
        # Retry up to 3 times — YCR occasionally has transient connectivity issues
        # from GitHub Actions runners (connection refused / dial tcp timeout).
        run: |
          for attempt in 1 2 3; do
            echo "=== Mirror attempt ${attempt}/3 ==="
            docker pull ${GHCR}:${{ github.ref_name }} \
              && docker tag  ${GHCR}:${{ github.ref_name }} ${YCR}:${{ github.ref_name }} \
              && docker tag  ${GHCR}:${{ github.ref_name }} ${YCR}:latest \
              && docker push ${YCR}:${{ github.ref_name }} \
              && docker push ${YCR}:latest \
              && break
            [ ${attempt} -lt 3 ] && echo "Attempt ${attempt} failed, retrying in 30s..." && sleep 30
          done

  # ── Deploy to production ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: mirror-to-ycr
    runs-on: ubuntu-latest
    # NOTE: no 'environment: production' — requires paid GitHub plan for private repos
    steps:
      - uses: actions/checkout@v4

      - name: Fix file permissions for scp
        run: |
          chmod -R a+r docker-compose.prod.yml docker-compose.yc.yml infra/keycloak/ infra/scripts/ infra/nginx/ scripts/
          chmod a+x infra/scripts/*.sh scripts/*.sh

      - name: Ensure deploy dir is writable
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            sudo mkdir -p /opt/seer-studio/infra/scripts /opt/seer-studio/infra/nginx /opt/seer-studio/scripts
            sudo chown -R ubuntu:ubuntu /opt/seer-studio

      - name: Copy prod compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          source:   docker-compose.prod.yml,docker-compose.yc.yml,infra/keycloak/,infra/scripts/,infra/nginx/,scripts/
          target:   /opt/seer-studio/

      - name: Write compose .env on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            # .env is auto-loaded by Docker Compose for ${VAR} interpolation in compose files
            # (different from .env.prod which is loaded into container environments)
            cat > /opt/seer-studio/.env << 'ENVEOF'
            DOMAIN=${{ secrets.DOMAIN }}
            YC_REGISTRY_ID=${{ secrets.YC_REGISTRY_ID }}
            IMAGE_TAG=${{ github.ref_name }}
            ENVEOF

      - name: Install nginx config on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            DOMAIN=${{ secrets.DOMAIN }}
            HEIMDALL_CIDR="${{ secrets.HEIMDALL_CIDR }}"
            CONF=/opt/seer-studio/infra/nginx/nginx.conf
            # IF-06: substitute DOMAIN and HEIMDALL_CIDR placeholders.
            # If HEIMDALL_CIDR secret is empty, fall back to deny-all (0.0.0.0/32)
            # to avoid nginx "invalid number of arguments in allow directive" error.
            CIDR="${HEIMDALL_CIDR:-0.0.0.0/32}"
            # Используем | как разделитель sed — CIDR содержит '/' что ломает стандартный s/.../
            sudo bash -c "sed 's|\${DOMAIN}|'"${DOMAIN}"'|g; s|\${HEIMDALL_CIDR}|'"${CIDR}"'|g' ${CONF} \
              > /etc/nginx/sites-available/aida"
            sudo ln -sf /etc/nginx/sites-available/aida /etc/nginx/sites-enabled/aida
            # Single SAN cert covers all three domains (certbot certonly with -d seer.* -d heimdall.*)
            # Directory named after the first -d argument only.
            if [ -f "/etc/letsencrypt/live/${DOMAIN}/fullchain.pem" ]; then
              sudo nginx -t && sudo systemctl restart nginx
            else
              echo "TLS cert not yet provisioned for ${DOMAIN} — skipping nginx reload"
            fi

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /opt/seer-studio

            # Sync secrets from Lockbox → .env.prod (if Lockbox is configured)
            if [ -f infra/scripts/lockbox-sync.sh ]; then
              infra/scripts/lockbox-sync.sh || echo "Lockbox sync skipped (not configured)"
            fi

            # Source secrets early — passwords needed for ArcadeDB health checks below
            source .env.prod 2>/dev/null || true

            # Remove yc credential helper for cr.yandex (conflicts with docker login)
            if [ -f ~/.docker/config.json ]; then
              jq 'del(.credHelpers["cr.yandex"])' ~/.docker/config.json \
                > /tmp/dc.json && mv /tmp/dc.json ~/.docker/config.json
            fi

            # Login to YCR via VM service account IAM token (metadata service)
            IAM_TOKEN=$(curl -sf -H "Metadata-Flavor: Google" \
              http://169.254.169.254/computeMetadata/v1/instance/service-accounts/default/token \
              | jq -r .access_token)
            echo "$IAM_TOKEN" | docker login cr.yandex -u iam --password-stdin

            # Load compose env vars
            export IMAGE_TAG=${{ github.ref_name }}
            export YC_REGISTRY_ID=${{ secrets.YC_REGISTRY_ID }}
            export DOMAIN=${{ secrets.DOMAIN }}
            export REPO=cr.yandex/${YC_REGISTRY_ID}

            # Pull new images from YCR
            for svc in verdandi chur shuttle dali heimdall-backend heimdall-frontend shell; do
              docker pull ${REPO}/${svc}:${IMAGE_TAG}
              docker tag  ${REPO}/${svc}:${IMAGE_TAG} ${REPO}/${svc}:latest
            done

            # ── Init deploy: wipe volumes for a clean start ───────────────────
            # Triggered only by workflow_dispatch with deploy_mode=init.
            # Destroys all FRIGG and YGG data — ArcadeDB will reinitialise
            # root password from JAVA_OPTS on next start.
            DEPLOY_MODE="${{ github.event.inputs.deploy_mode || 'merge' }}"
            if [ "$DEPLOY_MODE" = "init" ]; then
              echo "=== INIT DEPLOY: stopping stack and wiping DB volumes ==="
              docker compose \
                -f docker-compose.prod.yml \
                -f docker-compose.yc.yml \
                down --remove-orphans || true
              docker volume rm seer-studio_frigg_data   || true
              docker volume rm hound_databases          || true
              docker volume rm seer-studio_hound_config || true
              docker volume rm seer-studio_hound_logs   || true
              echo "=== Volumes removed — fresh start ==="
            fi

            # Ensure external volumes exist
            docker volume create hound_databases || true

            # Start stack (no --wait: app services need DBs which init creates below)
            docker compose \
              -f docker-compose.prod.yml \
              -f docker-compose.yc.yml \
              up -d --remove-orphans || {
                echo "=== docker compose up failed ==="
                docker ps -a
                docker logs seer-studio-chur-1     --tail 60 2>&1 || true
                docker logs seer-studio-keycloak-1 --tail 40 2>&1 || true
                exit 1
              }

            # ── Wait for infrastructure only: FRIGG, YGG, KC ──────────────────
            # Must run BEFORE init-arcadedb.sh. App services (Chur/Dali) are not
            # waited here — they depend on DBs that init creates.
            #
            # wait_infra <url> <name> [<user:pass>]
            #   • ArcadeDB /api/v1/ready requires Basic Auth (401 without creds)
            #   • Uses a function to correctly propagate non-zero exit on timeout
            #     (bare for-loop exits 0 if last cmd is `sleep`; function avoids this)
            wait_infra() {
              local url="$1" name="$2" auth="${3:-}"
              local auth_flag=""
              [ -n "$auth" ] && auth_flag="-u $auth"
              # Quick pre-check: if already ready (e.g. services Up 7+ days), return immediately
              if curl -sf $auth_flag "${url}" > /dev/null 2>&1; then
                echo "  [${name}] already ready"; return 0
              fi
              local i
              for i in $(seq 1 30); do
                if curl -sf $auth_flag "${url}" > /dev/null 2>&1; then
                  echo "  [${name}] ready"; return 0
                fi
                echo "  [${name}] retry ${i}/30..."; sleep 10
              done
              echo "=== ${name} not ready after 300s — aborting ==="; return 1
            }
            echo "=== Waiting for infrastructure ==="
            # ArcadeDB /api/v1/ready is unauthenticated (returns 204 without creds).
            # Sending wrong credentials causes 403 even when server is healthy — no auth here.
            wait_infra "http://localhost:2481/api/v1/ready"     "FRIGG" "" || exit 1
            wait_infra "http://localhost:2480/api/v1/ready"     "YGG"  "" || exit 1
            wait_infra "http://localhost:18180/kc/realms/master" "KC"   "" || exit 1

            # ── DB bootstrap / idempotent schema init ──────────────────────────
            # FRIGG + YGG + KC are ready. Creates frigg-tenants, dali_default,
            # hound_default, hound_src_default, seeds DaliTenantConfig('default').
            # App services become healthy once DBs exist.
            echo "=== Running init-arcadedb.sh ==="
            INIT_ARCADEDB_TIMEOUT=300 \
            FRIGG_URL=http://localhost:2481 \
            FRIGG_USER=root \
            FRIGG_PASS="${FRIGG_PASSWORD:-playwithdata}" \
            YGG_URL=http://localhost:2480 \
            YGG_USER=root \
            YGG_PASS="${ARCADEDB_ADMIN_PASSWORD:-playwithdata}" \
            KC_URL=http://localhost:18180/kc \
            KC_ADMIN_USER="${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}" \
            KC_ADMIN_PASS="${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}" \
            bash scripts/init-arcadedb.sh || {
              echo "=== init-arcadedb.sh FAILED (non-fatal on upgrade) ==="
              # Do not exit — partial failures are logged in the script itself.
              # Services will retry schema init on startup (FriggSchemaInitializer).
            }

            # Health checks (reuse wait_infra; Chur/Shuttle/Verdandi need no auth)
            echo "Waiting for services..."
            wait_infra "http://localhost:13000/health" "Chur"     "" || { echo "Chur health check FAILED";     exit 1; }
            wait_infra "http://localhost:18080/q/health" "SHUTTLE" "" || { echo "SHUTTLE health check FAILED"; exit 1; }
            wait_infra "http://localhost:15173/"        "Verdandi" "" || { echo "Verdandi health check FAILED"; exit 1; }
            echo "  All services OK"

            echo "Deploy OK — ${{ github.ref_name }} (${{ github.sha }})"

      - name: Notify success
        if: success() && env.TELEGRAM_TOKEN != ''
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        uses: appleboy/telegram-action@v0.1.1
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ SEER Studio deployed
            Version: `${{ github.ref_name }}`
            SHA: `${{ github.sha }}`
            By: ${{ github.actor }}

      - name: Notify failure
        if: failure() && env.TELEGRAM_TOKEN != ''
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        uses: appleboy/telegram-action@v0.1.1
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ SEER Studio deploy FAILED
            SHA: `${{ github.sha }}`
            By: ${{ github.actor }}
            Check: https://github.com/${{ github.repository }}/actions
