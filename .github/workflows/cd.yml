name: CD

on:
  push:
    branches: [master]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build + push Docker images to GHCR ──────────────────────────────────────
  build-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: verdandi
            context: ./frontends/verdandi
            dockerfile: ./frontends/verdandi/Dockerfile
          - service: chur
            context: ./bff/chur
            dockerfile: ./bff/chur/Dockerfile
          - service: shuttle
            context: ./services/shuttle
            dockerfile: ./services/shuttle/Dockerfile
          - service: dali
            context: .
            dockerfile: ./services/dali/Dockerfile
          - service: heimdall-backend
            context: .
            dockerfile: ./services/heimdall-backend/Dockerfile
          - service: heimdall-frontend
            context: .
            dockerfile: ./frontends/heimdall-frontend/Dockerfile
          - service: shell
            context: .
            dockerfile: ./frontends/shell/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file:    ${{ matrix.dockerfile }}
          push: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          tags: |
            ghcr.io/${{ env.OWNER }}/verdandi/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/verdandi/${{ matrix.service }}:latest

  # ── Mirror GHCR → Yandex Container Registry (N-2) ───────────────────────────
  mirror-to-ycr:
    name: Mirror ${{ matrix.service }} → YCR
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        service: [verdandi, chur, shuttle, dali, heimdall-backend, heimdall-frontend, shell]
    steps:
      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.YC_SA_KEY }}

      - name: Pull from GHCR and push to YCR
        env:
          GHCR: ghcr.io/${{ env.OWNER }}/verdandi/${{ matrix.service }}
          YCR:  cr.yandex/${{ secrets.YC_REGISTRY_ID }}/${{ matrix.service }}
        run: |
          docker pull ${GHCR}:${{ github.sha }}
          docker tag  ${GHCR}:${{ github.sha }} ${YCR}:${{ github.sha }}
          docker tag  ${GHCR}:${{ github.sha }} ${YCR}:latest
          docker push ${YCR}:${{ github.sha }}
          docker push ${YCR}:latest

  # ── Deploy to production ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: mirror-to-ycr
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Fix file permissions for scp
        run: |
          chmod -R a+r docker-compose.prod.yml docker-compose.yc.yml infra/keycloak/ infra/scripts/
          chmod a+x infra/scripts/*.sh

      - name: Ensure deploy dir is writable
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script:   sudo mkdir -p /opt/seer-studio/infra/scripts && sudo chown -R ubuntu:ubuntu /opt/seer-studio

      - name: Copy prod compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          source:   docker-compose.prod.yml,docker-compose.yc.yml,infra/keycloak/,infra/scripts/
          target:   /opt/seer-studio/

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/seer-studio

            # Sync secrets from Lockbox → .env.prod
            /opt/seer-studio/infra/scripts/lockbox-sync.sh

            # Remove yc credential helper for cr.yandex (conflicts with docker login)
            jq 'del(.credHelpers["cr.yandex"])' ~/.docker/config.json \
              > /tmp/dc.json && mv /tmp/dc.json ~/.docker/config.json

            # Login to YCR via VM service account IAM token (metadata service)
            IAM_TOKEN=$(curl -sf -H "Metadata-Flavor: Google" \
              http://169.254.169.254/computeMetadata/v1/instance/service-accounts/default/token \
              | jq -r .access_token)
            echo "$IAM_TOKEN" | docker login cr.yandex -u iam --password-stdin

            # Pull new images from YCR (faster in YC region)
            export IMAGE_TAG=${{ github.sha }}
            export REPO=cr.yandex/${{ secrets.YC_REGISTRY_ID }}
            export YC_REGISTRY_ID=${{ secrets.YC_REGISTRY_ID }}
            export DOMAIN=${{ secrets.DOMAIN }}

            docker pull ${REPO}/verdandi:${IMAGE_TAG}
            docker pull ${REPO}/chur:${IMAGE_TAG}
            docker pull ${REPO}/shuttle:${IMAGE_TAG}
            docker pull ${REPO}/dali:${IMAGE_TAG}
            docker pull ${REPO}/heimdall-backend:${IMAGE_TAG}
            docker pull ${REPO}/heimdall-frontend:${IMAGE_TAG}
            docker pull ${REPO}/shell:${IMAGE_TAG}

            # Tag as latest locally
            docker tag ${REPO}/verdandi:${IMAGE_TAG}          ${REPO}/verdandi:latest
            docker tag ${REPO}/chur:${IMAGE_TAG}              ${REPO}/chur:latest
            docker tag ${REPO}/shuttle:${IMAGE_TAG}           ${REPO}/shuttle:latest
            docker tag ${REPO}/dali:${IMAGE_TAG}              ${REPO}/dali:latest
            docker tag ${REPO}/heimdall-backend:${IMAGE_TAG}  ${REPO}/heimdall-backend:latest
            docker tag ${REPO}/heimdall-frontend:${IMAGE_TAG} ${REPO}/heimdall-frontend:latest
            docker tag ${REPO}/shell:${IMAGE_TAG}             ${REPO}/shell:latest

            # Ensure external volumes exist (idempotent)
            docker volume create hound_databases || true

            # Restart stack (force-recreate so fresh .env.prod is picked up)
            docker compose \
              -f docker-compose.prod.yml \
              -f docker-compose.yc.yml \
              up -d --remove-orphans --force-recreate || {
                echo "=== docker compose up failed, dumping logs ==="
                docker ps -a
                docker logs seer-studio-chur-1    --tail 60 2>&1 || true
                docker logs seer-studio-shuttle-1 --tail 40 2>&1 || true
                docker logs Ygg-1                 --tail 20 2>&1 || true
                exit 1
              }

            # Health checks with retry loop (K-8: replaces sleep 15)
            echo "Waiting for services..."
            for svc in \
              "http://localhost:13000/health:Chur" \
              "http://localhost:18080/q/health:SHUTTLE" \
              "http://localhost:15173/:verdandi"; do
              url="${svc%%:*}"
              name="${svc##*:}"
              for i in $(seq 1 10); do
                curl -sf "${url}" && break
                echo "  [${name}] retry ${i}/10..." ; sleep 5
              done || { echo "${name} health check FAILED"; exit 1; }
              echo "  [${name}] OK"
            done

            echo "Deploy OK — ${{ github.sha }}"

      - name: Notify success
        if: success() && env.TELEGRAM_TOKEN != ''
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        uses: appleboy/telegram-action@v0.1.1
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ SEER Studio deployed
            SHA: `${{ github.sha }}`
            By: ${{ github.actor }}
            ${{ github.event.head_commit.message }}

      - name: Notify failure
        if: failure() && env.TELEGRAM_TOKEN != ''
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        uses: appleboy/telegram-action@v0.1.1
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ SEER Studio deploy FAILED
            SHA: `${{ github.sha }}`
            By: ${{ github.actor }}
            Check: https://github.com/${{ github.repository }}/actions
