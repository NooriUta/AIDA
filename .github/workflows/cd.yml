name: CD

on:
  push:
    branches: [master]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build + push Docker images to GHCR ──────────────────────────────────────
  build-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: verdandi
            context: ./frontends/verdandi
          - service: chur
            context: ./bff/chur
          - service: shuttle
            context: ./services/shuttle
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/verdandi/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/verdandi/${{ matrix.service }}:latest

  # ── Deploy to production ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy prod compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          source:   docker-compose.prod.yml,infra/keycloak/
          target:   /opt/seer-studio/

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/seer-studio

            # Login to GHCR on server
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pin to exact SHA for this deploy
            export IMAGE_TAG=${{ github.sha }}
            export REPO=ghcr.io/${{ github.repository_owner }}/verdandi

            # Pull new images
            docker pull ${REPO}/verdandi:${IMAGE_TAG}
            docker pull ${REPO}/chur:${IMAGE_TAG}
            docker pull ${REPO}/shuttle:${IMAGE_TAG}

            # Tag as latest locally
            docker tag ${REPO}/verdandi:${IMAGE_TAG} ${REPO}/verdandi:latest
            docker tag ${REPO}/chur:${IMAGE_TAG}     ${REPO}/chur:latest
            docker tag ${REPO}/shuttle:${IMAGE_TAG}  ${REPO}/shuttle:latest

            # Restart stack
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for services to start
            sleep 15

            # Health checks
            curl -sf http://localhost:13000/health  || { echo "Chur health failed";    exit 1; }
            curl -sf http://localhost:18080/q/health || { echo "SHUTTLE health failed"; exit 1; }
            curl -sf http://localhost:15173          || { echo "verdandi health failed"; exit 1; }

            echo "Deploy OK — ${{ github.sha }}"

      - name: Notify success
        if: success() && secrets.TELEGRAM_TOKEN != ''
        uses: appleboy/telegram-action@v0.1.1
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ SEER Studio deployed
            SHA: `${{ github.sha }}`
            By: ${{ github.actor }}
            ${{ github.event.head_commit.message }}

      - name: Notify failure
        if: failure() && secrets.TELEGRAM_TOKEN != ''
        uses: appleboy/telegram-action@v0.1.1
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ SEER Studio deploy FAILED
            SHA: `${{ github.sha }}`
            By: ${{ github.actor }}
            Check: https://github.com/${{ github.repository }}/actions
