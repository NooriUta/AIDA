name: CD

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g. v1.0.0)'
        required: true
      deploy_mode:
        description: 'Deploy mode'
        required: false
        default: 'merge'
        type: choice
        options:
          - merge
          - init

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false   # never cancel a running prod deploy — queue instead

jobs:
  # ── Notify prod CD start + collect changelog ─────────────────────────────────
  notify-start:
    name: Notify prod CD start
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      prev_tag:    ${{ steps.meta.outputs.prev_tag }}
      # Base64-encoded changelog — safe across job boundaries (no shell-quoting issues
      # with commit messages that contain quotes, $, backticks, etc.)
      changelog_b64: ${{ steps.meta.outputs.changelog_b64 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect release metadata + send start notification
        id: meta
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RELEASE_TAG="${{ inputs.tag || github.ref_name }}"
          echo "release_tag=${RELEASE_TAG}" >> $GITHUB_OUTPUT

          # Previous semver tag (exclude the tag being deployed — may not exist yet)
          PREV=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${RELEASE_TAG}$" \
            | head -1 || true)
          echo "prev_tag=${PREV:-none}" >> $GITHUB_OUTPUT

          # Commits since prev tag — subject only, max 20, no merges
          if [ -n "$PREV" ]; then
            LOG=$(git log "${PREV}..HEAD" --format="• %s" --no-merges | head -20)
            FROM_LABEL="since ${PREV}"
          else
            LOG=$(git log --format="• %s" --no-merges -10)
            FROM_LABEL="(first release)"
          fi

          # Base64-encode so special chars in commit messages don't break outputs
          echo "changelog_b64=$(echo "$LOG" | base64 -w0)" >> $GITHUB_OUTPUT

          # Send Telegram notification (skip silently if token not configured)
          [ -z "${TG_TOKEN}" ] && exit 0

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf "🚀 Prod CD started — %s\nBuild → Mirror YCR → Deploy\n\nChanges %s:\n%s\n\nRun: %s" \
            "$RELEASE_TAG" "$FROM_LABEL" "$LOG" "$RUN_URL")

          jq -n --arg chat "$TG_CHAT" --arg text "$MSG" \
            '{"chat_id":$chat,"text":$text}' \
          | curl -sf -X POST \
              "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d @- || true

  # ── Build + push Docker images to GHCR ──────────────────────────────────────
  build-push:
    name: Build & push ${{ matrix.service }}
    needs: notify-start
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: verdandi
            context: ./frontends/verdandi
            dockerfile: ./frontends/verdandi/Dockerfile
          - service: chur
            context: ./bff/chur
            dockerfile: ./bff/chur/Dockerfile
          - service: shuttle
            context: .
            dockerfile: ./services/shuttle/Dockerfile
          - service: dali
            context: .
            dockerfile: ./services/dali/Dockerfile
          - service: heimdall-backend
            context: .
            dockerfile: ./services/heimdall-backend/Dockerfile
          - service: heimdall-frontend
            context: .
            dockerfile: ./frontends/heimdall-frontend/Dockerfile
          - service: shell
            context: .
            dockerfile: ./frontends/shell/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set release tag and lowercase owner
        run: |
          echo "RELEASE_TAG=${{ inputs.tag || github.ref_name }}" >> $GITHUB_ENV
          echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file:    ${{ matrix.dockerfile }}
          push: true
          build-args: |
            ${{ matrix.build_args }}
            ${{ matrix.service == 'shell' && format('DOMAIN={0}', secrets.DOMAIN) || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          tags: |
            ghcr.io/${{ env.OWNER }}/verdandi/${{ matrix.service }}:${{ env.RELEASE_TAG }}
            ghcr.io/${{ env.OWNER }}/verdandi/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/verdandi/${{ matrix.service }}:latest

  # ── Mirror GHCR → Yandex Container Registry (N-2) ───────────────────────────
  mirror-to-ycr:
    name: Mirror ${{ matrix.service }} → YCR
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        service: [verdandi, chur, shuttle, dali, heimdall-backend, heimdall-frontend, shell]
    steps:
      - name: Set release tag and lowercase owner
        run: |
          echo "RELEASE_TAG=${{ inputs.tag || github.ref_name }}" >> $GITHUB_ENV
          echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.YC_SA_KEY }}

      - name: Pull from GHCR and push to YCR
        env:
          GHCR: ghcr.io/${{ env.OWNER }}/verdandi/${{ matrix.service }}
          YCR:  cr.yandex/${{ secrets.YC_REGISTRY_ID }}/${{ matrix.service }}
        # Retry up to 3 times — YCR occasionally has transient connectivity issues
        # from GitHub Actions runners (connection refused / dial tcp timeout).
        run: |
          for attempt in 1 2 3; do
            echo "=== Mirror attempt ${attempt}/3 ==="
            docker pull ${GHCR}:${{ env.RELEASE_TAG }} \
              && docker tag  ${GHCR}:${{ env.RELEASE_TAG }} ${YCR}:${{ env.RELEASE_TAG }} \
              && docker tag  ${GHCR}:${{ env.RELEASE_TAG }} ${YCR}:latest \
              && docker push ${YCR}:${{ env.RELEASE_TAG }} \
              && docker push ${YCR}:latest \
              && break
            [ ${attempt} -lt 3 ] && echo "Attempt ${attempt} failed, retrying in 30s..." && sleep 30
          done

  # ── Deploy to production ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: [mirror-to-ycr, notify-start]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for git tag push after successful prod deploy
    # NOTE: no 'environment: production' — requires paid GitHub plan for private repos
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set release tag
        run: echo "RELEASE_TAG=${{ inputs.tag || github.ref_name }}" >> $GITHUB_ENV

      - name: Fix file permissions for scp
        run: |
          chmod -R a+r docker-compose.prod.yml docker-compose.yc.yml infra/keycloak/ infra/scripts/ infra/nginx/ scripts/
          chmod a+x infra/scripts/*.sh scripts/*.sh

      - name: Ensure deploy dir is writable
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            sudo mkdir -p /opt/seer-studio/infra/scripts /opt/seer-studio/infra/nginx /opt/seer-studio/scripts
            sudo chown -R ubuntu:ubuntu /opt/seer-studio

      - name: Copy prod compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          source:   docker-compose.prod.yml,docker-compose.yc.yml,infra/keycloak/,infra/scripts/,infra/nginx/,scripts/
          target:   /opt/seer-studio/

      - name: Write compose .env on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            # .env is auto-loaded by Docker Compose for ${VAR} interpolation in compose files
            # (different from .env.prod which is loaded into container environments)
            cat > /opt/seer-studio/.env << 'ENVEOF'
            DOMAIN=${{ secrets.DOMAIN }}
            YC_REGISTRY_ID=${{ secrets.YC_REGISTRY_ID }}
            IMAGE_TAG=${{ github.ref_name }}
            ENVEOF

      - name: Install nginx config on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            DOMAIN=${{ secrets.DOMAIN }}
            HEIMDALL_CIDR="${{ secrets.HEIMDALL_CIDR }}"
            CONF=/opt/seer-studio/infra/nginx/nginx.conf
            # IF-06: substitute DOMAIN and HEIMDALL_CIDR placeholders.
            # If HEIMDALL_CIDR secret is empty, fall back to deny-all (0.0.0.0/32)
            # to avoid nginx "invalid number of arguments in allow directive" error.
            CIDR="${HEIMDALL_CIDR:-0.0.0.0/32}"
            # Используем | как разделитель sed — CIDR содержит '/' что ломает стандартный s/.../
            sudo bash -c "sed 's|\${DOMAIN}|'"${DOMAIN}"'|g; s|\${HEIMDALL_CIDR}|'"${CIDR}"'|g' ${CONF} \
              > /etc/nginx/sites-available/aida"
            sudo ln -sf /etc/nginx/sites-available/aida /etc/nginx/sites-enabled/aida
            # Webroot for ACME http-01 challenge (nginx.conf serves /.well-known/acme-challenge/)
            sudo mkdir -p /var/www/certbot
            # First: reload nginx so the ACME challenge location is active for certbot --webroot.
            # nginx -t may fail if cert is missing — use || true here; final reload below is fatal.
            if sudo nginx -t 2>/dev/null; then sudo systemctl reload nginx; fi
            # Ensure cert covers all required SANs (${DOMAIN}, seer.${DOMAIN}, heimdall.${DOMAIN}).
            # Cloud-init only issues cert for ${DOMAIN} alone — expand when SANs are missing.
            if command -v certbot >/dev/null 2>&1; then
              # Find the cert that already has all required SANs (any cert name)
              CERT_NAME=$(sudo certbot certificates 2>/dev/null | awk \
                '/Certificate Name:/{n=$3} /Domains:.*seer\.'"${DOMAIN}"'/{print n; exit}')
              CERT_NAME="${CERT_NAME:-}"
              if [ -n "${CERT_NAME}" ]; then
                CERT_FILE="/etc/letsencrypt/live/${CERT_NAME}/fullchain.pem"
                SAN=$(sudo openssl x509 -in "${CERT_FILE}" -noout -ext subjectAltName 2>/dev/null || echo "")
                NEED_EXPAND=0
                for d in "seer.${DOMAIN}" "heimdall.${DOMAIN}"; do
                  echo "${SAN}" | grep -qF "${d}" || NEED_EXPAND=1
                done
              else
                NEED_EXPAND=1
              fi
              if [ "${NEED_EXPAND}" = "1" ]; then
                echo "=== Issuing/expanding SAN cert for all domains ==="
                sudo certbot certonly --webroot -w /var/www/certbot \
                  -d "${DOMAIN}" -d "seer.${DOMAIN}" -d "heimdall.${DOMAIN}" \
                  --non-interactive --agree-tos \
                  --email "admin@${DOMAIN}" \
                  --expand \
                  && echo "Cert OK" \
                  || echo "WARNING: certbot failed — check /var/log/letsencrypt/letsencrypt.log"
                # Re-detect cert name after issuance
                CERT_NAME=$(sudo certbot certificates 2>/dev/null | awk \
                  '/Certificate Name:/{n=$3} /Domains:.*seer\.'"${DOMAIN}"'/{print n; exit}')
                CERT_NAME="${CERT_NAME:-${DOMAIN}}"
              else
                # All SANs present — renew if within 30 days of expiry (idempotent)
                sudo certbot renew --quiet \
                  --deploy-hook "systemctl reload nginx" || true
              fi
              # Patch nginx cert path if certbot stored cert under a different name than ${DOMAIN}
              if [ "${CERT_NAME}" != "${DOMAIN}" ]; then
                echo "=== Patching nginx cert path: ${DOMAIN} → ${CERT_NAME} ==="
                sudo sed -i "s|/live/${DOMAIN}/|/live/${CERT_NAME}/|g" \
                  /etc/nginx/sites-available/aida
              fi
            fi
            # Final reload with correct cert path
            if sudo nginx -t 2>/dev/null; then
              sudo systemctl reload nginx
              echo "Nginx reloaded OK"
            else
              echo "Nginx config test failed — check cert path"
              sudo nginx -t
            fi

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          command_timeout: 50m
          script: |
            set -e
            cd /opt/seer-studio

            # Sync secrets from Lockbox → .env.prod (if Lockbox is configured)
            if [ -f infra/scripts/lockbox-sync.sh ]; then
              infra/scripts/lockbox-sync.sh || echo "Lockbox sync skipped (not configured)"
            fi

            # Source secrets and auto-export all vars so docker compose child process
            # inherits FRIGG_PASSWORD, ARCADEDB_ADMIN_PASSWORD, etc.
            # Without set -a, sourced vars are shell-local and docker compose falls
            # back to :-playwithdata defaults → ArcadeDB gets wrong password.
            set -a; source .env.prod 2>/dev/null || true; set +a

            # Remove yc credential helper for cr.yandex (conflicts with docker login)
            if [ -f ~/.docker/config.json ]; then
              jq 'del(.credHelpers["cr.yandex"])' ~/.docker/config.json \
                > /tmp/dc.json && mv /tmp/dc.json ~/.docker/config.json
            fi

            # Login to YCR via VM service account IAM token (metadata service)
            IAM_TOKEN=$(curl -sf -H "Metadata-Flavor: Google" \
              http://169.254.169.254/computeMetadata/v1/instance/service-accounts/default/token \
              | jq -r .access_token)
            echo "$IAM_TOKEN" | docker login cr.yandex -u iam --password-stdin

            # Load compose env vars
            export IMAGE_TAG=${{ env.RELEASE_TAG }}
            export YC_REGISTRY_ID=${{ secrets.YC_REGISTRY_ID }}
            export DOMAIN=${{ secrets.DOMAIN }}
            export REPO=cr.yandex/${YC_REGISTRY_ID}

            # Pull new images from YCR
            for svc in verdandi chur shuttle dali heimdall-backend heimdall-frontend shell; do
              docker pull ${REPO}/${svc}:${IMAGE_TAG}
              docker tag  ${REPO}/${svc}:${IMAGE_TAG} ${REPO}/${svc}:latest
            done

            DEPLOY_MODE="${{ github.event.inputs.deploy_mode || 'merge' }}"

            # ── MERGE deploy: backup DBs → graceful stop → compose up ─────────
            # Standard upgrade path: preserves data.
            # Backup via ArcadeDB API (non-fatal: skip if DBs not running yet).
            # Graceful stop of DB containers ensures clean shutdown before new
            # version starts (avoids journal corruption on ArcadeDB upgrade).
            if [ "$DEPLOY_MODE" = "merge" ]; then
              echo "=== MERGE DEPLOY: backup + graceful DB stop ==="

              FRIGG_READY=$(curl -sf -o /dev/null -w "%{http_code}" \
                http://localhost:2481/api/v1/ready 2>/dev/null || echo "000")
              YGG_READY=$(curl -sf -o /dev/null -w "%{http_code}" \
                http://localhost:2480/api/v1/ready 2>/dev/null || echo "000")

              if [ "${FRIGG_READY}" = "204" ] || [ "${YGG_READY}" = "204" ]; then
                echo "=== Databases up — running pre-upgrade backup ==="
                bash infra/scripts/backup-arcadedb.sh \
                  || echo "[backup] WARNING: backup failed or incomplete (deploy continues)"
              else
                echo "=== Databases not running — skipping backup (first deploy) ==="
              fi

              echo "=== Stopping DB containers for upgrade ==="
              docker compose -f docker-compose.prod.yml -f docker-compose.yc.yml \
                stop frigg ygg 2>/dev/null || true
              sleep 5  # Wait for graceful ArcadeDB shutdown (flushes WAL)
            fi

            # ── INIT deploy: wipe all volumes for a clean start ───────────────
            # Triggered manually with deploy_mode=init.
            # Destroys ALL FRIGG and YGG data — use only for first deploy or
            # disaster recovery. Data is intentionally not backed up here since
            # init = "start from scratch".
            if [ "$DEPLOY_MODE" = "init" ]; then
              echo "=== INIT DEPLOY: stopping stack and wiping DB volumes ==="
              docker compose \
                -f docker-compose.prod.yml \
                -f docker-compose.yc.yml \
                down --remove-orphans || true
              docker volume rm seer-studio_frigg_data   || true
              docker volume rm hound_databases          || true
              docker volume rm seer-studio_hound_config || true
              docker volume rm seer-studio_hound_logs   || true
              echo "=== Volumes removed — fresh start ==="
            fi

            # Ensure external volumes exist
            docker volume create hound_databases || true

            # Start stack (no --wait: app services need DBs which init creates below)
            docker compose \
              -f docker-compose.prod.yml \
              -f docker-compose.yc.yml \
              up -d --remove-orphans || {
                echo "=== docker compose up failed ==="
                docker ps -a
                docker logs seer-studio-frigg-1    --tail 40 2>&1 || true
                docker logs Ygg-1                  --tail 40 2>&1 || true
                docker logs seer-studio-chur-1     --tail 60 2>&1 || true
                docker logs seer-studio-keycloak-1 --tail 40 2>&1 || true
                exit 1
              }

            # ── Capture early FRIGG/YGG startup logs (before wait loop) ──────────
            # Give ArcadeDB containers 15s to emit initial log lines, then capture.
            # This appears in GitHub Actions output even if containers crash later.
            sleep 15
            echo "=== FRIGG early logs ==="
            docker logs seer-studio-frigg-1 --tail 60 2>&1 || true
            echo "=== YGG early logs ==="
            docker logs Ygg-1 --tail 40 2>&1 || true
            echo "=== FRIGG inspect ==="
            docker inspect seer-studio-frigg-1 \
              --format='ExitCode={{.State.ExitCode}}  OOMKilled={{.State.OOMKilled}}  Running={{.State.Running}}' \
              2>/dev/null || true

            # ── Wait for infrastructure only: FRIGG, YGG, KC ──────────────────
            # Must run BEFORE init-arcadedb.sh. App services (Chur/Dali) are not
            # waited here — they depend on DBs that init creates.
            #
            # wait_infra <url> <name> [<user:pass>]
            #   • ArcadeDB /api/v1/ready requires Basic Auth (401 without creds)
            #   • Uses a function to correctly propagate non-zero exit on timeout
            #     (bare for-loop exits 0 if last cmd is `sleep`; function avoids this)
            wait_infra() {
              local url="$1" name="$2" auth="${3:-}" retries="${4:-60}"
              local auth_flag=""
              [ -n "$auth" ] && auth_flag="-u $auth"
              # Quick pre-check: if already ready (e.g. services Up 7+ days), return immediately
              if curl -sf $auth_flag "${url}" > /dev/null 2>&1; then
                echo "  [${name}] already ready"; return 0
              fi
              local i
              for i in $(seq 1 "$retries"); do
                if curl -sf $auth_flag "${url}" > /dev/null 2>&1; then
                  echo "  [${name}] ready in $((i * 10))s"; return 0
                fi
                echo "  [${name}] retry ${i}/${retries}..."; sleep 10
              done
              echo "=== ${name} not ready after $((retries * 10))s — diagnostics ==="
              docker ps -a --format "  {{.Names}}  {{.Status}}  {{.Image}}" 2>/dev/null || true
              docker stats --no-stream --format "  {{.Name}}  mem={{.MemUsage}}  cpu={{.CPUPerc}}" 2>/dev/null || true
              local svcname="${name,,}"; svcname="${svcname//(/}"; svcname="${svcname//)/}"
              docker logs "seer-studio-${svcname}-1" --tail 40 2>&1 || \
              docker logs "${svcname}-1"             --tail 40 2>&1 || true
              return 1
            }
            echo "=== Waiting for infrastructure ==="
            # ArcadeDB /api/v1/ready is unauthenticated (returns 204 without creds).
            # Sending wrong credentials causes 403 even when server is healthy — no auth here.
            wait_infra "http://localhost:2481/api/v1/ready"      "FRIGG"    "" || exit 1
            wait_infra "http://localhost:2480/api/v1/ready"      "YGG"     "" || exit 1
            # Wait for seer realm (not master) — seer realm may finish importing
            # after master is ready (--import-realm runs asynchronously in KC startup)
            wait_infra "http://localhost:18180/kc/realms/seer"   "KC(seer)" "" || exit 1

            # ── Version assertions (fatal on prod) ────────────────────────────
            # Abort deploy if ArcadeDB or KC image tag doesn't match the pinned version
            # in docker-compose.prod.yml. Uses docker inspect — ArcadeDB /api/v1/server
            # and KC realm endpoint don't expose a parseable version in these releases.
            echo "=== Version assertions ==="
            FRIGG_IMAGE=$(docker inspect seer-studio-frigg-1 --format='{{.Config.Image}}' 2>/dev/null || echo "?")
            echo "  FRIGG: ${FRIGG_IMAGE}"
            echo "${FRIGG_IMAGE}" | grep -qF "26.4.2" \
              || { echo "ERROR: FRIGG version mismatch — expected 26.4.2 (update assert or image pin)"; exit 1; }

            YGG_IMAGE=$(docker inspect Ygg-1 --format='{{.Config.Image}}' 2>/dev/null || echo "?")
            echo "  YGG: ${YGG_IMAGE}"
            echo "${YGG_IMAGE}" | grep -qF "26.4.2" \
              || { echo "ERROR: YGG version mismatch — expected 26.4.2 (update assert or image pin)"; exit 1; }

            KC_IMAGE=$(docker inspect seer-studio-keycloak-1 --format='{{.Config.Image}}' 2>/dev/null || echo "?")
            echo "  KC: ${KC_IMAGE}"
            echo "${KC_IMAGE}" | grep -qF "26.6.1" \
              || { echo "ERROR: KC version mismatch — expected 26.6.1 (update assert or image pin)"; exit 1; }

            # ── DB bootstrap / idempotent schema init ──────────────────────────
            # FRIGG + YGG + KC are ready. Creates frigg-tenants, dali_default,
            # hound_default, hound_src_default, seeds DaliTenantConfig('default').
            # App services become healthy once DBs exist.
            echo "=== Running init-arcadedb.sh ==="
            INIT_ARCADEDB_TIMEOUT=300 \
            FRIGG_URL=http://localhost:2481 \
            FRIGG_USER=root \
            FRIGG_PASS="${FRIGG_PASSWORD}" \
            YGG_URL=http://localhost:2480 \
            YGG_USER=root \
            YGG_PASS="${ARCADEDB_ADMIN_PASSWORD}" \
            KC_URL=http://localhost:18180/kc \
            KC_ADMIN_USER="${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}" \
            KC_ADMIN_PASS="${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}" \
            bash scripts/init-arcadedb.sh || {
              echo "=== init-arcadedb.sh FAILED (non-fatal on upgrade) ==="
              # Do not exit — partial failures are logged in the script itself.
              # Services will retry schema init on startup (FriggSchemaInitializer).
            }

            # ── YGG + FRIGG warm-up probe ─────────────────────────────────────
            # ArcadeDB lists databases in /api/v1/databases before actually opening them.
            # init-arcadedb.sh skips creation when a DB is listed, but the DB may still
            # be unavailable (WAL replay, corrupt journal, etc.).
            # Probing with SELECT 1 forces ArcadeDB to open each DB before app services start.
            # On prod: NO auto-recreate — if a DB is inaccessible, abort and alert.
            echo "=== YGG/FRIGG database warm-up probe ==="
            probe_db() {
              local base_url="$1" pass="$2" db="$3"
              local ok=0
              for i in $(seq 1 18); do
                CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
                  -u "root:${pass}" -X POST "${base_url}/api/v1/query/${db}" \
                  -H "Content-Type: application/json" \
                  -d '{"language":"sql","command":"SELECT 1","params":{}}' 2>/dev/null || echo "000")
                if [ "$CODE" = "200" ]; then
                  echo "  [${db}] warm — OK (attempt ${i})"; ok=1; break
                fi
                echo "  [${db}] probe ${i}/18 HTTP ${CODE}..."; sleep 5
              done
              if [ "$ok" = "0" ]; then
                echo "ERROR: [${db}] not available after 90s — aborting deploy (check backup + restore)"
                return 1
              fi
            }
            probe_db "http://localhost:2480" "${ARCADEDB_ADMIN_PASSWORD}" "hound_default"     || exit 1
            probe_db "http://localhost:2480" "${ARCADEDB_ADMIN_PASSWORD}" "hound_src_default" || exit 1
            probe_db "http://localhost:2481" "${FRIGG_PASSWORD}"          "frigg-tenants"     || exit 1
            probe_db "http://localhost:2481" "${FRIGG_PASSWORD}"          "frigg-sessions"    || exit 1
            probe_db "http://localhost:2481" "${FRIGG_PASSWORD}"          "dali"              || exit 1
            probe_db "http://localhost:2481" "${FRIGG_PASSWORD}"          "dali_default"      || exit 1
            probe_db "http://localhost:2481" "${FRIGG_PASSWORD}"          "heimdall"          || exit 1

            # Health checks (reuse wait_infra; Chur/Shuttle/Verdandi need no auth)
            echo "Waiting for services..."
            wait_infra "http://localhost:13000/health"   "Chur"             "" || { echo "Chur health check FAILED";             exit 1; }
            wait_infra "http://localhost:18080/q/health" "Shuttle"          "" || { echo "Shuttle health check FAILED";          exit 1; }
            wait_infra "http://localhost:15173/"         "Verdandi"         "" || { echo "Verdandi health check FAILED";         exit 1; }
            wait_infra "http://localhost:19090/q/health" "Dali"             "" || { echo "Dali health check FAILED";             exit 1; }
            wait_infra "http://localhost:19093/q/health" "heimdall-backend" "" || { echo "heimdall-backend health check FAILED"; exit 1; }
            # FIX-2: Keycloak — prod auth depends on KC. .well-known endpoint returns 200 when realm is up.
            wait_infra "http://localhost:18180/kc/realms/seer/.well-known/openid-configuration" "Keycloak" "" || { echo "Keycloak health check FAILED"; exit 1; }
            echo "  All services OK"

            echo "Deploy OK — ${{ env.RELEASE_TAG }} (${{ github.sha }})"

      # ── Sync master to release HEAD (master = prod) ───────────────────────────
      # Policy: master IS the production branch. After successful prod deploy,
      # fast-forward master to current release HEAD so master always reflects
      # what's actually running in prod. Tag is then created on master HEAD.
      # Only fires on workflow_dispatch from cd-release.yml.
      - name: Fast-forward master to release (prod-verified)
        if: success() && github.event_name == 'workflow_dispatch' && inputs.tag != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Fetch current master to verify FF is possible
          git fetch origin master
          # Check master is ancestor of current HEAD (release)
          if git merge-base --is-ancestor origin/master HEAD; then
            git push origin HEAD:master
            echo "✅ master fast-forwarded to ${{ github.sha }}"
          else
            echo "::warning::master is not an ancestor of release HEAD — manual reconciliation needed"
            echo "  master: $(git rev-parse origin/master)"
            echo "  release: ${{ github.sha }}"
          fi

      # ── Create git tag after successful prod deploy ───────────────────────────
      # Tag is created HERE (after prod verified + master synced), not in cd-release.yml.
      # Only when triggered via workflow_dispatch from cd-release.yml (inputs.tag set).
      # For push:tags trigger (manual/legacy), tag already exists — skip.
      - name: Create and push release tag (prod-verified)
        if: success() && github.event_name == 'workflow_dispatch' && inputs.tag != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -d "${{ env.RELEASE_TAG }}" 2>/dev/null || true
          git tag -a "${{ env.RELEASE_TAG }}" \
                  -m "Release ${{ env.RELEASE_TAG }} — prod deploy verified"
          git push origin "${{ env.RELEASE_TAG }}" --force
          echo "✅ Tagged ${{ env.RELEASE_TAG }} — prod-verified"

      # ── Generate CHANGELOG for this release (FIX-1: inline release.yml logic) ──
      # release.yml never fires on bot-pushed tags (GITHUB_TOKEN doesn't trigger
      # cascading workflows by design). Inline the CHANGELOG + GH Release steps
      # here so they run in the same cd.yml execution.
      - name: Generate CHANGELOG for this release
        if: success() && github.event_name == 'workflow_dispatch' && inputs.tag != ''
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES_THIS_RELEASE.md
          GITHUB_REPO: ${{ github.repository }}

      # NOTE: CHANGELOG.md commit-and-push to release branch removed (was here previously).
      # Reason: branch protection on release requires 9 status checks for any push,
      # bot push of CHANGELOG doesn't have CI runs → blocked with GH006 protected branch.
      # Fix forward: GitHub Release body (next step) contains full changelog inline,
      # which is sufficient — users see it on github.com/.../releases page.
      # If repo CHANGELOG.md needs updating, use the manual `release.yml` workflow_dispatch
      # which goes through proper PR flow (CHANGELOG → develop → release).

      - name: Create GitHub Release
        if: success() && github.event_name == 'workflow_dispatch' && inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Release ${{ env.RELEASE_TAG }}"
          body_path: CHANGES_THIS_RELEASE.md
          draft: false
          prerelease: false

      - name: Notify success
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "${TG_TOKEN}" ] && exit 0
          # Decode changelog (base64 → original multiline text with any special chars)
          CHANGELOG=$(echo "${{ needs.notify-start.outputs.changelog_b64 }}" | base64 -d)
          PREV="${{ needs.notify-start.outputs.prev_tag }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf "✅ SEER Studio deployed to prod\nVersion: %s\nSHA: %s\nBy: %s\n\nChanges since %s:\n%s\n\nRun: %s" \
            "${{ env.RELEASE_TAG }}" "${{ github.sha }}" "${{ github.actor }}" \
            "$PREV" "$CHANGELOG" "$RUN_URL")
          jq -n --arg chat "$TG_CHAT" --arg text "$MSG" \
            '{"chat_id":$chat,"text":$text}' \
          | curl -sf -X POST \
              "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d @- || true

      - name: Notify failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "${TG_TOKEN}" ] && exit 0
          CHANGELOG=$(echo "${{ needs.notify-start.outputs.changelog_b64 }}" | base64 -d)
          PREV="${{ needs.notify-start.outputs.prev_tag }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf "❌ SEER Studio prod deploy FAILED\nVersion: %s\nSHA: %s\nBy: %s\n\nChanges since %s:\n%s\n\nRun: %s" \
            "${{ env.RELEASE_TAG }}" "${{ github.sha }}" "${{ github.actor }}" \
            "$PREV" "$CHANGELOG" "$RUN_URL")
          jq -n --arg chat "$TG_CHAT" --arg text "$MSG" \
            '{"chat_id":$chat,"text":$text}' \
          | curl -sf -X POST \
              "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d @- || true
