name: CI

on:
  push:
    branches: [master, 'feature/**']
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Library: Hound (ANTLR + ArcadeDB) ────────────────────────────────────────
  hound:
    name: Hound — test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew :libraries:hound:test

  # ── Backend: SHUTTLE (Quarkus + Gradle) ──────────────────────────────────────
  shuttle:
    name: SHUTTLE — test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew :services:shuttle:test
      - run: ./gradlew :services:shuttle:build -x test

  # ── BFF: Chur (Fastify + Vitest) ────────────────────────────────────────────
  chur:
    name: Chur — test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bff/chur
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: bff/chur/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  # ── Frontend: verdandi (Vite + Vitest + ESLint) ──────────────────────────────
  verdandi:
    name: verdandi — lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontends/verdandi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontends/verdandi/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run test:coverage
      - run: npx vite build

  # E2E (Playwright) requires the full Docker Compose stack.
  # Run locally: docker compose up -d && cd frontends/verdandi && npm run e2e
