###############################################################################
# cd-release.yml — Release gate: INIT + UPGRADE tests → git tag
#
# Trigger:
#   auto  — push to release branch (prerelease → release PR merged)
#           version derived automatically: latest tag + patch bump
#   manual — workflow_dispatch with explicit version + flags
#
# Flow:
#   STEP 1 — INIT test
#     wipe all volumes → deploy N (staging images) from scratch
#     → init-arcadedb → smoke + integration tests
#
#   STEP 2 — UPGRADE test  (skipped if first release or skip_upgrade_test=true)
#     wipe → deploy N-1 (prev version tag from YCR)
#     → init-arcadedb → seed data (SKIP_CLEANUP=1 integration test)
#     → partial/full upgrade based on upgrade_mode → verify data survived
#     → smoke + full integration test
#
#   STEP 3 — if both pass → git tag vX.Y.Z → triggers cd.yml (prod deploy)
#
# upgrade_mode values:
#   full          — upgrade all services to N (standard upgrade path)
#   kc_only       — upgrade only Keycloak container; YGG/FRIGG stay at N-1
#                   Tests: KC reimport wipes org state, tenant records in FRIGG survive
#   arcadedb_only — upgrade only YGG + FRIGG containers; KC + app stay at N-1
#                   Tests: ArcadeDB version bump, schema/data compatibility
#
# Notes:
#   • One staging VM — INIT and UPGRADE run sequentially, never parallel.
#   • N images come from the last cd-staging.yml push (IMAGE_TAG=staging in YCR).
#   • N-1 images are the previous git version tag in YCR (never overwritten by cd.yml).
#   • hound_databases is an external Docker volume — wiped and recreated manually.
#   • kc_only: KC uses no volume (H2 reimport) — after KC upgrade, FRIGG tenant
#     records have stale keycloakOrgId. Reconciliation step (if implemented) should
#     repair them. For now we verify tenant status stays ACTIVE via FRIGG data.
#   • arcadedb_only: ArcadeDB in-place upgrade on live volumes. init-arcadedb.sh
#     must be fully idempotent (IF NOT EXISTS everywhere).
###############################################################################

name: CD Release

on:
  push:
    branches: [release]   # auto-trigger on prerelease → release merge

  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.3.8) — leave blank to auto-derive (patch bump)'
        required: false
        type: string
      skip_upgrade_test:
        description: 'Skip upgrade test (use for first release — no N-1 exists)'
        type: boolean
        default: false
      seed_n1:
        description: |
          Seed data on N-1 before upgrade (default: false).
          Enable when N-1 provisioning code is compatible with current ArcadeDB version.
          Required for downgrade testing or data-continuity checks on tenant data.
        type: boolean
        default: false
      upgrade_mode:
        description: |
          Upgrade mode for STEP 2:
            full          — upgrade all services to N
            kc_only       — upgrade only Keycloak; YGG/FRIGG stay at N-1 version
            arcadedb_only — upgrade only YGG + FRIGG; KC + app services stay at N-1
        type: choice
        default: full
        options:
          - full
          - kc_only
          - arcadedb_only

concurrency:
  group: cd-release
  cancel-in-progress: false

jobs:
  release-gate:
    name: "INIT + UPGRADE → release gate"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write   # needed for git operations
      actions: write    # needed for gh workflow run (trigger cd.yml)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Determine version + N-1 ───────────────────────────────────────────
      - name: Determine version and previous release tag (N-1)
        id: meta
        run: |
          PREV=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -1 || true)

          # Version: explicit input wins; otherwise auto patch-bump from latest tag
          INPUT_VERSION="${{ inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [ -n "$PREV" ]; then
            MAJOR=$(echo $PREV | cut -d. -f1 | tr -d v)
            MINOR=$(echo $PREV | cut -d. -f2)
            PATCH=$(echo $PREV | cut -d. -f3)
            VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          else
            echo "ERROR: no previous tag found and no version input — cannot derive version"; exit 1
          fi

          echo "version=${VERSION}"   >> $GITHUB_OUTPUT
          echo "prev_tag=${PREV}"     >> $GITHUB_OUTPUT
          echo "N   → ${VERSION} (IMAGE_TAG=staging)"
          echo "N-1 → ${PREV:-none}"

      # ── Notify start ──────────────────────────────────────────────────────
      - name: Notify start
        uses: appleboy/telegram-action@v0.1.1
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 Release gate STARTED — ${{ steps.meta.outputs.version }}
            INIT + UPGRADE → prod CD
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # ── Refresh scripts on VM ──────────────────────────────────────────────
      - name: Fix file permissions
        run: |
          chmod -R a+r scripts/ tests/
          chmod a+x scripts/*.sh

      - name: Copy scripts + compose files + test fixtures to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST_STAGING }}
          username: ${{ secrets.DEPLOY_USER_STAGING }}
          key:      ${{ secrets.DEPLOY_KEY_STAGING }}
          source:   scripts/,tests/,docker-compose.prod.yml,docker-compose.yc.yml,infra/keycloak/
          target:   /opt/seer-studio/

      # ── STEP 1: INIT test ──────────────────────────────────────────────────
      - name: "INIT — wipe volumes → deploy N → smoke + integration"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:            ${{ secrets.DEPLOY_HOST_STAGING }}
          username:        ${{ secrets.DEPLOY_USER_STAGING }}
          key:             ${{ secrets.DEPLOY_KEY_STAGING }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd /opt/seer-studio
            set -a; source .env.prod 2>/dev/null || true; set +a

            wait_for() {
              local url="$1" name="$2" retries="${3:-60}"
              for i in $(seq 1 "$retries"); do
                curl -sf "$url" >/dev/null 2>&1 && echo "  [$name] ready" && return 0
                echo "  [$name] wait $i/$retries…"; sleep 10
              done
              echo "  [$name] TIMEOUT after $((retries * 10))s"
              echo "  [$name] container status:"
              docker ps -a --filter "name=$name" --format "  id={{.ID}} status={{.Status}} restarts={{.RunningFor}}" 2>/dev/null || true
              docker compose -f docker-compose.prod.yml -f docker-compose.yc.yml \
                logs --no-color --tail=30 "${name,,}" 2>/dev/null || true
              return 1
            }

            echo "▶ INIT: stop all services"
            docker compose -f docker-compose.prod.yml -f docker-compose.yc.yml \
              down --remove-orphans 2>/dev/null || true

            echo "▶ INIT: wipe volumes"
            docker volume rm seer-studio_frigg_data \
                               seer-studio_hound_config \
                               seer-studio_hound_logs 2>/dev/null || true
            docker volume rm hound_databases 2>/dev/null || true
            docker volume create hound_databases

            echo "▶ INIT: deploy N (IMAGE_TAG=staging)"
            IMAGE_TAG=staging \
            docker compose -f docker-compose.prod.yml -f docker-compose.yc.yml \
              up -d --pull always --remove-orphans --force-recreate

            # ArcadeDB fresh-volume init can take 5-10 min (JVM + DB schema creation)
            wait_for "http://localhost:2481/api/v1/ready"      "FRIGG"  60
            wait_for "http://localhost:2480/api/v1/ready"      "YGG"    60
            wait_for "http://localhost:18180/kc/realms/seer"   "KC(seer)"

            echo "▶ INIT: init-arcadedb.sh"
            FRIGG_URL=http://localhost:2481 FRIGG_USER=root \
            FRIGG_PASS="${FRIGG_PASSWORD:-playwithdata}" \
            YGG_URL=http://localhost:2480  YGG_USER=root \
            YGG_PASS="${ARCADEDB_ADMIN_PASSWORD:-playwithdata}" \
            KC_URL=http://localhost:18180/kc \
            KC_ADMIN_USER="${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}" \
            KC_ADMIN_PASS="${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}" \
            bash scripts/init-arcadedb.sh

            wait_for "http://localhost:13000/health"   "Chur"
            wait_for "http://localhost:18080/q/health" "Shuttle"

            echo "▶ INIT: smoke tests"
            DOMAIN=${{ secrets.DOMAIN_STAGING }} bash scripts/smoke-test.sh

            echo "▶ INIT: integration tests"
            DOMAIN=${{ secrets.DOMAIN_STAGING }} \
            TENANT=acme-init \
            DATA_DIR=/opt/seer-studio/tests/data/erp \
            bash scripts/integration-test.sh

            echo "✅ INIT PASSED"

      # ── STEP 2: UPGRADE test ───────────────────────────────────────────────
      - name: "UPGRADE — deploy N-1 → seed → upgrade N → verify survival → test"
        if: inputs.skip_upgrade_test != true && steps.meta.outputs.prev_tag != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:            ${{ secrets.DEPLOY_HOST_STAGING }}
          username:        ${{ secrets.DEPLOY_USER_STAGING }}
          key:             ${{ secrets.DEPLOY_KEY_STAGING }}
          command_timeout: 35m
          script: |
            set -euo pipefail
            cd /opt/seer-studio
            set -a; source .env.prod 2>/dev/null || true; set +a
            PREV_TAG="${{ steps.meta.outputs.prev_tag }}"

            wait_for() {
              local url="$1" name="$2"
              for i in $(seq 1 30); do
                curl -sf "$url" >/dev/null 2>&1 && echo "  [$name] ready" && return 0
                echo "  [$name] wait $i/30…"; sleep 10
              done
              echo "  [$name] TIMEOUT after 300s"; return 1
            }

            # ── 1. Clean baseline ──────────────────────────────────────────────
            echo "▶ UPGRADE: wipe for clean N-1 baseline"
            docker compose -f docker-compose.prod.yml -f docker-compose.yc.yml \
              down --remove-orphans 2>/dev/null || true
            docker volume rm seer-studio_frigg_data \
                               seer-studio_hound_config \
                               seer-studio_hound_logs 2>/dev/null || true
            docker volume rm hound_databases 2>/dev/null || true
            docker volume create hound_databases

            # ── 2. Deploy N-1 ──────────────────────────────────────────────────
            echo "▶ UPGRADE: deploying N-1 (${PREV_TAG})"
            IMAGE_TAG="${PREV_TAG}" \
            docker compose -f docker-compose.prod.yml -f docker-compose.yc.yml \
              up -d --pull always --remove-orphans --force-recreate

            wait_for "http://localhost:2481/api/v1/ready"    "FRIGG"
            wait_for "http://localhost:2480/api/v1/ready"    "YGG"
            wait_for "http://localhost:18180/kc/realms/seer" "KC(seer)"

            echo "▶ UPGRADE: init-arcadedb.sh on N-1"
            FRIGG_URL=http://localhost:2481 FRIGG_USER=root \
            FRIGG_PASS="${FRIGG_PASSWORD:-playwithdata}" \
            YGG_URL=http://localhost:2480  YGG_USER=root \
            YGG_PASS="${ARCADEDB_ADMIN_PASSWORD:-playwithdata}" \
            KC_URL=http://localhost:18180/kc \
            KC_ADMIN_USER="${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}" \
            KC_ADMIN_PASS="${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}" \
            bash scripts/init-arcadedb.sh

            wait_for "http://localhost:13000/health"   "Chur"
            wait_for "http://localhost:18080/q/health" "Shuttle"

            # ── 3. Seed data on N-1 (optional, controlled by seed_n1 input) ───
            # Default: false — N-1 provisioning may be incompatible with current
            # ArcadeDB version (API boundary releases). Enable for downgrade testing
            # or when N-1 app code is known compatible with current ArcadeDB.
            if [ "${{ inputs.seed_n1 || 'false' }}" = "true" ]; then
              echo "▶ UPGRADE: seeding data on N-1 (SKIP_CLEANUP=1)"
              DOMAIN=${{ secrets.DOMAIN_STAGING }} \
              TENANT=acme-legacy \
              DATA_DIR=/opt/seer-studio/tests/data/erp \
              SKIP_CLEANUP=1 \
              bash scripts/integration-test.sh
            else
              echo "▶ UPGRADE: seed_n1=false — skipping N-1 seed (verify default tenant after upgrade)"
            fi

            # ── 4. Upgrade based on mode ──────────────────────────────────────
            UPGRADE_MODE="${{ inputs.upgrade_mode || 'full' }}"
            echo "▶ UPGRADE: mode=${UPGRADE_MODE}"

            if [ "${UPGRADE_MODE}" = "full" ]; then
              # All services → N
              IMAGE_TAG=staging \
              docker compose -f docker-compose.prod.yml -f docker-compose.yc.yml \
                up -d --pull always --remove-orphans

            elif [ "${UPGRADE_MODE}" = "kc_only" ]; then
              # Only Keycloak container → N (new image/realm config).
              # YGG, FRIGG, app services stay at N-1 IMAGE_TAG.
              # KC has no volume — reimport wipes all KC organizations.
              # FRIGG tenant records should survive (they live in ArcadeDB, not KC).
              docker compose -f docker-compose.prod.yml -f docker-compose.yc.yml \
                up -d --force-recreate keycloak
              # Wait for seer realm specifically (reimport takes ~90s)
              for i in $(seq 1 30); do
                curl -sf "http://localhost:18180/kc/realms/seer" >/dev/null 2>&1 \
                  && echo "  [KC(seer)] ready" && break
                echo "  [KC(seer)] wait $i/30…"; sleep 10
              done

            elif [ "${UPGRADE_MODE}" = "arcadedb_only" ]; then
              # Only YGG + FRIGG containers → N (new ArcadeDB version from compose).
              # KC and application services (chur, shuttle, dali) stay at N-1.
              # Tests ArcadeDB in-place version upgrade on live volumes.
              docker compose -f docker-compose.prod.yml -f docker-compose.yc.yml \
                up -d --force-recreate ygg frigg
              wait_for "http://localhost:2481/api/v1/ready" "FRIGG"
              wait_for "http://localhost:2480/api/v1/ready" "YGG"
              # Re-run init-arcadedb.sh — must be idempotent (IF NOT EXISTS)
              echo "▶ arcadedb_only: re-running init-arcadedb.sh on upgraded ArcadeDB"
              FRIGG_URL=http://localhost:2481 FRIGG_USER=root \
              FRIGG_PASS="${FRIGG_PASSWORD:-playwithdata}" \
              YGG_URL=http://localhost:2480  YGG_USER=root \
              YGG_PASS="${ARCADEDB_ADMIN_PASSWORD:-playwithdata}" \
              KC_URL=http://localhost:18180/kc \
              KC_ADMIN_USER="${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}" \
              KC_ADMIN_PASS="${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}" \
              bash scripts/init-arcadedb.sh
            fi

            wait_for "http://localhost:13000/health"   "Chur"
            wait_for "http://localhost:18080/q/health" "Shuttle"

            # ── 5. Verify data survived the upgrade ──────────────────────────
            # If seed_n1=true → verify acme-legacy (provisioned on N-1)
            # If seed_n1=false → verify default tenant (created by init-arcadedb.sh)
            VERIFY_TENANT=$( [ "${{ inputs.seed_n1 || 'false' }}" = "true" ] && echo "acme-legacy" || echo "default" )
            echo "▶ UPGRADE: verifying '${VERIFY_TENANT}' tenant survived upgrade"
            BASE="https://seer.${{ secrets.DOMAIN_STAGING }}"
            JAR="/tmp/upg_verify_$$.txt"

            LOGIN_CODE=$(curl -sk --max-time 15 -c "$JAR" \
              -X POST "${BASE}/auth/login" \
              -H "Content-Type: application/json" \
              -d '{"username":"admin","password":"admin"}' \
              -o /dev/null -w "%{http_code}" || echo "000")
            if [ "$LOGIN_CODE" != "200" ]; then
              echo "✗ Login after upgrade: ${LOGIN_CODE}"; rm -f "$JAR"; exit 1
            fi

            TENANT_BODY=$(curl -sk --max-time 10 -b "$JAR" \
              "${BASE}/api/admin/tenants/${VERIFY_TENANT}" || echo "")
            rm -f "$JAR"

            if echo "$TENANT_BODY" | grep -q '"ACTIVE"'; then
              echo "✓ ${VERIFY_TENANT} ACTIVE — data survived upgrade"
            else
              echo "✗ ${VERIFY_TENANT} not ACTIVE after upgrade:"
              echo "$TENANT_BODY"
              exit 1
            fi

            # ── 6. Full integration test on N ─────────────────────────────────
            # Reset Chur in-memory rate limiter before final test run.
            # The seed + upgrade phases generate multiple logins; without a restart
            # the superadmin cleanup call (delete tenant) hits 429.
            echo "▶ UPGRADE: restarting Chur to reset rate limiter"
            docker restart seer-studio-chur-1
            for i in $(seq 1 15); do
              curl -sf http://localhost:13000/health >/dev/null 2>&1 && break
              echo "  waiting for Chur... (${i}/15)"; sleep 3
            done

            echo "▶ UPGRADE: smoke tests on N"
            DOMAIN=${{ secrets.DOMAIN_STAGING }} bash scripts/smoke-test.sh

            echo "▶ UPGRADE: full integration test on N"
            DOMAIN=${{ secrets.DOMAIN_STAGING }} \
            TENANT=acme-upgrade \
            DATA_DIR=/opt/seer-studio/tests/data/erp \
            bash scripts/integration-test.sh

            echo "✅ UPGRADE PASSED"

      # ── STEP 3: Trigger prod CD (tag created AFTER prod deploy succeeds) ─────
      # Tag is NOT created here — it's created in cd.yml after prod deploy passes.
      # This ensures tags only exist for prod-verified releases.
      - name: Trigger prod CD (tag created on prod success)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "CD" \
            --repo ${{ github.repository }} \
            --ref release \
            -f tag=${{ steps.meta.outputs.version }} \
            -f deploy_mode=merge
          echo "✅ Prod CD dispatched for ${{ steps.meta.outputs.version }} (deploy_mode=merge) — tag created on prod success"

      # ── Notifications ──────────────────────────────────────────────────────
      - name: Notify success
        if: success()
        uses: appleboy/telegram-action@v0.1.1
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Release gate PASSED — prod CD dispatched
            Version: `${{ steps.meta.outputs.version }}`
            INIT ✓  |  UPGRADE ${{ inputs.skip_upgrade_test != true && steps.meta.outputs.prev_tag != '' && '✓' || '— skipped' }}
            Tag будет создан после успешного prod deploy.
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify failure
        if: failure()
        uses: appleboy/telegram-action@v0.1.1
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Release gate FAILED — ${{ steps.meta.outputs.version }}
            Staging tests не прошли — prod CD не запущен, тег не создан.
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
