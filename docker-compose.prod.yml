###############################################################################
# SEER Studio — Production Docker Compose
# Uses pre-built images from GHCR (ghcr.io/nooriuta/verdandi/*)
# Deploy: docker compose -f docker-compose.prod.yml up -d
#
# Required env vars (export or .env file):
#   ARCADEDB_URL            — http://ygg:2480 (external network)
#   ARCADEDB_DB             — hound
#   ARCADEDB_USER           — root
#   ARCADEDB_ROOT_PASSWORD  — (secret)
#   KEYCLOAK_CLIENT_SECRET  — (secret)
#   COOKIE_SECRET           — (secret)
###############################################################################

networks:
  default:
    name: aida_net

services:
  # ── Keycloak (IAM) ─────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8180"
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: "/kc"
      KC_PROXY_HEADERS: "xforwarded"
    ports:
      - "18180:8180"
    volumes:
      - ./infra/keycloak/seer-realm.json:/opt/keycloak/data/import/seer-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /kc/health/ready HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  # ── SHUTTLE (Quarkus GraphQL API) ──────────────────────────────────────────
  shuttle:
    image: ghcr.io/nooriuta/verdandi/shuttle:latest
    restart: unless-stopped
    environment:
      QUARKUS_REST_CLIENT_ARCADE_URL: ${ARCADEDB_URL:-http://ygg:2480}
      ARCADE_DB:       ${ARCADEDB_DB:-hound}
      ARCADE_USER:     ${ARCADEDB_USER:-root}
      ARCADE_PASSWORD: ${ARCADEDB_ADMIN_PASSWORD:-playwithdata}
      QUARKUS_HTTP_CORS_ORIGINS: https://seidrstudio.pro,https://www.seidrstudio.pro,https://seer.seidrstudio.pro,https://heimdall.seidrstudio.pro,http://localhost:13000,http://localhost:15173
      # CD-17: FriggYggLineageRegistry ygg.url default is localhost:2480 (dev-only)
      # In Docker the YGG service must be reached via Docker network hostname
      YGG_URL: "http://ygg:2480"
      FRIGG_URL: "http://frigg:2480"
    ports:
      - "18080:8080"
    depends_on:
      ygg:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ── Chur (auth gateway / BFF) ──────────────────────────────────────────────
  chur:
    image: ghcr.io/nooriuta/verdandi/chur:latest
    restart: unless-stopped
    environment:
      NODE_ENV:               production
      PORT:                   "3000"
      CORS_ORIGIN:            "https://seidrstudio.pro,https://www.seidrstudio.pro,https://seer.seidrstudio.pro,https://heimdall.seidrstudio.pro"
      COOKIE_DOMAIN:          ".seidrstudio.pro"
      COOKIE_SECURE:          "true"
      KEYCLOAK_URL:           http://keycloak:8180/kc
      # Public KC URL for Auth Code browser redirect (≠ KEYCLOAK_URL which is Docker-internal).
      # nginx proxies /kc → KC container; DOMAIN is set by CD pipeline (.env file).
      KEYCLOAK_PUBLIC_URL:    "https://seer.${DOMAIN:-seidrstudio.pro}/kc"
      KEYCLOAK_REALM:         seer
      KEYCLOAK_CLIENT_ID:     aida-bff
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-aida-bff-secret-dev}
      COOKIE_SECRET:          ${COOKIE_SECRET:-dev-cookie-secret}
      ARCADEDB_URL:           ${ARCADEDB_URL:-http://ygg:2480}
      ARCADEDB_DB:            ${ARCADEDB_DB:-hound}
      ARCADEDB_USER:          ${ARCADEDB_USER:-root}
      ARCADEDB_PASS:          ${ARCADEDB_ADMIN_PASSWORD:-playwithdata}
      LINEAGE_API_URL:        http://shuttle:8080
      HEIMDALL_URL:           http://heimdall-backend:9093
    ports:
      - "13000:3000"
    depends_on:
      keycloak:
        condition: service_healthy
      shuttle:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── verdandi (React frontend via nginx) ────────────────────────────────────
  verdandi:
    image: ghcr.io/nooriuta/verdandi/verdandi:latest
    restart: unless-stopped
    ports:
      - "15173:5173"
    depends_on:
      chur:
        condition: service_healthy

  # ── FRIGG (ArcadeDB — state store for HEIMDALL / Dali) ────────────────────
  frigg:
    image: arcadedata/arcadedb:26.3.2
    restart: unless-stopped
    environment:
      # Password passed as a dedicated env-var so special characters (spaces,
      # shell meta-chars) in the Lockbox secret don't break JVM arg parsing.
      # ArcadeDB 26.x reads ARCADEDB_SERVER_ROOTPASSWORD directly.
      ARCADEDB_SERVER_ROOTPASSWORD: "${FRIGG_PASSWORD:-playwithdata}"
      JAVA_OPTS: "-XX:MaxRAMPercentage=70.0 -XX:InitialRAMPercentage=25.0"
    ports:
      - "2481:2480"
    volumes:
      - frigg_data:/home/arcadedb/databases
    healthcheck:
      # wget -O /dev/null: works in sh/dash (no bash needed); 120s start_period covers ArcadeDB
      # fresh-volume init time; retries:20 = additional 200s buffer after start_period.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:2480/api/v1/ready 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 20
      start_period: 120s

  # ── Ygg (ArcadeDB — lineage graph) ────────────────────────────────
  ygg:
    container_name: Ygg-1
    image: arcadedata/arcadedb:26.3.2
    restart: unless-stopped
    environment:
      ARCADEDB_SERVER_ROOTPASSWORD: "${ARCADEDB_ADMIN_PASSWORD:-playwithdata}"
      JAVA_OPTS: "-XX:MaxRAMPercentage=70.0 -XX:InitialRAMPercentage=25.0"
    ports:
      - "2480:2480"
    volumes:
      - hound_databases:/home/arcadedb/databases
      - hound_config:/home/arcadedb/.arcadedb
      - hound_logs:/home/arcadedb/log
    healthcheck:
      # wget -O /dev/null: works in sh/dash (no bash needed); 120s start_period covers ArcadeDB
      # fresh-volume init time; retries:20 = additional 200s buffer after start_period.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:2480/api/v1/ready 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 20
      start_period: 120s

  # ── Dali (async PL/SQL parse service) ─────────────────────────────────────
  dali:
    image: ghcr.io/nooriuta/verdandi/dali:latest
    restart: unless-stopped
    environment:
      QUARKUS_HTTP_PORT: "9090"
      CORS_ORIGINS:   "https://seidrstudio.pro,https://www.seidrstudio.pro,https://seer.seidrstudio.pro,https://heimdall.seidrstudio.pro"
      FRIGG_URL:      http://frigg:2480
      FRIGG_DB:       dali
      FRIGG_USER:     root
      FRIGG_PASSWORD: ${FRIGG_PASSWORD:-playwithdata}
      HEIMDALL_URL:   http://heimdall-backend:9093
      YGG_URL:        http://ygg:2480
      DALI_SESSION_RETENTION_DAYS: ${DALI_SESSION_RETENTION_DAYS:-30}
      DALI_INSTANCE_ID: ${DALI_INSTANCE_ID:-}
    ports:
      - "19090:9090"
    depends_on:
      frigg:
        condition: service_healthy
      ygg:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9090/q/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── Heimdall Backend (observability service) ───────────────────────────────
  heimdall-backend:
    image: ghcr.io/nooriuta/verdandi/heimdall-backend:latest
    restart: unless-stopped
    environment:
      QUARKUS_HTTP_PORT: "9093"
      QUARKUS_REST_CLIENT_FRIGG_API_URL: http://frigg:2480
      FRIGG_DB:       heimdall
      FRIGG_USER:     root
      FRIGG_PASSWORD: ${FRIGG_PASSWORD:-playwithdata}
      CORS_ORIGINS:   "https://seidrstudio.pro,https://www.seidrstudio.pro,https://seer.seidrstudio.pro,https://heimdall.seidrstudio.pro,http://localhost:13000,http://localhost:5174"
    ports:
      - "19093:9093"
    depends_on:
      frigg:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9093/q/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Heimdall Frontend (admin UI) ───────────────────────────────────────────
  heimdall-frontend:
    image: ghcr.io/nooriuta/verdandi/heimdall-frontend:latest
    restart: unless-stopped
    ports:
      - "25174:5174"
    depends_on:
      chur:
        condition: service_started
      heimdall-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5174/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Shell (Module Federation host) ─────────────────────────────────────────
  shell:
    image: ghcr.io/nooriuta/verdandi/shell:latest
    restart: unless-stopped
    ports:
      - "25175:5175"
    depends_on:
      chur:
        condition: service_started
      verdandi:
        condition: service_started
      heimdall-frontend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5175/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  frigg_data:
  hound_databases:
    external: true
  hound_config:
  hound_logs:
