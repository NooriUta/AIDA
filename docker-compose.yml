###############################################################################
# AIDA — APP (updatable) layer
#
# Services: nginx · Chur (BFF) · Verdandi · Heimdall-frontend · Shell
#
# Requires stable + backend layers running:  make stable-up && make backend-up
#
# Lifecycle:  rebuild on every platform code change (Node.js / React).
#             Fast build — no JVM compilation.
# Deploy:     make restart        ← most common command
# First run:  make all-up         ← starts all three layers in order
#
# Network aida_net is created by docker-compose.stable.yml (external here).
#
# Host ports:
#   nginx     80 / 443    Chur    13000    Verdandi   15173
#   Heimdall  25174       Shell   25175
###############################################################################

networks:
  default:
    name: aida_net
    external: true

services:
  # ── nginx (TLS termination — local HTTPS) ──────────────────────────────────
  # Certs: mkcert-generated, trusted by browser without warning.
  # Generate once: cd infra/nginx/certs && mkcert -cert-file local.crt -key-file local.key localhost 127.0.0.1 ::1
  # Install mkcert CA once: mkcert -install
  # Access: https://localhost/          → Verdandi (Seiðr Studio)
  #         https://localhost/heimdall/ → Heimdall UI
  #         https://localhost/kc/       → Keycloak admin
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - chur
      - verdandi
      - heimdall-frontend

  # ── Chur (auth gateway / BFF) ──────────────────────────────────────────────
  chur:
    build:
      context: ./bff/chur
      dockerfile: Dockerfile
      args:
        BUILDTIME: "${BUILDTIME:-}"
    environment:
      NODE_ENV:              ${NODE_ENV:-development}
      PORT:                  "3000"
      CORS_ORIGIN:           "https://localhost,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:13000,http://localhost:15173,http://localhost:25174,http://localhost:25175"
      # Keycloak — lives in stable layer, reached via aida_net
      KEYCLOAK_URL:          http://keycloak:8180/kc
      # Browser-facing KC URL for Auth Code redirects (chur is internal; KC must be reachable from browser)
      KEYCLOAK_PUBLIC_URL:   ${KEYCLOAK_PUBLIC_URL:-http://localhost:18180/kc}
      # Where to redirect after successful login (default frontend in dev)
      POST_LOGIN_REDIRECT:   ${POST_LOGIN_REDIRECT:-http://localhost:5175/}
      # Cookie domain для cross-port sharing (vite :5173/:5174/:5175 + chur :13000)
      COOKIE_DOMAIN:         ${COOKIE_DOMAIN:-localhost}
      KEYCLOAK_REALM:        seer
      KEYCLOAK_CLIENT_ID:    aida-bff
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-aida-bff-secret-dev}
      # Explicit redirect_uri for Auth Code flow — prevents chur from using the
      # nginx proxy host (e.g. :25174) instead of chur's own port (:13000).
      KC_REDIRECT_URI:       ${KC_REDIRECT_URI:-http://localhost:13000/auth/callback}
      # Per-host theme: when X-Forwarded-Host indicates heimdall (port 5174 or 25174),
      # chur uses this client_id which has loginTheme=heimdall in KC.
      KEYCLOAK_CLIENT_ID_HEIMDALL:     ${KEYCLOAK_CLIENT_ID_HEIMDALL:-aida-bff-heimdall}
      KEYCLOAK_CLIENT_SECRET_HEIMDALL: ${KEYCLOAK_CLIENT_SECRET_HEIMDALL:-aida-bff-heimdall-secret-dev}
      COOKIE_SECRET:         ${COOKIE_SECRET:-dev-cookie-secret}
      COOKIE_SECURE:         "true"
      # Ygg (ArcadeDB — lineage) — stable layer
      ARCADEDB_URL:          ${ARCADEDB_URL:-http://ygg:2480}
      ARCADEDB_DB:           ${ARCADEDB_DB:-hound}
      ARCADEDB_USER:         ${ARCADEDB_USER:-root}
      ARCADEDB_PASS:         ${ARCADEDB_ROOT_PASSWORD:-playwithdata}
      # YGG_* — provisioning.ts reads these (not ARCADEDB_*)
      YGG_URL:               http://ygg:2480
      YGG_USER:              ${ARCADEDB_USER:-root}
      YGG_PASS:              ${ARCADEDB_ROOT_PASSWORD:-playwithdata}
      # FRIGG — stable layer
      FRIGG_URL:             http://frigg:2480
      FRIGG_SESSION_DB:      frigg-sessions
      FRIGG_USER:            root
      FRIGG_PASSWORD:        ${FRIGG_ROOT_PASSWORD:-playwithdata}
      # SHUTTLE — backend layer
      LINEAGE_API_URL:       http://shuttle:8080
      # DALI — backend layer (harvest trigger, parse sessions)
      DALI_URL:              http://dali:9090
      # HEIMDALL — backend layer
      HEIMDALL_URL:          http://heimdall-backend:9093
      # MIMIR — backend layer (AI lineage assistant)
      MIMIR_URL:             http://mimir:9094
      # KC Admin API
      KC_ADMIN_USER:         ${KC_ADMIN_USER:-admin}
      KC_ADMIN_PASS:         ${KC_ADMIN_PASS:-sae0611!}
      # Disable rate limiting in Docker dev/test — nginx proxying makes all
      # requests appear from the same container IP, overwhelming per-IP buckets.
      DISABLE_RATE_LIMIT:    "true"
    ports:
      - "13000:3000"
    # Cross-layer deps (KC, FRIGG, SHUTTLE) are not declared here —
    # startup order is guaranteed by Makefile. Chur has health retries.
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Verdandi (React — Seiðr Studio) ─────────────────────────────────────────
  verdandi:
    build:
      context: ./frontends/verdandi
      dockerfile: Dockerfile
    ports:
      - "15173:5173"
    depends_on:
      chur:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5173/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Heimdall-frontend (React — HEIMDALL Control Panel) ────────────────────
  heimdall-frontend:
    build:
      context: .
      dockerfile: frontends/heimdall-frontend/Dockerfile
      args:
        VITE_HEIMDALL_API: "/heimdall"
    ports:
      - "25174:5174"
    depends_on:
      chur:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5174/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Shell removed 2026-05-01 — replaced by independent SPAs on subdomains
  # (seer.* → Verdandi, heimdall.* → Heimdall-frontend). See SPRINT_REMOVE_MODULE_FEDERATION.

volumes: {}
