// ─── devAll — start all services ─────────────────────────────────────────────

task devAll {
    group       = 'Development'
    description = 'Start all services: Shuttle (:8080) + Dali (:9090) + ANVIL (:9095) + MIMIR (:9094) + Heimdall (:9093/:5174) + Chur (:3000) + verdandi (:5173)'
    dependsOn   churInstall, verdandiInstall, heimdallFrontendInstall

    doLast {
        if (isWindows) {
            // Open each service in its own console window (Windows)
            new ProcessBuilder('cmd', '/c',
                "start \"Shuttle\" /D \"${rootDir}\" \"${gradleCmd}\" :services:shuttle:quarkusDev")
                .start()
            new ProcessBuilder('cmd', '/c',
                "start \"Dali\" /D \"${rootDir}\" \"${gradleCmd}\" :services:dali:quarkusDev")
                .start()
            new ProcessBuilder('cmd', '/c',
                "start \"Anvil\" /D \"${rootDir}\" \"${gradleCmd}\" :services:anvil:quarkusDev")
                .start()
            new ProcessBuilder('cmd', '/c',
                "start \"Mimir\" /D \"${rootDir}\" \"${gradleCmd}\" :services:mimir:quarkusDev")
                .start()
            new ProcessBuilder('cmd', '/c',
                "start \"Heimdall-Backend\" /D \"${rootDir}\" \"${gradleCmd}\" :services:heimdall-backend:quarkusDev")
                .start()
            new ProcessBuilder('cmd', '/c',
                "start \"Heimdall-Frontend\" /D \"${heimdallFrontDir}\" \"${npmCmd}\" run dev")
                .start()
            new ProcessBuilder('cmd', '/c',
                "start \"Chur\" /D \"${churDir}\" \"${npmCmd}\" run dev")
                .start()
            new ProcessBuilder('cmd', '/c',
                "start \"verdandi\" /D \"${verdandiDir}\" \"${npmCmd}\" run dev")
                .start()
            println '> Opened 8 windows: Shuttle (:8080) Dali (:9090) Anvil (:9095) Mimir (:9094) Heimdall-Backend (:9093) Heimdall-Frontend (:5174) Chur (:3000) verdandi (:5173)'
        } else {
            // Unix/macOS — run all in parallel, inherit output to this terminal
            def shuttleProc = new ProcessBuilder(gradleCmd, ':services:shuttle:quarkusDev')
                .directory(rootDir).inheritIO().start()
            def daliProc = new ProcessBuilder(gradleCmd, ':services:dali:quarkusDev')
                .directory(rootDir).inheritIO().start()
            def anvilProc = new ProcessBuilder(gradleCmd, ':services:anvil:quarkusDev')
                .directory(rootDir).inheritIO().start()
            def mimirProc = new ProcessBuilder(gradleCmd, ':services:mimir:quarkusDev')
                .directory(rootDir).inheritIO().start()
            def heimdallBackProc = new ProcessBuilder(gradleCmd, ':services:heimdall-backend:quarkusDev')
                .directory(rootDir).inheritIO().start()
            def heimdallFrontProc = new ProcessBuilder(npmCmd, 'run', 'dev')
                .directory(heimdallFrontDir).inheritIO().start()
            def churProc = new ProcessBuilder(npmCmd, 'run', 'dev')
                .directory(churDir).inheritIO().start()
            def verdandiProc = new ProcessBuilder(npmCmd, 'run', 'dev')
                .directory(verdandiDir).inheritIO().start()
            Runtime.runtime.addShutdownHook(new Thread({
                shuttleProc.destroyForcibly()
                daliProc.destroyForcibly()
                anvilProc.destroyForcibly()
                mimirProc.destroyForcibly()
                heimdallBackProc.destroyForcibly()
                heimdallFrontProc.destroyForcibly()
                churProc.destroyForcibly()
                verdandiProc.destroyForcibly()
            }))
            [shuttleProc, daliProc, anvilProc, mimirProc, heimdallBackProc, heimdallFrontProc, churProc, verdandiProc]*.waitFor()
        }
    }
}
