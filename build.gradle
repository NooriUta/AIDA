// ─── AIDA monorepo — root build ──────────────────────────────────────────────
//
// JVM subprojects (Gradle — ./gradlew :<module>:<task>):
//   :libraries:hound          Java 21 / ANTLR       SQL parser & semantic engine
//   :services:shuttle         Quarkus 3 / Java 21   lineage GraphQL API        :8080
//   :services:dali            Quarkus 3 / Java 21   ingestion & storage API    :9090
//   :services:heimdall-backend Quarkus 3 / Java 21  team-docs / plan viewer    :9093
//   :shared:dali-models       Java 21               shared model DTOs
//
// Node services (not Gradle subprojects — managed via tasks below):
//   bff/chur                  Fastify / Node 24     RBAC proxy + auth          :3000
//   frontends/verdandi        React 19 / Vite        data lineage UI            :5173
//   frontends/heimdall-frontend React 19 / Vite      team-docs / plan UI        :5174
//
// ─── Quick-start ──────────────────────────────────────────────────────────────
//   ./gradlew devAll           start all services (7 windows on Windows)
//   ./gradlew heimdallDev      start heimdall stack only (backend :9093 + frontend :5174)
//
// ─── JVM individual ───────────────────────────────────────────────────────────
//   ./gradlew :services:shuttle:quarkusDev         SHUTTLE dev mode   :8080
//   ./gradlew :services:dali:quarkusDev            Dali    dev mode   :9090
//   ./gradlew :services:heimdall-backend:quarkusDev Heimdall dev mode :9093
//   ./gradlew :services:shuttle:build              SHUTTLE fat-jar
//   ./gradlew :libraries:hound:build               Hound library build
//   ./gradlew :libraries:hound:fatJar              Hound standalone JAR
//
// ─── Node individual ──────────────────────────────────────────────────────────
//   ./gradlew churDev                  Chur  dev mode (tsx watch, :3000)
//   ./gradlew churBuild                Chur  compile TS → bff/chur/dist/
//   ./gradlew churStart                Chur  start from dist/ (production)
//   ./gradlew churInstall              Chur  npm install
//
//   ./gradlew verdandiDev              verdandi  dev mode (Vite, :5173)
//   ./gradlew verdandiBuild            verdandi  production build → dist/
//   ./gradlew verdandiInstall          verdandi  npm install
//
//   ./gradlew heimdallFrontendDev      heimdall-frontend dev mode (Vite, :5174)
//   ./gradlew heimdallFrontendBuild    heimdall-frontend production build → dist/
//   ./gradlew heimdallFrontendInstall  heimdall-frontend npm install

ext {
    isWindows        = System.properties['os.name'].toLowerCase().contains('windows')
    // Prefer system Node (in PATH); fall back to JetBrains-managed Node
    def sysNpm       = isWindows ? 'npm.cmd' : 'npm'
    def sysNode      = isWindows ? 'node.exe' : 'node'
    def jbNode       = System.getenv('APPDATA') ?
        "${System.getenv('APPDATA')}/JetBrains/IntelliJIdea2025.3/node/versions/24.14.1" : ''
    def nodeHome     = System.getenv('NODE_HOME') ?: (jbNode && new File(jbNode, sysNode).exists() ? jbNode : '')
    npmCmd           = nodeHome ? "${nodeHome}/${sysNpm}" : sysNpm
    nodeCmd          = nodeHome ? "${nodeHome}/${sysNode}" : sysNode
    churDir          = file('bff/chur')
    verdandiDir      = file('frontends/verdandi')
    heimdallFrontDir = file('frontends/heimdall-frontend')
    gradleCmd        = new File(rootDir, isWindows ? 'gradlew.bat' : 'gradlew').canonicalPath
}

// ─── verdandi tasks ───────────────────────────────────────────────────────────

task verdandiInstall(type: Exec) {
    group       = 'verdandi'
    description = 'npm install in frontends/verdandi/'
    workingDir  verdandiDir
    commandLine npmCmd, 'install'
}

task verdandiDev(type: Exec) {
    group       = 'verdandi'
    description = 'Start verdandi frontend in dev mode (Vite, :5173)'
    workingDir  verdandiDir
    commandLine npmCmd, 'run', 'dev'
    dependsOn   verdandiInstall
}

task verdandiBuild(type: Exec) {
    group       = 'verdandi'
    description = 'Build verdandi production bundle → frontends/verdandi/dist/'
    workingDir  verdandiDir
    commandLine npmCmd, 'run', 'build'
    dependsOn   verdandiInstall
}

// ─── Chur tasks ───────────────────────────────────────────────────────────────

task churInstall(type: Exec) {
    group       = 'Chur'
    description = 'npm install in bff/chur/'
    workingDir  churDir
    commandLine npmCmd, 'install'
}

task churDev(type: Exec) {
    group       = 'Chur'
    description = 'Start Chur auth gateway in dev mode (tsx watch, :3000)'
    workingDir  churDir
    commandLine npmCmd, 'run', 'dev'
    dependsOn   churInstall
}

task churBuild(type: Exec) {
    group       = 'Chur'
    description = 'Compile Chur TypeScript → bff/chur/dist/'
    workingDir  churDir
    commandLine npmCmd, 'run', 'build'
    dependsOn   churInstall
}

task churStart(type: Exec) {
    group       = 'Chur'
    description = 'Start Chur from bff/chur/dist/ (production, :3000)'
    workingDir  churDir
    commandLine npmCmd, 'start'
    dependsOn   churBuild
}

// ─── heimdall-frontend tasks ──────────────────────────────────────────────────

task heimdallFrontendInstall(type: Exec) {
    group       = 'heimdall'
    description = 'npm install in frontends/heimdall-frontend/'
    workingDir  heimdallFrontDir
    commandLine npmCmd, 'install'
}

task heimdallFrontendDev(type: Exec) {
    group       = 'heimdall'
    description = 'Start heimdall frontend in dev mode (Vite, :5174)'
    workingDir  heimdallFrontDir
    commandLine npmCmd, 'run', 'dev'
    dependsOn   heimdallFrontendInstall
}

task heimdallFrontendBuild(type: Exec) {
    group       = 'heimdall'
    description = 'Build heimdall-frontend production bundle → frontends/heimdall-frontend/dist/'
    workingDir  heimdallFrontDir
    commandLine npmCmd, 'run', 'build'
    dependsOn   heimdallFrontendInstall
}

// ─── heimdallDev — heimdall backend + frontend together ──────────────────────

task heimdallDev {
    group       = 'heimdall'
    description = 'Start heimdall stack: backend (:9093) + frontend (:5174)'
    dependsOn   heimdallFrontendInstall

    doLast {
        if (isWindows) {
            new ProcessBuilder('cmd', '/c',
                "start \"Heimdall-Backend\" /D \"${rootDir}\" \"${gradleCmd}\" :services:heimdall-backend:quarkusDev")
                .start()
            new ProcessBuilder('cmd', '/c',
                "start \"Heimdall-Frontend\" /D \"${heimdallFrontDir}\" \"${npmCmd}\" run dev")
                .start()
            println '> Opened Heimdall-Backend (:9093) and Heimdall-Frontend (:5174) in separate windows.'
        } else {
            def backendProc = new ProcessBuilder(gradleCmd, ':services:heimdall-backend:quarkusDev')
                .directory(rootDir).inheritIO().start()
            def frontProc = new ProcessBuilder(npmCmd, 'run', 'dev')
                .directory(heimdallFrontDir).inheritIO().start()
            Runtime.runtime.addShutdownHook(new Thread({
                backendProc.destroyForcibly()
                frontProc.destroyForcibly()
            }))
            [backendProc, frontProc]*.waitFor()
        }
    }
}

// ─── devAll — start all services ─────────────────────────────────────────────

task devAll {
    group       = 'Development'
    description = 'Start all services: Shuttle (:8080) + Dali (:9090) + Heimdall (:9093/:5174) + Chur (:3000) + verdandi (:5173)'
    dependsOn   churInstall, verdandiInstall, heimdallFrontendInstall

    doLast {
        if (isWindows) {
            // Open each service in its own console window (Windows)
            new ProcessBuilder('cmd', '/c',
                "start \"Shuttle\" /D \"${rootDir}\" \"${gradleCmd}\" :services:shuttle:quarkusDev")
                .start()
            new ProcessBuilder('cmd', '/c',
                "start \"Dali\" /D \"${rootDir}\" \"${gradleCmd}\" :services:dali:quarkusDev")
                .start()
            new ProcessBuilder('cmd', '/c',
                "start \"Heimdall-Backend\" /D \"${rootDir}\" \"${gradleCmd}\" :services:heimdall-backend:quarkusDev")
                .start()
            new ProcessBuilder('cmd', '/c',
                "start \"Heimdall-Frontend\" /D \"${heimdallFrontDir}\" \"${npmCmd}\" run dev")
                .start()
            new ProcessBuilder('cmd', '/c',
                "start \"Chur\" /D \"${churDir}\" \"${npmCmd}\" run dev")
                .start()
            new ProcessBuilder('cmd', '/c',
                "start \"verdandi\" /D \"${verdandiDir}\" \"${npmCmd}\" run dev")
                .start()
            println '> Opened 6 windows: Shuttle (:8080) Dali (:9090) Heimdall-Backend (:9093) Heimdall-Frontend (:5174) Chur (:3000) verdandi (:5173)'
        } else {
            // Unix/macOS — run all in parallel, inherit output to this terminal
            def shuttleProc = new ProcessBuilder(gradleCmd, ':services:shuttle:quarkusDev')
                .directory(rootDir).inheritIO().start()
            def daliProc = new ProcessBuilder(gradleCmd, ':services:dali:quarkusDev')
                .directory(rootDir).inheritIO().start()
            def heimdallBackProc = new ProcessBuilder(gradleCmd, ':services:heimdall-backend:quarkusDev')
                .directory(rootDir).inheritIO().start()
            def heimdallFrontProc = new ProcessBuilder(npmCmd, 'run', 'dev')
                .directory(heimdallFrontDir).inheritIO().start()
            def churProc = new ProcessBuilder(npmCmd, 'run', 'dev')
                .directory(churDir).inheritIO().start()
            def verdandiProc = new ProcessBuilder(npmCmd, 'run', 'dev')
                .directory(verdandiDir).inheritIO().start()
            Runtime.runtime.addShutdownHook(new Thread({
                shuttleProc.destroyForcibly()
                daliProc.destroyForcibly()
                heimdallBackProc.destroyForcibly()
                heimdallFrontProc.destroyForcibly()
                churProc.destroyForcibly()
                verdandiProc.destroyForcibly()
            }))
            [shuttleProc, daliProc, heimdallBackProc, heimdallFrontProc, churProc, verdandiProc]*.waitFor()
        }
    }
}
