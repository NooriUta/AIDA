// ─── AIDA monorepo — root build ──────────────────────────────────────────────
//
// JVM subprojects (Gradle — ./gradlew :<module>:<task>):
//   :libraries:hound          Java 21 / ANTLR       SQL parser & semantic engine
//   :services:shuttle         Quarkus 3 / Java 21   lineage GraphQL API        :8080
//   :services:dali            Quarkus 3 / Java 21   ingestion & storage API    :9090
//   :services:heimdall-backend Quarkus 3 / Java 21  team-docs / plan viewer    :9093
//   :services:anvil           Quarkus 3 / Java 21   impact analysis engine     :9095
//   :shared:dali-models       Java 21               shared model DTOs
//
// Node services (not Gradle subprojects — managed via tasks below):
//   bff/chur                  Fastify / Node 24     RBAC proxy + auth          :3000
//   frontends/verdandi        React 19 / Vite        data lineage UI            :5173
//   frontends/heimdall-frontend React 19 / Vite      team-docs / plan UI        :5174
//
// ─── Quick-start ──────────────────────────────────────────────────────────────
//   ./gradlew devAll           start all services (7 windows on Windows)
//   ./gradlew heimdallDev      start heimdall stack only (backend :9093 + frontend :5174)
//
// ─── JVM individual ───────────────────────────────────────────────────────────
//   ./gradlew :services:shuttle:quarkusDev         SHUTTLE dev mode   :8080
//   ./gradlew :services:dali:quarkusDev            Dali    dev mode   :9090
//   ./gradlew :services:heimdall-backend:quarkusDev Heimdall dev mode :9093
//   ./gradlew :services:anvil:quarkusDev           ANVIL    dev mode :9095
//   ./gradlew :services:shuttle:build              SHUTTLE fat-jar
//   ./gradlew :libraries:hound:build               Hound library build
//   ./gradlew :libraries:hound:fatJar              Hound standalone JAR
//
// ─── Node individual ──────────────────────────────────────────────────────────
//   ./gradlew churDev                  Chur  dev mode (tsx watch, :3000)
//   ./gradlew churBuild                Chur  compile TS → bff/chur/dist/
//   ./gradlew churStart                Chur  start from dist/ (production)
//   ./gradlew churInstall              Chur  npm install
//
//   ./gradlew verdandiDev              verdandi  dev mode (Vite, :5173)
//   ./gradlew verdandiBuild            verdandi  production build → dist/
//   ./gradlew verdandiInstall          verdandi  npm install
//
//   ./gradlew heimdallFrontendDev      heimdall-frontend dev mode (Vite, :5174)
//   ./gradlew heimdallFrontendBuild    heimdall-frontend production build → dist/
//   ./gradlew heimdallFrontendInstall  heimdall-frontend npm install

ext {
    isWindows        = System.properties['os.name'].toLowerCase().contains('windows')
    // Prefer system Node (in PATH); fall back to JetBrains-managed Node
    def sysNpm       = isWindows ? 'npm.cmd' : 'npm'
    def sysNode      = isWindows ? 'node.exe' : 'node'
    def jbNode       = System.getenv('APPDATA') ?
        "${System.getenv('APPDATA')}/JetBrains/IntelliJIdea2025.3/node/versions/24.14.1" : ''
    def nodeHome     = System.getenv('NODE_HOME') ?: (jbNode && new File(jbNode, sysNode).exists() ? jbNode : '')
    npmCmd           = nodeHome ? "${nodeHome}/${sysNpm}" : sysNpm
    nodeCmd          = nodeHome ? "${nodeHome}/${sysNode}" : sysNode
    churDir          = file('bff/chur')
    verdandiDir      = file('frontends/verdandi')
    heimdallFrontDir = file('frontends/heimdall-frontend')
    gradleCmd        = new File(rootDir, isWindows ? 'gradlew.bat' : 'gradlew').canonicalPath

    // .env loader — Quarkus dev (gradlew) не читает .env автоматически.
    // Эта функция парсит aida-root/.env и проставляет System properties + env vars,
    // которые Quarkus подхватывает через MicroProfile Config (env vars > system props > application.properties).
    // Использование: вызвать loadDotEnv() в quarkusDev-обёртках, IDE Run Configurations или devAll.
    loadDotEnv = { File envFile = new File(rootDir, '.env') ->
        if (!envFile.exists()) {
            logger.lifecycle("[loadDotEnv] ${envFile.absolutePath} not found — skipping")
            return [:]
        }
        Map<String, String> loaded = [:]
        envFile.eachLine { line ->
            def trimmed = line.trim()
            if (trimmed.isEmpty() || trimmed.startsWith('#')) return
            def idx = trimmed.indexOf('=')
            if (idx < 1) return
            def key = trimmed.substring(0, idx).trim()
            def val = trimmed.substring(idx + 1).trim()
            // strip surrounding quotes
            if ((val.startsWith('"') && val.endsWith('"')) ||
                (val.startsWith("'") && val.endsWith("'"))) {
                val = val.substring(1, val.length() - 1)
            }
            // do NOT override what was already exported in the shell — it wins
            if (System.getenv(key) == null && System.getProperty(key) == null) {
                System.setProperty(key, val)
                loaded[key] = val
            }
        }
        if (!loaded.isEmpty()) {
            logger.lifecycle("[loadDotEnv] loaded ${loaded.size()} keys from ${envFile.name}: ${loaded.keySet().sort().join(', ')}")
        }
        return loaded
    }
}

// ─── .env auto-load — works for ANY gradle invocation in this repo ────────────
//
// Gradle calls this at configuration phase, before any task runs. System
// properties survive into the same JVM (quarkusDev), and we also forward them
// into forked QuarkusDev processes via the per-service build.gradle hook
// `tasks.withType(io.quarkus.gradle.tasks.QuarkusDev)` (configured below in
// services/<svc>/build.gradle when present).
//
// Order of precedence (MicroProfile Config):
//   1. shell-exported env var          (highest — explicit override)
//   2. -D system property               (Gradle command line)
//   3. value from .env via loadDotEnv() (NEW — covered by this hook)
//   4. application.properties default   (lowest)
//
// To skip: pass `-Paida.skipDotEnv=true` (e.g. CI has its own secrets).
if (!project.hasProperty('aida.skipDotEnv')) {
    def envMap = ext.loadDotEnv()
    // Forward to Quarkus dev forked JVM via QuarkusDev's MapProperty<String,String>
    // `environmentVariables` (Quarkus 3.17 API). The forked process sees them as
    // real env vars, which MicroProfile Config reads first (highest precedence).
    if (!envMap.isEmpty()) {
        allprojects {
            tasks.matching { it.name == 'quarkusDev' }.configureEach { task ->
                if (task.hasProperty('environmentVariables')) {
                    envMap.each { k, v -> task.environmentVariables.put(k, v) }
                }
            }
        }
    }
}

// ─── verdandi tasks ───────────────────────────────────────────────────────────

task verdandiInstall(type: Exec) {
    group       = 'verdandi'
    description = 'npm install in frontends/verdandi/'
    workingDir  verdandiDir
    commandLine npmCmd, 'install'
}

task verdandiDev(type: Exec) {
    group       = 'verdandi'
    description = 'Start verdandi frontend in dev mode (Vite, :5173)'
    workingDir  verdandiDir
    commandLine npmCmd, 'run', 'dev'
    dependsOn   verdandiInstall
}

task verdandiBuild(type: Exec) {
    group       = 'verdandi'
    description = 'Build verdandi production bundle → frontends/verdandi/dist/'
    workingDir  verdandiDir
    commandLine npmCmd, 'run', 'build'
    dependsOn   verdandiInstall
}

// ─── Chur tasks ───────────────────────────────────────────────────────────────

task churInstall(type: Exec) {
    group       = 'Chur'
    description = 'npm install in bff/chur/'
