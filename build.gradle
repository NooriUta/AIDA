// ─── heimdallDev — heimdall backend + frontend together ──────────────────────

task heimdallDev {
    group       = 'heimdall'
    description = 'Start heimdall stack: backend (:9093) + frontend (:5174)'
    dependsOn   heimdallFrontendInstall

    doLast {
        if (isWindows) {
            new ProcessBuilder('cmd', '/c',
                "start \"Heimdall-Backend\" /D \"${rootDir}\" \"${gradleCmd}\" :services:heimdall-backend:quarkusDev")
                .start()
            new ProcessBuilder('cmd', '/c',
                "start \"Heimdall-Frontend\" /D \"${heimdallFrontDir}\" \"${npmCmd}\" run dev")
                .start()
            println '> Opened Heimdall-Backend (:9093) and Heimdall-Frontend (:5174) in separate windows.'
        } else {
            def backendProc = new ProcessBuilder(gradleCmd, ':services:heimdall-backend:quarkusDev')
                .directory(rootDir).inheritIO().start()
            def frontProc = new ProcessBuilder(npmCmd, 'run', 'dev')
                .directory(heimdallFrontDir).inheritIO().start()
            Runtime.runtime.addShutdownHook(new Thread({
                backendProc.destroyForcibly()
                frontProc.destroyForcibly()
            }))
            [backendProc, frontProc]*.waitFor()
        }
    }
}

