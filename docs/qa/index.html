<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIDA QA Dashboard</title>
<style>
:root {
  --bg0:#0e1117;--bg1:#161b22;--bg2:#1c2128;--bg3:#21262d;
  --bd:#30363d;--t1:#e6edf3;--t2:#8b949e;--t3:#484f58;
  --suc:#3fb950;--wrn:#d29922;--danger:#f85149;--info:#58a6ff;--purple:#bc8cff;
  --mono:'Fira Mono','Consolas',monospace;--r:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg0);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;}

/* ─ Header ─────────────────────────────────────────────────────────────── */
header{background:var(--bg1);border-bottom:1px solid var(--bd);padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
header h1{font-size:14px;font-weight:700;white-space:nowrap;}
.tab-bar{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:3px;}
.tab{padding:4px 14px;border-radius:4px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:var(--t2);transition:all .15s;}
.tab.active{background:var(--bg0);color:var(--t1);}
.tab:hover:not(.active){color:var(--t1);}
.hdr-stat{font-size:11px;white-space:nowrap;}
.hdr-stat b{font-size:13px;}
.hdr-stat.green b{color:var(--suc);}
.hdr-stat.red b{color:var(--danger);}
.hdr-stat.blue b{color:var(--info);}
.run-time{font-size:10px;color:var(--t3);margin-left:auto;}
.btn{padding:4px 10px;border-radius:var(--r);border:1px solid var(--bd);cursor:pointer;font-size:11px;font-family:inherit;background:var(--bg2);color:var(--t1);}
.btn:hover{background:var(--bg3);}
.btn-primary{background:#238636;border-color:#2ea043;color:#fff;}
.btn-danger{background:#b62324;border-color:#f85149;color:#fff;}

/* ─ Main ────────────────────────────────────────────────────────────────── */
main{max-width:1320px;margin:0 auto;padding:20px 16px 80px;}
.pane{display:none;}
.pane.active{display:block;}

/* ─ Summary grid ────────────────────────────────────────────────────────── */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:24px;}
.scard{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;}
.scard .sname{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.scard .sscore{font-size:18px;font-weight:700;}
.scard .sbar{height:3px;background:var(--bg3);border-radius:2px;margin-top:5px;overflow:hidden;}
.scard .sfill{height:100%;border-radius:2px;}
.green{color:var(--suc);} .fill-green{background:var(--suc);}
.yellow{color:var(--wrn);} .fill-yellow{background:var(--wrn);}
.red{color:var(--danger);} .fill-red{background:var(--danger);}
.blue{color:var(--info);} .fill-blue{background:var(--info);}

/* ─ Sections ────────────────────────────────────────────────────────────── */
.section{margin-bottom:28px;}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd);}
.sec-hdr h2{font-size:13px;font-weight:700;}
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;border:1px solid;}
.badge.green{color:var(--suc);border-color:#3fb95088;background:#3fb95018;}
.badge.yellow{color:var(--wrn);border-color:#d2992288;background:#d2992218;}
.badge.red{color:var(--danger);border-color:#f8514988;background:#f8514918;}
.badge.blue{color:var(--info);border-color:#58a6ff88;background:#58a6ff18;}

/* ─ Manual test table ───────────────────────────────────────────────────── */
.tc-table{width:100%;border-collapse:collapse;}
.tc-table th{text-align:left;padding:5px 8px;font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--bd);}
.tc-table td{padding:6px 8px;vertical-align:top;border-bottom:1px solid var(--bd);}
.tc-table tr:last-child td{border-bottom:none;}
.tc-table tr:hover td{background:var(--bg2);}
.tc-id{font-family:var(--mono);font-size:10px;color:var(--t3);white-space:nowrap;}
.tc-title{font-weight:500;}
.tc-steps{font-size:11px;color:var(--t2);margin-top:2px;line-height:1.5;white-space:pre-line;}
.tc-expected{font-size:11px;color:var(--info);font-style:italic;margin-top:2px;}
.prio{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;}
.p0{background:#f8514930;color:var(--danger);}
.p1{background:#d2992230;color:var(--wrn);}
.p2{background:#58a6ff20;color:var(--info);}
.p3{background:var(--bg3);color:var(--t3);}
.status-sel{background:var(--bg2);border:1px solid var(--bd);color:var(--t1);font-size:11px;border-radius:4px;padding:2px 5px;cursor:pointer;font-family:inherit;}
.status-sel.pass{border-color:var(--suc);color:var(--suc);}
.status-sel.fail{border-color:var(--danger);color:var(--danger);}
.status-sel.skip{border-color:var(--t3);color:var(--t3);}
.status-sel.unclear{border-color:var(--wrn);color:var(--wrn);}
#save-ind{font-size:10px;color:var(--t3);opacity:0;transition:opacity .5s;margin-left:8px;}
.notes-in{background:var(--bg2);border:1px solid var(--bd);color:var(--t1);font-size:11px;border-radius:4px;padding:2px 5px;width:100%;min-width:100px;font-family:inherit;resize:vertical;}
.notes-in:focus{outline:none;border-color:var(--info);}

/* ─ Auto test display ───────────────────────────────────────────────────── */
.suite-block{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.suite-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;}
.suite-hdr:hover{background:var(--bg2);}
.suite-file{font-family:var(--mono);font-size:11px;color:var(--t2);}
.suite-label{font-size:12px;font-weight:600;color:var(--t1);}
.suite-counts{margin-left:auto;display:flex;gap:8px;font-size:11px;}
.cnt-pass{color:var(--suc);}
.cnt-fail{color:var(--danger);}
.suite-chevron{color:var(--t3);font-size:10px;transition:transform .2s;}
.suite-chevron.open{transform:rotate(90deg);}
.suite-tests{display:none;border-top:1px solid var(--bd);}
.suite-tests.open{display:block;}
.group-label{padding:6px 14px 4px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;background:var(--bg2);border-bottom:1px solid var(--bd);}
.test-row{display:flex;align-items:baseline;gap:8px;padding:4px 14px 4px 20px;border-bottom:1px solid var(--bd);}
.test-row:last-child{border-bottom:none;}
.test-row:hover{background:var(--bg2);}
.test-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.dot-pass{background:var(--suc);}
.dot-fail{background:var(--danger);}
.test-name{font-size:11px;color:var(--t1);flex:1;}
.test-dur{font-size:10px;color:var(--t3);white-space:nowrap;}
.fail-msg{font-size:10px;color:var(--danger);font-family:var(--mono);margin-top:2px;padding:4px 8px;background:#f8514910;border-radius:3px;}

/* ─ Footer bar ──────────────────────────────────────────────────────────── */
.foot{position:fixed;bottom:0;left:0;right:0;background:var(--bg1);border-top:1px solid var(--bd);padding:8px 20px;display:flex;align-items:center;gap:16px;font-size:12px;}
.foot-lbl{color:var(--t2);}
.foot-val{font-weight:700;}

/* ─ Progress bar ────────────────────────────────────────────────────────── */
.pbar-wrap{width:140px;}
.pbar-lbl{font-size:10px;color:var(--t2);display:flex;justify-content:space-between;margin-bottom:2px;}
.pbar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:3px;transition:width .3s;}
</style>
</head>
<body>

<header>
  <h1>🧪 AIDA QA Dashboard</h1>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('summary')">Summary</button>
    <button class="tab" onclick="switchTab('manual')">Ручные тесты</button>
    <button class="tab" onclick="switchTab('auto')">Автотесты</button>
  </div>

  <div class="hdr-stat blue">Auto <b id="hdr-auto-pass">209</b>/<b id="hdr-auto-total">209</b></div>
  <div class="hdr-stat green">Manual <b id="hdr-m-pass">0</b>/<b id="hdr-m-total">52</b></div>
  <div class="hdr-stat red" id="hdr-fail-wrap" style="display:none">⚠ FAIL <b id="hdr-fail">0</b></div>

  <span class="run-time">Auto last run: <span id="run-time-lbl">—</span></span>
  <div style="display:flex;gap:6px;margin-left:auto;align-items:center">
    <span id="save-ind">💾 saved</span>
    <button class="btn" onclick="exportReport()">Export TXT</button>
    <button class="btn btn-danger" onclick="resetManual()">Reset ручных</button>
  </div>
</header>

<main>

<!-- ═══ SUMMARY ═══════════════════════════════════════════════════════════ -->
<div id="pane-summary" class="pane active">
  <div id="summary-grid" class="summary-grid"></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
    <div class="section">
      <div class="sec-hdr"><h2>Автотесты — по файлам</h2><span id="auto-badge" class="badge green">209 / 209</span></div>
      <div id="auto-summary-list"></div>
    </div>
    <div class="section">
      <div class="sec-hdr"><h2>Ручные тесты — по категориям</h2><span id="manual-badge" class="badge yellow">0 / 52</span></div>
      <div id="manual-summary-list"></div>
    </div>
  </div>
</div>

<!-- ═══ MANUAL ════════════════════════════════════════════════════════════ -->
<div id="pane-manual" class="pane">
  <div id="manual-sections"></div>
</div>

<!-- ═══ AUTO ══════════════════════════════════════════════════════════════ -->
<div id="pane-auto" class="pane">
  <div id="auto-sections"></div>
</div>

</main>

<div class="foot">
  <span class="foot-lbl">Ручных пройдено:</span>
  <span class="foot-val" id="foot-m-pass">0</span>/<span id="foot-m-total">52</span>
  <span class="foot-lbl" style="margin-left:8px">Упало:</span>
  <span class="foot-val red" id="foot-m-fail">0</span>
  <span class="foot-lbl" style="margin-left:8px">Авто:</span>
  <span class="foot-val green" id="foot-auto">209 / 209 ✓</span>
  <div style="margin-left:auto;display:flex;gap:6px;">
    <button class="btn btn-danger" onclick="markAllFail()">Все FAIL</button>
    <button class="btn btn-primary" onclick="markAllPass()">Все PASS</button>
  </div>
</div>

// ══════════════════════════════════════════════════════════════════════════
// STATE & STORAGE
// ══════════════════════════════════════════════════════════════════════════
const STATE_KEY = 'aida_qa_v4';
const state = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');

// Session results — applied only for keys not yet in state (first load or after reset)
const SESSION_DEFAULTS = {
  // ── MT: Tenant lifecycle ─────────────────────────────────────────────────
  'MT-01':'pending', 'MT-01_note':'Ранее FAIL (провижен). Pipeline теперь зелёный — нужен повторный тест.',
  'MT-02':'pass',
  'MT-03':'pending', 'MT-03_note':'FIX: admin.ts теперь передаёт expectedConfigVersion — повторить тест.',
  'MT-04':'pending',
  'MT-05':'pending', 'MT-05_note':'FIX: archiveTenant тоже передаёт expectedConfigVersion — повторить тест.',
  'MT-06':'pending',
  'MT-07':'pending',
  'MT-08':'skip',    'MT-08_note':'Нет тенанта со статусом PROVISIONING_FAILED в стенде.',
  'MT-09':'skip',    'MT-09_note':'Нет тенанта со статусом PROVISIONING_FAILED в стенде.',
  'MT-10':'pass',
  'MT-11':'pending', 'MT-11_note':'FIX: добавлен TenantStatusBadge в заголовок страницы members — повторить тест.',
  'MT-12':'pending', 'MT-12_note':'FIX: MemberInviteModal теперь показывает → {alias} в заголовке — повторить тест.',
  'MT-13':'pending', 'MT-13_note':'FIX: кнопка переименована в "Remove from tenant" — повторить тест.',
  'MT-14':'pending', 'MT-14_note':'FIX: кнопка переименована в "Edit Config" — повторить тест.',
  // ── CC: Cross-cutting ───────────────────────────────────────────────────
  'CC-14':'pending', 'CC-14_note':'Auditor не в ADMIN_ROLES → isAdmin=false → кнопок Edit/Block нет. Проверить.',
};
for (const [k, v] of Object.entries(SESSION_DEFAULTS)) {
  if (!(k in state)) state[k] = v;
}
function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
  const ind = document.getElementById('save-ind');
  if (ind) { ind.style.opacity = '1'; setTimeout(() => ind.style.opacity = '0', 1200); }
}

// ══════════════════════════════════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('pane-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ══════════════════════════════════════════════════════════════════════════
// MANUAL RENDER
// ══════════════════════════════════════════════════════════════════════════
function renderManual() {
  const container = document.getElementById('manual-sections');
  container.innerHTML = '';
  for (const cat of MANUAL) {
    const sec = document.createElement('div');
    sec.className = 'section';
    const pass = cat.tests.filter(t => state[t.id] === 'pass').length;
    const fail = cat.tests.filter(t => state[t.id] === 'fail').length;
    const pct = Math.round(pass / cat.tests.length * 100);
    const bcls = fail > 0 ? 'red' : pct === 100 ? 'green' : 'yellow';
    sec.innerHTML = `
      <div class="sec-hdr">
        <h2>${cat.label}</h2>
        <span class="badge ${bcls}">${pass}/${cat.tests.length} passed${fail ? ' · ' + fail + ' FAIL' : ''}</span>
        <span class="prio p${cat.prio[1]}">${cat.prio}</span>
      </div>
      <table class="tc-table">
        <colgroup><col style="width:70px"><col style="width:55px"><col style="width:260px"><col><col style="width:100px"><col style="width:130px"></colgroup>
        <thead><tr><th>ID</th><th>Prio</th><th>Тест</th><th>Ожидается</th><th>Статус</th><th>Заметки</th></tr></thead>
        <tbody>${cat.tests.map(t => renderTestRow(t)).join('')}</tbody>
      </table>`;
    container.appendChild(sec);
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderTestRow(t) {
  const s = state[t.id] || 'pending';
  const sc = s === 'pass' ? 'pass' : s === 'fail' ? 'fail' : s === 'skip' ? 'skip' : s === 'unclear' ? 'unclear' : '';
  return `<tr>
    <td><span class="tc-id">${esc(t.id)}</span></td>
    <td><span class="prio p${t.prio[1]}">${esc(t.prio)}</span></td>
    <td>
      <div class="tc-title">${esc(t.title)}</div>
      <div class="tc-steps">${esc(t.steps)}</div>
    </td>
    <td><div class="tc-expected">${esc(t.exp)}</div></td>
    <td>
      <select class="status-sel ${sc}" onchange="setStatus('${t.id}', this)">
        <option value="pending" ${s==='pending'?'selected':''}>— pending</option>
        <option value="pass" ${s==='pass'?'selected':''}>✓ PASS</option>
        <option value="fail" ${s==='fail'?'selected':''}>✗ FAIL</option>
        <option value="skip" ${s==='skip'?'selected':''}>⊘ SKIP</option>
        <option value="unclear" ${s==='unclear'?'selected':''}>? UNCLEAR</option>
      </select>
    </td>
    <td><textarea class="notes-in" rows="1" placeholder="Заметки…"
      onchange="setNote('${t.id}', this.value)">${esc(state[t.id+'_note'] || '')}</textarea></td>
  </tr>`;
}

function setStatus(id, sel) {
  state[id] = sel.value;
  sel.className = 'status-sel ' + (sel.value !== 'pending' ? sel.value : '');
  saveState();
  updateStats();
  renderSummary();
}

function setNote(id, val) {
  state[id + '_note'] = val;
  saveState();
}

// ══════════════════════════════════════════════════════════════════════════
// AUTO RENDER
// ══════════════════════════════════════════════════════════════════════════
function renderAuto() {
  const container = document.getElementById('auto-sections');
  container.innerHTML = '';

  const dt = new Date(AUTO_RESULTS.runAt);
  document.getElementById('run-time-lbl').textContent =
    dt.toLocaleString('ru', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });

  for (const suite of AUTO_RESULTS.suites) {
    const block = document.createElement('div');
    block.className = 'suite-block';
    const statusCls = suite.failed > 0 ? 'fill-red' : 'fill-green';
    block.innerHTML = `
      <div class="suite-hdr" onclick="toggleSuite(this)">
        <span class="suite-chevron">▶</span>
        <div>
          <div class="suite-label">${suite.label}</div>
          <div class="suite-file">${suite.file}</div>
        </div>
        <div class="suite-counts">
          <span class="cnt-pass">✓ ${suite.passed}</span>
          ${suite.failed > 0 ? `<span class="cnt-fail">✗ ${suite.failed}</span>` : ''}
        </div>
        <div style="width:80px">
          <div class="pbar"><div class="pbar-fill ${statusCls}" style="width:${Math.round(suite.passed/suite.total*100)}%"></div></div>
        </div>
      </div>
      <div class="suite-tests">
        ${suite.groups.map(g => `
          <div class="group-label">${g.name}</div>
          ${g.tests.map(t => `
            <div class="test-row">
              <div class="test-dot ${t.s==='passed'?'dot-pass':'dot-fail'}"></div>
              <div class="test-name">${t.t}</div>
              <div class="test-dur">${t.d}ms</div>
            </div>
            ${t.msg ? `<div class="fail-msg">${t.msg}</div>` : ''}
          `).join('')}
        `).join('')}
      </div>`;
    container.appendChild(block);
  }
}

function toggleSuite(hdr) {
  const tests = hdr.nextElementSibling;
  const chev = hdr.querySelector('.suite-chevron');
  tests.classList.toggle('open');
  chev.classList.toggle('open');
}

// ══════════════════════════════════════════════════════════════════════════
// SUMMARY
// ══════════════════════════════════════════════════════════════════════════
function renderSummary() {
  // Auto summary list
  const autoList = document.getElementById('auto-summary-list');
  autoList.innerHTML = AUTO_RESULTS.suites.map(s => {
    const pct = Math.round(s.passed / s.total * 100);
    const cls = s.failed > 0 ? 'red' : 'green';
    return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd)">
      <div class="pbar-wrap" style="width:120px">
        <div class="pbar"><div class="pbar-fill fill-${cls}" style="width:${pct}%"></div></div>
      </div>
      <span class="${cls}" style="font-size:11px;font-weight:700;width:36px">${s.passed}/${s.total}</span>
      <span style="font-size:11px;color:var(--t2);flex:1">${s.label}</span>
    </div>`;
  }).join('');

  // Manual summary list
  const manList = document.getElementById('manual-summary-list');
  manList.innerHTML = MANUAL.map(cat => {
    const pass = cat.tests.filter(t => state[t.id] === 'pass').length;
    const fail = cat.tests.filter(t => state[t.id] === 'fail').length;
    const pct = cat.tests.length ? Math.round(pass / cat.tests.length * 100) : 0;
    const cls = fail > 0 ? 'red' : pct === 100 ? 'green' : 'yellow';
    return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd)">
      <div class="pbar-wrap" style="width:120px">
        <div class="pbar"><div class="pbar-fill fill-${cls}" style="width:${pct}%"></div></div>
      </div>
      <span class="${cls}" style="font-size:11px;font-weight:700;width:36px">${pass}/${cat.tests.length}</span>
      <span style="font-size:11px;color:var(--t2);flex:1">${cat.label}</span>
      ${fail ? `<span style="font-size:10px;color:var(--danger)">${fail} FAIL</span>` : ''}
    </div>`;
  }).join('');

  // Summary cards
  const grid = document.getElementById('summary-grid');
  const totalManual = MANUAL.reduce((a,c)=>a+c.tests.length,0);
  const passManual  = MANUAL.reduce((a,c)=>a+c.tests.filter(t=>state[t.id]==='pass').length,0);
  const failManual  = MANUAL.reduce((a,c)=>a+c.tests.filter(t=>state[t.id]==='fail').length,0);
  const cards = [
    { label:'Авто всего', val:`${AUTO_RESULTS.passed}/${AUTO_RESULTS.total}`,
      pct:Math.round(AUTO_RESULTS.passed/AUTO_RESULTS.total*100),
      cls: AUTO_RESULTS.failed>0?'red':'green' },
    { label:'Ручных пройдено', val:`${passManual}/${totalManual}`,
      pct:Math.round(passManual/totalManual*100),
      cls: failManual>0?'red':passManual===totalManual?'green':'yellow' },
    { label:'Ручных упало', val:failManual+'', pct:0, cls: failManual>0?'red':'green' },
    { label:'Всего авто файлов', val:AUTO_RESULTS.suites.length+'', pct:100, cls:'blue' },
  ];
  grid.innerHTML = cards.map(c=>`
    <div class="scard">
      <div class="sname">${c.label}</div>
      <div class="sscore ${c.cls}">${c.val}</div>
      <div class="sbar"><div class="sfill fill-${c.cls}" style="width:${c.pct}%"></div></div>
    </div>`).join('');

  // Badges
  document.getElementById('auto-badge').textContent =
    `${AUTO_RESULTS.passed} / ${AUTO_RESULTS.total}${AUTO_RESULTS.failed?` · ${AUTO_RESULTS.failed} FAIL`:''}`;
  document.getElementById('manual-badge').textContent = `${passManual} / ${totalManual}`;
  document.getElementById('manual-badge').className =
    'badge ' + (failManual>0?'red':passManual===totalManual?'green':'yellow');
}

// ══════════════════════════════════════════════════════════════════════════
// FOOTER STATS
// ══════════════════════════════════════════════════════════════════════════
function updateStats() {
  const totalM = MANUAL.reduce((a,c)=>a+c.tests.length,0);
  const passM  = MANUAL.reduce((a,c)=>a+c.tests.filter(t=>state[t.id]==='pass').length,0);
  const failM  = MANUAL.reduce((a,c)=>a+c.tests.filter(t=>state[t.id]==='fail').length,0);

  document.getElementById('foot-m-pass').textContent  = passM;
  document.getElementById('foot-m-total').textContent = totalM;
  document.getElementById('foot-m-fail').textContent  = failM;

  document.getElementById('hdr-m-pass').textContent  = passM;
  document.getElementById('hdr-m-total').textContent = totalM;
  const failWrap = document.getElementById('hdr-fail-wrap');
  if (failM > 0) {
    failWrap.style.display = '';
    document.getElementById('hdr-fail').textContent = failM;
  } else {
    failWrap.style.display = 'none';
  }

  document.getElementById('foot-auto').textContent =
    `${AUTO_RESULTS.passed} / ${AUTO_RESULTS.total} ${AUTO_RESULTS.failed?'⚠':'✓'}`;
}

// ══════════════════════════════════════════════════════════════════════════
// BULK ACTIONS
// ══════════════════════════════════════════════════════════════════════════
function markAllPass() {
  for (const cat of MANUAL) for (const t of cat.tests) state[t.id] = 'pass';
  saveState(); renderManual(); updateStats(); renderSummary();
}
function markAllFail() {
  for (const cat of MANUAL) for (const t of cat.tests) state[t.id] = 'fail';
  saveState(); renderManual(); updateStats(); renderSummary();
}
function resetManual() {
  if (!confirm('Сбросить все ручные результаты?')) return;
  for (const cat of MANUAL) for (const t of cat.tests) { delete state[t.id]; delete state[t.id+'_note']; }
  saveState(); renderManual(); updateStats(); renderSummary();
}

// ══════════════════════════════════════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════════════════════════════════════
function exportReport() {
  const lines = [`AIDA QA Report — ${new Date().toLocaleString('ru')}\n`];
  lines.push(`AUTO  ${AUTO_RESULTS.passed}/${AUTO_RESULTS.total} passed (${AUTO_RESULTS.failed} failed)`);
  lines.push(`Last run: ${AUTO_RESULTS.runAt}\n`);
  lines.push('MANUAL RESULTS:');
  for (const cat of MANUAL) {
    lines.push(`\n## ${cat.label}`);
    for (const t of cat.tests) {
      const s = state[t.id] || 'pending';
      const note = state[t.id+'_note'] ? ` | ${state[t.id+'_note']}` : '';
      lines.push(`  [${s.toUpperCase().padEnd(7)}] ${t.id} — ${t.title}${note}`);
    }
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `aida-qa-${Date.now()}.txt`;
  a.click();
}

// ══════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════
renderManual();
renderAuto();
renderSummary();
updateStats();
</script>
