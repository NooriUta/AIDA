<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIDA QG-TEST-MATRIX · Ручное тестирование</title>
<style>
  :root {
    --bg0: #0e1117; --bg1: #161b22; --bg2: #1c2128; --bg3: #21262d;
    --bd: #30363d; --t1: #e6edf3; --t2: #8b949e; --t3: #484f58;
    --suc: #3fb950; --wrn: #d29922; --danger: #f85149; --info: #58a6ff;
    --mono: 'Fira Mono', 'Consolas', monospace;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg0); color: var(--t1); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }

  header { background: var(--bg1); border-bottom: 1px solid var(--bd); padding: 16px 24px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 15px; font-weight: 700; color: var(--t1); }
  header .meta { font-size: 11px; color: var(--t3); }

  .progress-bar-wrap { flex: 1 1 200px; min-width: 160px; }
  .progress-label { font-size: 11px; color: var(--t2); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--suc); border-radius: 3px; transition: width 0.3s; }
  .progress-fill.warn { background: var(--wrn); }
  .progress-fill.red  { background: var(--danger); }

  .actions { display: flex; gap: 8px; }
  .btn { padding: 5px 12px; border-radius: var(--radius); border: 1px solid var(--bd); cursor: pointer; font-size: 12px; font-family: inherit; background: var(--bg2); color: var(--t1); }
  .btn:hover { background: var(--bg3); }
  .btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
  .btn-primary:hover { background: #2ea043; }
  .btn-danger { background: #b62324; border-color: #f85149; color: #fff; }
  .btn-danger:hover { background: #da3633; }

  main { max-width: 1200px; margin: 0 auto; padding: 24px 16px 60px; }

  .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 28px; }
  .cat-card { background: var(--bg1); border: 1px solid var(--bd); border-radius: var(--radius); padding: 12px 14px; }
  .cat-card .cat-name { font-size: 11px; font-weight: 600; color: var(--t2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .cat-card .cat-score { font-size: 20px; font-weight: 700; }
  .cat-card .cat-bar { height: 3px; background: var(--bg3); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .cat-card .cat-fill { height: 100%; border-radius: 2px; }
  .green { color: var(--suc); } .fill-green { background: var(--suc); }
  .yellow { color: var(--wrn); } .fill-yellow { background: var(--wrn); }
  .red { color: var(--danger); } .fill-red { background: var(--danger); }

  .section { margin-bottom: 32px; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--bd); }
  .section-header h2 { font-size: 14px; font-weight: 700; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; border: 1px solid; }
  .badge.red    { color: var(--danger); border-color: #f85149aa; background: #f8514918; }
  .badge.yellow { color: var(--wrn);    border-color: #d2992288; background: #d2992218; }
  .badge.green  { color: var(--suc);    border-color: #3fb95088; background: #3fb95018; }

  .tc-table { width: 100%; border-collapse: collapse; }
  .tc-table th { text-align: left; padding: 6px 10px; font-size: 11px; color: var(--t3); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--bd); }
  .tc-table td { padding: 7px 10px; vertical-align: top; border-bottom: 1px solid var(--bd); }
  .tc-table tr:last-child td { border-bottom: none; }
  .tc-table tr:hover td { background: var(--bg2); }

  .tc-id { font-family: var(--mono); font-size: 11px; color: var(--t3); white-space: nowrap; }
  .tc-title { font-weight: 500; color: var(--t1); }
  .tc-steps { font-size: 11px; color: var(--t2); margin-top: 3px; line-height: 1.5; }
  .tc-expected { font-size: 11px; color: var(--info); font-style: italic; margin-top: 2px; }

  .status-select { background: var(--bg2); border: 1px solid var(--bd); color: var(--t1); font-size: 11px; border-radius: 4px; padding: 3px 6px; cursor: pointer; font-family: inherit; }
  .status-select.pass  { border-color: var(--suc); color: var(--suc); }
  .status-select.fail  { border-color: var(--danger); color: var(--danger); }
  .status-select.skip  { border-color: var(--t3); color: var(--t3); }

  .notes-input { background: var(--bg2); border: 1px solid var(--bd); color: var(--t1); font-size: 11px; border-radius: 4px; padding: 3px 6px; width: 100%; min-width: 120px; font-family: inherit; resize: vertical; }
  .notes-input:focus { outline: none; border-color: var(--info); }

  .priority { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; letter-spacing: .04em; }
  .p0 { background: #f8514930; color: var(--danger); }
  .p1 { background: #d2992230; color: var(--wrn); }
  .p2 { background: #58a6ff20; color: var(--info); }
  .p3 { background: var(--bg3); color: var(--t3); }

  .export-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg1); border-top: 1px solid var(--bd); padding: 10px 24px; display: flex; align-items: center; gap: 12px; }
  .export-bar .total-label { font-size: 12px; color: var(--t2); }
  .export-bar .total-score { font-size: 14px; font-weight: 700; color: var(--t1); }

  .row-pass td { background: #3fb95008; }
  .row-fail td { background: #f8514908; }

  @media print { .export-bar { display: none; } header { position: static; } }
</style>
</head>
<body>

<header>
  <div>
    <h1>AIDA · QG-TEST-MATRIX · Ручное тестирование</h1>
    <div class="meta" id="meta-date"></div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-label"><span>Прогресс сессии</span><span id="session-pct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="session-bar" style="width:0%"></div></div>
  </div>
  <div class="actions">
    <button class="btn" onclick="resetAll()">Сбросить</button>
    <button class="btn" onclick="exportReport()">📋 Отчёт</button>
    <button class="btn btn-primary" onclick="window.print()">🖨 Печать</button>
  </div>
</header>

<main>

<!-- Summary grid -->
<div class="summary-grid" id="summary-grid"></div>

<!-- Sections injected by JS -->
<div id="sections"></div>

</main>

<div class="export-bar">
  <span class="total-label">Итого пройдено:</span>
  <span class="total-score" id="footer-score">0 / 0</span>
  <span class="total-label" style="margin-left:8px">Упало:</span>
  <span class="total-score red" id="footer-fail">0</span>
  <span class="total-label" style="margin-left:8px">Пропущено:</span>
  <span class="total-score" style="color:var(--t3)" id="footer-skip">0</span>
  <div style="margin-left:auto;display:flex;gap:8px">
    <button class="btn btn-danger" onclick="markAllFail()">Все FAIL</button>
    <button class="btn btn-primary" onclick="markAllPass()">Все PASS</button>
  </div>
</div>

<script>
// ── Test data ────────────────────────────────────────────────────────────────
const MATRIX = [
  {
    id: 'mt-r1-r5', label: 'Multitenant R1–R5', priority: 'P0',
    baseline: { done: 0, total: 47 },
    tests: [
      // R1 — Tenant create & lifecycle
      { id: 'MT-01', title: 'Создание тенанта через UI', priority: 'P0',
        steps: '1. Перейди /admin/tenants\n2. Нажми "+ Create"\n3. Введи alias (напр. qa-test-01)\n4. Submit',
        expected: 'Тенант создан, статус PROVISIONING → ACTIVE (~10 сек). Появился в таблице.' },
      { id: 'MT-02', title: 'Таблица тенантов — колонки Users/Sources/Atoms', priority: 'P0',
        steps: '1. Открой /admin/tenants\n2. Найди только что созданный тенант',
        expected: 'Видны колонки: Alias, Status, Users, Sources, Atoms, Harvest cron, Config v, Actions.' },
      { id: 'MT-03', title: 'Suspend тенанта', priority: 'P0',
        steps: '1. В таблице найди ACTIVE тенант\n2. Нажми "Suspend"',
        expected: 'Статус меняется на SUSPENDED. Кнопки: Restore, Archive.' },
      { id: 'MT-04', title: 'Unsuspend (Restore) тенанта', priority: 'P0',
        steps: '1. Найди SUSPENDED тенант\n2. Нажми "Restore"',
        expected: 'Статус → ACTIVE. Кнопки: Harvest, Suspend, Archive.' },
      { id: 'MT-05', title: 'Archive тенанта', priority: 'P0',
        steps: '1. Найди ACTIVE или SUSPENDED тенант\n2. Нажми "Archive"\n3. Подтверди диалог',
        expected: 'Статус → ARCHIVED. Кнопка: Restore.' },
      { id: 'MT-06', title: 'Restore из архива', priority: 'P0',
        steps: '1. Найди ARCHIVED тенант\n2. Нажми "Restore"',
        expected: 'Статус → ACTIVE.' },
      { id: 'MT-07', title: 'Trigger Harvest', priority: 'P0',
        steps: '1. Найди ACTIVE тенант\n2. Нажми "Harvest"',
        expected: 'Alert "Harvest queued: <harvestId>". Job виден в JobRunr.' },
      { id: 'MT-08', title: 'PROVISIONING_FAILED — Retry', priority: 'P0',
        steps: '1. Найди тенант со статусом PROVISIONING_FAILED\n2. Нажми "Retry"',
        expected: 'Статус → PROVISIONING, затем ACTIVE или снова PROVISIONING_FAILED с новой причиной.' },
      { id: 'MT-09', title: 'PROVISIONING_FAILED — Cleanup', priority: 'P0',
        steps: '1. Найди тенант со статусом PROVISIONING_FAILED\n2. Нажми "Cleanup"\n3. Подтверди',
        expected: 'Тенант удалён из таблицы или перешёл в PURGED.' },
      { id: 'MT-10', title: 'Детальная страница тенанта', priority: 'P0',
        steps: '1. Кликни по строке тенанта\n2. Или кликни на alias',
        expected: 'Переход на /admin/tenants/<alias>. Видны все поля конфига.' },
      // R2 — Members
      { id: 'MT-11', title: 'Список участников тенанта', priority: 'P0',
        steps: '1. Открой /admin/tenants/<alias>/members',
        expected: 'Список пользователей KC-организации. Колонки: username, email, role.' },
      { id: 'MT-12', title: 'Инвайт участника в тенант', priority: 'P0',
        steps: '1. На странице members нажми "Invite"\n2. Введи email и роль\n3. Submit',
        expected: 'Пользователь добавлен в список. Появился в KC Organization.' },
      { id: 'MT-13', title: 'Удаление участника из тенанта', priority: 'P1',
        steps: '1. Найди участника в списке\n2. Нажми "Remove"',
        expected: 'Участник удалён из списка.' },
      // R3 — Config
      { id: 'MT-14', title: 'Редактирование конфига тенанта', priority: 'P0',
        steps: '1. Открой /admin/tenants/<alias>/config\n2. Измени harvestCron\n3. Save',
        expected: 'Сохранено без ошибок. configVersion увеличился на 1.' },
      { id: 'MT-15', title: 'Optimistic lock — конфликт версии', priority: 'P1',
        steps: '1. Открой конфиг в двух вкладках\n2. Сохрани в первой\n3. Попробуй сохранить во второй',
        expected: '409 Conflict — сообщение об ошибке версии.' },
      // R4 — Harvest & Events
      { id: 'MT-16', title: 'EventStream фильтр по тенанту', priority: 'P1',
        steps: '1. Открой /overview/events\n2. Выбери тенант в фильтре',
        expected: 'Поток событий фильтруется по tenantAlias.' },
      { id: 'MT-17', title: 'События тегируются tenantAlias', priority: 'P1',
        steps: '1. Запусти Harvest для тенанта\n2. Открой EventStream без фильтра',
        expected: 'События harvest содержат tenantAlias в payload/tags.' },
      // R5 — Isolation
      { id: 'MT-18', title: 'Изоляция: пользователь тенанта A не видит данные B', priority: 'P0',
        steps: '1. Создай двух пользователей в разных тенантах\n2. Войди как user-A\n3. Попробуй GET /api/admin/tenants/B/...',
        expected: '403 Forbidden.' },
      { id: 'MT-19', title: 'Фильтр поиска тенантов по статусу', priority: 'P1',
        steps: '1. Открой /admin/tenants\n2. Выбери "SUSPENDED" в фильтре статуса',
        expected: 'Таблица показывает только SUSPENDED тенанты.' },
      { id: 'MT-20', title: 'Фильтр поиска тенантов по alias', priority: 'P1',
        steps: '1. Введи часть alias в строке поиска',
        expected: 'Таблица фильтруется в реальном времени.' },
      { id: 'MT-21', title: 'Пагинация тенантов', priority: 'P2',
        steps: '1. Если тенантов > 20 — появились ← → кнопки\n2. Нажми →',
        expected: 'Следующая страница загружается.' },
      { id: 'MT-22', title: 'Статус PROVISIONING_FAILED в фильтре', priority: 'P1',
        steps: '1. Выбери "PROVISIONING_FAILED" в фильтре статуса',
        expected: 'Только тенанты с ошибкой провижна.' },
      { id: 'MT-23', title: 'Кнопка Refresh обновляет список', priority: 'P2',
        steps: '1. Нажми Refresh\n2. Данные обновились без перезагрузки страницы',
        expected: 'Spinner → данные обновлены.' },
    ]
  },
  {
    id: 'security', label: 'Security', priority: 'P1',
    baseline: { done: 4, total: 7 },
    tests: [
      // SEC-01/02/05 moved to automated (tenant-mt.test.ts SEC block)
      { id: 'SEC-03', title: 'Неаутентифицированный запрос → redirect login', priority: 'P0',
        steps: '1. Открой /admin/tenants в режиме инкогнито',
        expected: 'Redirect на /login.' },
      { id: 'SEC-04', title: 'Сессия истекает → redirect login', priority: 'P1',
        steps: '1. Войди\n2. Удали session cookie в DevTools\n3. Обнови страницу',
        expected: 'Redirect на /login.' },
      { id: 'SEC-06', title: 'Нет доступа к /admin/tenants для обычного пользователя', priority: 'P0',
        steps: '1. Войди как user (без роли admin)\n2. Перейди /admin/tenants',
        expected: 'Страница не отображается / redirect.' },
      { id: 'SEC-07', title: 'Rate limiting на /auth/login', priority: 'P1',
        steps: '1. Отправь 10+ запросов на /auth/login с неверным паролем',
        expected: '429 Too Many Requests.' },
      { id: 'SEC-08', title: 'API Key аутентификация', priority: 'P1',
        steps: '1. Сгенерируй API Key\n2. Отправь запрос с X-API-Key заголовком',
        expected: '200 OK.' },
      { id: 'SEC-09', title: 'Невалидный API Key → 401', priority: 'P1',
        steps: '1. Отправь запрос с X-API-Key: invalid',
        expected: '401 Unauthorized.' },
      { id: 'SEC-10', title: 'XSS: alias с <script> не исполняется', priority: 'P1',
        steps: '1. Попробуй создать тенант с alias содержащим < > символы',
        expected: 'Валидация отклоняет / символы экранированы в UI.' },
    ]
  },
  {
    id: 'cross-cutting', label: 'Cross-cutting', priority: 'P1',
    baseline: { done: 2, total: 13 },
    tests: [
      { id: 'CC-01', title: 'DEV секция видна для admin в dev-режиме', priority: 'P1',
        steps: '1. Запусти heimdall-frontend локально (npm run dev)\n2. Войди как admin\n3. Открой /overview/services',
        expected: 'Вкладка "Dev" видна. Список dev-сервисов отображается.' },
      { id: 'CC-02', title: 'DEV секция скрыта в prod-сборке', priority: 'P1',
        steps: '1. Открой staging окружение (prod build)\n2. Войди как admin',
        expected: 'Вкладки Dev нет.' },
      { id: 'CC-03', title: 'ServiceTopology — collapse/expand', priority: 'P1',
        steps: '1. Открой /overview/services (dev)\n2. Найди блок Service Topology\n3. По умолчанию свёрнут\n4. Нажми "▶ expand"',
        expected: 'Граф разворачивается. Направление — слева направо (LR). Нажми "▼ collapse" — сворачивается.' },
      { id: 'CC-04', title: 'ServiceTopology — ELK LR направление', priority: 'P1',
        steps: '1. Раскрой Service Topology\n2. Смотри направление рёбер',
        expected: 'Граф идёт слева направо. Входящие стрелки слева, исходящие справа.' },
      { id: 'CC-05', title: 'i18n переключение RU→EN', priority: 'P2',
        steps: '1. Переключи язык на EN (настройки)\n2. Проверь страницу тенантов',
        expected: 'Все надписи на English, включая статусы тенантов.' },
      { id: 'CC-06', title: 'i18n переключение EN→RU', priority: 'P2',
        steps: '1. Переключи на RU\n2. Проверь страницу тенантов',
        expected: 'Все надписи на русском.' },
      { id: 'CC-07', title: 'RoleGuard: admin видит кнопку Create в /admin/tenants', priority: 'P1',
        steps: '1. Войди как admin\n2. Открой /admin/tenants',
        expected: 'Кнопка "+ Create" видна.' },
      { id: 'CC-08', title: 'RoleGuard: local-admin не видит Create', priority: 'P1',
        steps: '1. Войди как local-admin\n2. Открой /admin/tenants',
        expected: 'Кнопки "+ Create" нет.' },
      { id: 'CC-09', title: 'Vite proxy: CHUR_PROXY_TARGET работает', priority: 'P2',
        steps: '1. Запусти с CHUR_PROXY_TARGET=http://localhost:3000\n2. Проверь /auth/session',
        expected: '200 OK — прокси настроен правильно.' },
      { id: 'CC-10', title: 'ConsentModal появляется при первом входе', priority: 'P2',
        steps: '1. Зайди под новым пользователем\n2. Или сбрось consent в настройках',
        expected: 'Модал T&C/Privacy появляется.' },
      { id: 'CC-11', title: 'Page title меняется при навигации', priority: 'P3',
        steps: '1. Перейди на /admin/tenants\n2. Смотри title вкладки браузера',
        expected: 'Title: "Tenants — Heimðallr"' },
    ]
  },
  {
    id: 'dali', label: 'Dali', priority: 'P2',
    baseline: { done: 6, total: 23 },
    tests: [
      { id: 'DL-01', title: 'Upload SQL файла через UI', priority: 'P1',
        steps: '1. Открой /dali/sources\n2. Выбери источник\n3. Загрузи .sql файл',
        expected: 'Файл загружен. Job создан в JobRunr.' },
      { id: 'DL-02', title: 'Job COMPLETED в JobRunr', priority: 'P1',
        steps: '1. После upload подожди\n2. Открой /jobrunr',
        expected: 'Job в статусе SUCCEEDED.' },
      { id: 'DL-03', title: 'Создание DaliSource', priority: 'P1',
        steps: '1. /dali/sources → "+ Add Source"\n2. Введи имя и параметры\n3. Save',
        expected: 'Источник создан, появился в списке.' },
      { id: 'DL-04', title: 'Список сессий Dali', priority: 'P2',
        steps: '1. Открой /dali/sessions',
        expected: 'Таблица сессий с колонками: ID, Source, Status, Atoms, Resolution.' },
      { id: 'DL-05', title: 'Dali proxy через DALI_PROXY_TARGET', priority: 'P2',
        steps: '1. Запусти с DALI_PROXY_TARGET\n2. Открой /dali/sessions',
        expected: 'Данные загружаются с нужного Dali-инстанса.' },
      { id: 'DL-06', title: 'Retry failed Dali job', priority: 'P2',
        steps: '1. Найди FAILED job в JobRunr\n2. Нажми Requeue',
        expected: 'Job перезапущен.' },
    ]
  },
  {
    id: 'verdandi', label: 'Verdandi', priority: 'P2',
    baseline: { done: 4, total: 13 },
    tests: [
      { id: 'VD-01', title: 'SQL инспектор — открыть сессию', priority: 'P1',
        steps: '1. Открой Verdandi\n2. Выбери сессию Dali',
        expected: 'Граф запроса отображается.' },
      { id: 'VD-02', title: 'Command Palette — поиск', priority: 'P2',
        steps: '1. Нажми Cmd/Ctrl+K\n2. Введи текст поиска',
        expected: 'Palette открывается, результаты появляются.' },
      { id: 'VD-03', title: 'Undo/Redo в канвасе', priority: 'P2',
        steps: '1. Переместим ноду\n2. Ctrl+Z\n3. Ctrl+Y',
        expected: 'Undo и Redo работают.' },
      { id: 'VD-04', title: 'Фильтрация нод', priority: 'P2',
        steps: '1. Введи текст в фильтр\n2. Нода скрывается/подсвечивается',
        expected: 'Фильтр работает.' },
      { id: 'VD-05', title: 'Профиль пользователя — сохранение настроек', priority: 'P3',
        steps: '1. Открой ProfileModal\n2. Измени тему\n3. Закрой и открой снова',
        expected: 'Тема сохранилась.' },
    ]
  },
];

// ── State ────────────────────────────────────────────────────────────────────
const state = {};

function loadState() {
  try {
    const saved = localStorage.getItem('aida-qa-state');
    if (saved) Object.assign(state, JSON.parse(saved));
  } catch {}
}

function saveState() {
  localStorage.setItem('aida-qa-state', JSON.stringify(state));
}

// ── Build UI ─────────────────────────────────────────────────────────────────
function colorClass(pct) {
  if (pct >= 70) return 'green';
  if (pct >= 40) return 'yellow';
  return 'red';
}

function buildSummary() {
  const grid = document.getElementById('summary-grid');
  grid.innerHTML = '';
  for (const cat of MATRIX) {
    const total = cat.tests.length;
    const passed = cat.tests.filter(t => state[t.id] === 'pass').length;
    const pct = total ? Math.round(passed / total * 100) : 0;
    const cls = colorClass(pct);
    grid.innerHTML += `
      <div class="cat-card">
        <div class="cat-name">${cat.label}</div>
        <div class="cat-score ${cls}">${passed}/${total} <span style="font-size:13px">(${pct}%)</span></div>
        <div class="cat-bar"><div class="cat-fill fill-${cls}" style="width:${pct}%"></div></div>
      </div>`;
  }
}

function buildSections() {
  const container = document.getElementById('sections');
  container.innerHTML = '';
  for (const cat of MATRIX) {
    const pct0 = cat.baseline.total ? Math.round(cat.baseline.done / cat.baseline.total * 100) : 0;
    const cls = colorClass(pct0);
    const badgeLabel = `Automated: ${cat.baseline.done}/${cat.baseline.total} (${pct0}%)`;
    let rows = '';
    for (const tc of cat.tests) {
      const status = state[tc.id] || 'pending';
      const stepsHtml = (tc.steps || '').replace(/\n/g, '<br>');
      rows += `
        <tr class="row-${status}" id="row-${tc.id}">
          <td class="tc-id">${tc.id}</td>
          <td>
            <div class="tc-title">${tc.title}</div>
            <div class="tc-steps">${stepsHtml}</div>
            <div class="tc-expected">✓ Ожидается: ${tc.expected}</div>
          </td>
          <td><span class="priority p${tc.priority.toLowerCase()}">${tc.priority}</span></td>
          <td>
            <select class="status-select ${status}" onchange="setStatus('${tc.id}', this.value, this)">
              <option value="pending" ${status==='pending'?'selected':''}>— pending</option>
              <option value="pass"    ${status==='pass'?'selected':''}>✅ PASS</option>
              <option value="fail"    ${status==='fail'?'selected':''}>❌ FAIL</option>
              <option value="skip"    ${status==='skip'?'selected':''}>⏭ SKIP</option>
            </select>
          </td>
          <td>
            <textarea class="notes-input" rows="1" placeholder="Заметки…"
              onchange="setNote('${tc.id}', this.value)">${state[tc.id + '_note'] || ''}</textarea>
          </td>
        </tr>`;
    }
    container.innerHTML += `
      <div class="section">
        <div class="section-header">
          <h2>${cat.label}</h2>
          <span class="badge ${cls}">${badgeLabel}</span>
          <span class="badge ${colorClass(pct0) === 'red' ? 'red' : 'yellow'}">${cat.priority}</span>
        </div>
        <table class="tc-table">
          <thead><tr>
            <th style="width:70px">ID</th>
            <th>Тест / Шаги / Ожидание</th>
            <th style="width:60px">Prio</th>
            <th style="width:100px">Статус</th>
            <th style="width:160px">Заметки</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }
}

function setStatus(id, value, sel) {
  state[id] = value;
  saveState();
  sel.className = 'status-select ' + value;
  const row = document.getElementById('row-' + id);
  row.className = 'row-' + value;
  updateFooter();
  buildSummary();
}

function setNote(id, value) {
  state[id + '_note'] = value;
  saveState();
}

function updateFooter() {
  let pass = 0, fail = 0, skip = 0, total = 0;
  for (const cat of MATRIX) {
    for (const tc of cat.tests) {
      total++;
      if (state[tc.id] === 'pass') pass++;
      else if (state[tc.id] === 'fail') fail++;
      else if (state[tc.id] === 'skip') skip++;
    }
  }
  const pct = total ? Math.round(pass / total * 100) : 0;
  document.getElementById('footer-score').textContent = `${pass} / ${total} (${pct}%)`;
  document.getElementById('footer-fail').textContent = fail;
  document.getElementById('footer-skip').textContent = skip;
  const bar = document.getElementById('session-bar');
  const pctLabel = document.getElementById('session-pct');
  bar.style.width = pct + '%';
  bar.className = 'progress-fill' + (pct >= 70 ? '' : pct >= 40 ? ' warn' : ' red');
  pctLabel.textContent = pct + '%';
}

function resetAll() {
  if (!confirm('Сбросить все результаты?')) return;
  for (const key of Object.keys(state)) delete state[key];
  saveState();
  buildSections();
  buildSummary();
  updateFooter();
}

function markAllPass() {
  for (const cat of MATRIX) for (const tc of cat.tests) state[tc.id] = 'pass';
  saveState(); rebuild();
}
function markAllFail() {
  for (const cat of MATRIX) for (const tc of cat.tests) state[tc.id] = 'fail';
  saveState(); rebuild();
}

function rebuild() { buildSections(); buildSummary(); updateFooter(); }

function exportReport() {
  let txt = `AIDA QG Manual Test Report — ${new Date().toISOString()}\n${'='.repeat(60)}\n\n`;
  for (const cat of MATRIX) {
    txt += `## ${cat.label}\n`;
    for (const tc of cat.tests) {
      const s = state[tc.id] || 'pending';
      const note = state[tc.id + '_note'] || '';
      txt += `  [${s.toUpperCase().padEnd(7)}] ${tc.id} — ${tc.title}${note ? ' | ' + note : ''}\n`;
    }
    txt += '\n';
  }
  const blob = new Blob([txt], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `aida-qa-report-${Date.now()}.txt`;
  a.click();
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('meta-date').textContent =
  'Дата: ' + new Date().toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' }) +
  ' · Ветка: prerelease · Версия: v1.4.0-rc';

loadState();
buildSections();
buildSummary();
updateFooter();
</script>
</body>
</html>
