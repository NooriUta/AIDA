# ── Server ────────────────────────────────────────────────────────────────────
quarkus.analytics.disabled=true
quarkus.http.port=9090
quarkus.http.host=0.0.0.0
quarkus.application.name=dali

# ── File Upload limits ────────────────────────────────────────────────────────
quarkus.http.limits.max-body-size=200M
quarkus.http.limits.max-form-attribute-size=200M

# ── CORS ──────────────────────────────────────────────────────────────────────
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:13000,http://localhost:5174,http://localhost:5175,http://localhost:25174}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type

# ── FRIGG — ArcadeDB for JobRunr persistence ──────────────────────────────────
quarkus.rest-client.dali-frigg.url=${FRIGG_URL:http://localhost:2481}
quarkus.rest-client.dali-frigg.scope=Singleton
# BUG-SS-041: ArcadeDB drops idle HTTP connections after ~60s.
# Set client TTL to 30s so Vert.x discards connections before they go stale.
quarkus.rest-client.dali-frigg.connection-ttl=30000

frigg.url=${FRIGG_URL:http://localhost:2481}
frigg.db=${FRIGG_DB:dali}
frigg.user=${FRIGG_USER:root}
frigg.password=${FRIGG_PASSWORD:playwithdata}

# ── Upstream services (prep for Dali→Heimdall / Dali→Ygg calls) ──────────────
# HEIMDALL_URL: override for Docker/k8s — e.g. http://heimdall-backend:9093
quarkus.rest-client.heimdall-api.url=${HEIMDALL_URL:http://localhost:9093}
# ParseJob: HoundHeimdallListener fire-and-forget URL — empty means NoOp (disabled)
heimdall.url=${HEIMDALL_URL:}
# YGG_URL: override for Docker/k8s — e.g. http://ygg:2480  (service name, container_name=Ygg-1)
quarkus.rest-client.ygg-api.url=${YGG_URL:http://localhost:2480}

# ── YGG — direct config for HoundParser writes ────────────────────────────────
ygg.url=${YGG_URL:http://localhost:2480}
ygg.db=${YGG_DB:hound}
ygg.user=${YGG_USER:root}
ygg.password=${YGG_PASSWORD:playwithdata}

# ── tenant-routing: YggLineageRegistry / YggSourceArchiveRegistry ─────────────
# Single-pool (Phase 1 / single-tenant demo):
#   ygg.lineage.url  → DefaultYggLineageRegistry (hound_default)
#   ygg.source.url   → DefaultYggSourceArchiveRegistry (hound_src_default)
ygg.lineage.url=${YGG_URL:http://localhost:2480}
ygg.lineage.db=${YGG_LINEAGE_DB:hound_default}
ygg.source.url=${YGG_URL:http://localhost:2480}
ygg.source.db=${YGG_SOURCE_DB:hound_src_default}

# Force Quarkus to scan CDI beans in tenant-routing library
quarkus.index-dependency.tenant-routing.group-id=studio.seer
quarkus.index-dependency.tenant-routing.artifact-id=tenant-routing

# ── Session retention ─────────────────────────────────────────────────────────
# Sessions older than this many days are deleted from FRIGG daily at 03:00.
# Override via env: DALI_SESSION_RETENTION_DAYS
dali.session.retention-days=${DALI_SESSION_RETENTION_DAYS:30}

# ── Instance identity (multi-Dali / multi-tenant) ────────────────────────────
# Set DALI_INSTANCE_ID env var to isolate sessions when multiple Dali instances
# share one FRIGG. Unset/empty = untagged (single-instance / backward-compat).
dali.instance.id=${DALI_INSTANCE_ID:}

# ── JobRunr ───────────────────────────────────────────────────────────────────
# Configured programmatically via JobRunrProducer CDI bean (see infrastructure/)
dali.jobrunr.background-job-server.enabled=true
# 4 workers = up to 4 concurrent parses per instance; new jobs queue via JobRunr.
dali.jobrunr.worker-threads=${DALI_WORKER_THREADS:4}
# DMT-07: worker-only=true suppresses dashboard; node processes jobs only.
# Set DALI_WORKER_ONLY=true on replica pods that should not serve the dashboard.
dali.jobrunr.worker-only=${DALI_WORKER_ONLY:false}
# Dashboard HTTP port. Override with DALI_JOBRUNR_DASHBOARD_PORT (Docker: maps to internal port).
dali.jobrunr.dashboard.enabled=true
dali.jobrunr.dashboard.port=${DALI_JOBRUNR_DASHBOARD_PORT:29091}
# Tests: disable the HTTP server to avoid port conflicts
%test.dali.jobrunr.dashboard.enabled=false

# ── Harvest cron (DS-06) ──────────────────────────────────────────────────────
# Nightly at 02:00 UTC. Override with DALI_HARVEST_CRON env var.
# Dev: every 5 minutes for manual testing. Test: off (tests enqueue jobs directly).
dali.harvest.cron=${DALI_HARVEST_CRON:0 0 2 * * ?}
%dev.dali.harvest.cron=0 */5 * * * ?
%test.dali.harvest.cron=off

# ── JDBC Sources (DaliConfig) ─────────────────────────────────────────────────
# Configure JDBC sources for nightly harvest. Empty list = HarvestJob is a no-op.
# dali.sources[0].name=oracle-prod
# dali.sources[0].dialect=oracle
# dali.sources[0].jdbc-url=jdbc:oracle:thin:@localhost:1521:XE
# dali.sources[0].username=dali_harvest
# dali.sources[0].password=secret
# dali.sources[0].schema=HR

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."studio.seer".level=DEBUG
quarkus.log.category."com.hound".level=INFO
# Compact timestamp format: HH:mm:ss.SSS LEVEL [logger] message
quarkus.log.console.format=%d{HH:mm:ss.SSS} %-5p [%c{1.}] (%t) %s%e%n
quarkus.log.console.color=true
