# ── Server ────────────────────────────────────────────────────────────────────
quarkus.analytics.disabled=true
quarkus.http.port=9090
quarkus.http.host=0.0.0.0
quarkus.application.name=dali

# ── File Upload limits ────────────────────────────────────────────────────────
quarkus.http.limits.max-body-size=200M
quarkus.http.limits.max-form-attribute-size=200M

# ── CORS ──────────────────────────────────────────────────────────────────────
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:13000,http://localhost:5174,http://localhost:5175,http://localhost:25174}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type

# ── FRIGG — ArcadeDB for JobRunr persistence ──────────────────────────────────
quarkus.rest-client.dali-frigg.url=${FRIGG_URL:http://localhost:2481}
quarkus.rest-client.dali-frigg.scope=Singleton
# BUG-SS-041: ArcadeDB drops idle HTTP connections after ~60s.
# Set client TTL to 30s so Vert.x discards connections before they go stale.
quarkus.rest-client.dali-frigg.connection-ttl=30000

frigg.url=${FRIGG_URL:http://localhost:2481}
frigg.db=${FRIGG_DB:dali}
frigg.user=${FRIGG_USER:root}
frigg.password=${FRIGG_PASSWORD:playwithdata}

# ── Upstream services (prep for Dali→Heimdall / Dali→Ygg calls) ──────────────
# HEIMDALL_URL: override for Docker/k8s — e.g. http://heimdall-backend:9093
quarkus.rest-client.heimdall-api.url=${HEIMDALL_URL:http://localhost:9093}
# ParseJob: HoundHeimdallListener fire-and-forget URL — empty means NoOp (disabled)
heimdall.url=${HEIMDALL_URL:}
# YGG_URL: override for Docker/k8s — e.g. http://ygg:2480  (service name, container_name=Ygg-1)
quarkus.rest-client.ygg-api.url=${YGG_URL:http://localhost:2480}

# ── YGG — direct config for HoundParser writes ────────────────────────────────
ygg.url=${YGG_URL:http://localhost:2480}
ygg.db=${YGG_DB:hound}
ygg.user=${YGG_USER:root}
ygg.password=${YGG_PASSWORD:playwithdata}

# ── Instance identity (multi-Dali / multi-tenant) ────────────────────────────
# Set DALI_INSTANCE_ID env var to isolate sessions when multiple Dali instances
# share one FRIGG. Unset/empty = untagged (single-instance / backward-compat).
# dali.instance.id=${DALI_INSTANCE_ID}

# ── JobRunr ───────────────────────────────────────────────────────────────────
# Configured programmatically via JobRunrProducer CDI bean (see infrastructure/)
dali.jobrunr.background-job-server.enabled=true
dali.jobrunr.worker-threads=4

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."studio.seer".level=DEBUG
quarkus.log.category."com.hound".level=INFO
# Compact timestamp format: HH:mm:ss.SSS LEVEL [logger] message
quarkus.log.console.format=%d{HH:mm:ss.SSS} %-5p [%c{1.}] (%t) %s%e%n
quarkus.log.console.color=true
