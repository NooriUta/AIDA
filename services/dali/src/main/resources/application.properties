# в”Ђв”Ђ CORS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:13000,http://localhost:5174,http://localhost:5175,http://localhost:25174}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type

# в”Ђв”Ђ FRIGG вЂ” ArcadeDB for JobRunr persistence в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
quarkus.rest-client.dali-frigg.url=${FRIGG_URL:http://localhost:2481}
quarkus.rest-client.dali-frigg.scope=Singleton

frigg.url=${FRIGG_URL:http://localhost:2481}
frigg.db=${FRIGG_DB:dali}
frigg.user=${FRIGG_USER:root}
frigg.password=${FRIGG_PASSWORD:playwithdata}

# в”Ђв”Ђ Upstream services (prep for Daliв†’Heimdall / Daliв†’Ygg calls) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# HEIMDALL_URL: override for Docker/k8s вЂ” e.g. http://heimdall-backend:9093
quarkus.rest-client.heimdall-api.url=${HEIMDALL_URL:http://localhost:9093}
# YGG_URL: override for Docker/k8s вЂ” e.g. http://HoundArcade:2480
quarkus.rest-client.ygg-api.url=${YGG_URL:http://localhost:2480}

# в”Ђв”Ђ YGG вЂ” direct config for HoundParser writes в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
ygg.url=${YGG_URL:http://localhost:2480}
ygg.db=${YGG_DB:hound}
