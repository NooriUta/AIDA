# ── Multi-tenant routing ──────────────────────────────────────────────────────
# false → DefaultYggLineageRegistry: все тенанты → hound_default (dev без FRIGG)
# true  → FriggYggLineageRegistry:  маршрут читается из DaliTenantConfig в FRIGG
# BUILD-TIME property (влияет на CDI бин-выбор при сборке)
aida.multitenant.enabled=true

# ── Server ────────────────────────────────────────────────────────────────────
quarkus.http.port=8080
# Internal only — rbac-proxy is the single external entry point
# In production set to 127.0.0.1; dev leaves it open for tooling
quarkus.http.host=0.0.0.0

# ── CORS — allow rbac-proxy and dev Vite ─────────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173,http://localhost:5175
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,X-Seer-Role,X-Seer-User,X-Seer-Tenant-Alias,X-Seer-Override-Tenant

# ── GraphQL ──────────────────────────────────────────────────────────────────
quarkus.smallrye-graphql.ui.enable=true
quarkus.smallrye-graphql.ui.always-include=true
quarkus.smallrye-graphql.ui.root-path=/graphql-ui

# ── ArcadeDB REST client ──────────────────────────────────────────────────────
# YGG_URL: override for Docker/k8s — e.g. http://ygg:2480 or http://ygg.aida.svc.cluster.local:2480
quarkus.rest-client.arcade.url=${YGG_URL:http://localhost:2480}
quarkus.rest-client.arcade.scope=Singleton

arcade.db=${ARCADEDB_DB:hound}
arcade.user=${ARCADEDB_USER:root}
arcade.password=${ARCADEDB_PASSWORD:playwithdata}

# ── HEIMDALL event emitter (fire-and-forget) ─────────────────────────────────
# Short timeouts: HEIMDALL unavailability must NOT block SHUTTLE
# HEIMDALL_URL: override for Docker/k8s — e.g. http://heimdall-backend:9093
quarkus.rest-client.heimdall-api.url=${HEIMDALL_URL:http://localhost:9093}
quarkus.rest-client.heimdall-api.connect-timeout=500
quarkus.rest-client.heimdall-api.read-timeout=1000

# ── Logging ──────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."studio.seer".level=DEBUG

# ── Dali REST client (C.2.4) ─────────────────────────────────────────────────
quarkus.rest-client.dali-client.url=${DALI_URL:http://localhost:9090}
quarkus.rest-client.dali-client.connect-timeout=3000
quarkus.rest-client.dali-client.read-timeout=10000

mp.fault-tolerance.enabled=true

# ── MIMIR REST client (SC-02) ─────────────────────────────────────────────────
quarkus.rest-client.mimir-client.url=${MIMIR_URL:http://localhost:9094}
quarkus.rest-client.mimir-client.connect-timeout=2000
quarkus.rest-client.mimir-client.read-timeout=12000

# ── ANVIL REST client (SC-03) ─────────────────────────────────────────────────
quarkus.rest-client.anvil-client.url=${ANVIL_URL:http://localhost:9095}
quarkus.rest-client.anvil-client.connect-timeout=2000
quarkus.rest-client.anvil-client.read-timeout=18000

# ── Dev mode ─────────────────────────────────────────────────────────────────
%dev.quarkus.smallrye-graphql.ui.always-include=true
%dev.quarkus.log.category."studio.seer".level=DEBUG
