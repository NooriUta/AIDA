# ── Server ────────────────────────────────────────────────────────────────────
quarkus.analytics.disabled=true
quarkus.http.port=9093
quarkus.http.host=0.0.0.0
quarkus.application.name=heimdall-backend

# ── Ring buffer ───────────────────────────────────────────────────────────────
heimdall.ring-buffer.capacity=10000

# ── CORS — Chur proxy (:3000/:13000) и локальная разработка ──────────────────
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:13000,http://localhost:5174
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,X-Seer-Role,X-Seer-User

# ── FRIGG — ArcadeDB :2481 dev / frigg:2480 Docker (отдельный от HoundArcade) ─
quarkus.rest-client.frigg-api.url=http://localhost:2481
quarkus.rest-client.frigg-api.scope=Singleton
frigg.db=heimdall
frigg.user=root
frigg.password=playwithdata
%prod.quarkus.rest-client.frigg-api.url=http://frigg:2480
%prod.frigg.db=${FRIGG_DB:heimdall}
%prod.frigg.user=${FRIGG_USER:root}
%prod.frigg.password=${FRIGG_PASSWORD:playwithdata}

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."studio.seer".level=DEBUG
