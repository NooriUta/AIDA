# ── Server ────────────────────────────────────────────────────────────────────
quarkus.analytics.disabled=true
quarkus.http.port=9093
quarkus.http.host=0.0.0.0
quarkus.application.name=heimdall-backend

# ── Ring buffer ───────────────────────────────────────────────────────────────
heimdall.ring-buffer.capacity=10000

# ── CORS — Chur proxy (:3000/:13000) и локальная разработка ──────────────────
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:13000,http://localhost:5174}
quarkus.http.cors.methods=GET,POST,PUT,OPTIONS
quarkus.http.cors.headers=Content-Type,X-Seer-Role,X-Seer-User

# ── FRIGG — ArcadeDB (отдельный от HoundArcade) ──────────────────────────────
# FRIGG_URL: override for Docker/k8s — e.g. http://frigg:2480  (container-internal port, NOT 2481)
# Note: port 2481 = host-side only (docker-compose maps 2481→2480). Inside Docker always use :2480.
quarkus.rest-client.frigg-api.url=${FRIGG_URL:http://localhost:2481}
quarkus.rest-client.frigg-api.scope=Singleton
frigg.db=${FRIGG_DB:heimdall}
frigg.user=${FRIGG_USER:root}
frigg.password=${FRIGG_PASSWORD:playwithdata}

# ── Services monitoring ───────────────────────────────────────────────────────
# Format per entry: name:port:type[:healthPath]
#   type = http  — standard HTTP GET ping
#   type = tcp   — TCP port check only (Vite dev servers, Keycloak)
#   type = self  — always UP, no ping (this process itself)
# Overridable via env vars: SEER_SERVICES_DEV / SEER_SERVICES_DOCKER
seer.services.dev=shuttle:8080:http,chur:3000:http,heimdall-backend:9093:http,verdandi:5173:tcp,heimdall-frontend:5174:self,shell:5175:tcp,dali:9090:http:/q/health
seer.services.docker=shuttle:18080:http:/:8080,chur:13000:http:/:3000,heimdall-backend:19093:http:/:9093,verdandi:15173:http:/:5173,heimdall-frontend:25174:http:/:5174,shell:25175:http:/:5175,keycloak:18180:tcp:/:8180,frigg:2481:http:/:2480,ygg:2480:http:/:2480:ygg,dali:19090:http:/q/health:9090

# ── Docs viewer (M — dev-only) ───────────────────────────────────────────────
# Docker: docs/ mounted as /docs:ro via docker-compose.yml
# Dev: path relative to monorepo root (cwd when running gradlew from .)
%dev.docs.root=docs
docs.root=/docs

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."studio.seer".level=DEBUG
