# ── Server ────────────────────────────────────────────────────────────────────
quarkus.analytics.disabled=true
quarkus.http.port=9094
quarkus.http.host=0.0.0.0
quarkus.application.name=mimir

# ── CORS — Chur proxy ─────────────────────────────────────────────────────────
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:13000}
quarkus.http.cors.methods=GET,POST,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,X-Seer-Role,X-Seer-Tenant-Alias

# ── LangChain4j — Active model selection ─────────────────────────────────────
# dev:  OpenAI-compatible → DeepSeek (cheaper for scaffold/dev)
# prod: Anthropic → Claude Sonnet (wired in MIMIR Foundation sprint)
%dev.quarkus.langchain4j.default-config=openai
quarkus.langchain4j.default-config=anthropic

# ── Dev: DeepSeek via OpenAI-compatible API ───────────────────────────────────
%dev.quarkus.langchain4j.openai.base-url=https://api.deepseek.com/v1
%dev.quarkus.langchain4j.openai.api-key=${DEEPSEEK_API_KEY:PLACEHOLDER}
%dev.quarkus.langchain4j.openai.chat-model.model-name=deepseek-chat
%dev.quarkus.langchain4j.openai.chat-model.max-tokens=2048
%dev.quarkus.langchain4j.openai.chat-model.temperature=0.1
%dev.quarkus.langchain4j.openai.timeout=30s

# ── Prod: Anthropic Claude Sonnet (Tier 1) ────────────────────────────────────
# API key заполнить в MIMIR Foundation. Placeholder предотвращает падение при старте.
quarkus.langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY:PLACEHOLDER}
quarkus.langchain4j.anthropic.chat-model.model-name=claude-sonnet-4-6
quarkus.langchain4j.anthropic.chat-model.max-tokens=2048
quarkus.langchain4j.anthropic.chat-model.temperature=0.1
quarkus.langchain4j.anthropic.timeout=30s

# ── Ollama (Tier 2 privacy — wired in MIMIR Tier2 sprint) ────────────────────
quarkus.langchain4j.ollama.base-url=${OLLAMA_URL:http://localhost:11434}
quarkus.langchain4j.ollama.chat-model.model-id=qwen2.5:14b

# ── Chat memory ───────────────────────────────────────────────────────────────
mimir.memory.max-messages=20

# ── Upstream service URLs ─────────────────────────────────────────────────────
mimir.anvil.url=${ANVIL_URL:http://localhost:9095}
mimir.shuttle.url=${SHUTTLE_URL:http://localhost:8080}
mimir.ygg.url=${YGG_URL:http://localhost:2480}
mimir.ygg.user=${YGG_USER:root}
mimir.ygg.password=${YGG_PASSWORD:playwithdata}

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.mimir".level=DEBUG
