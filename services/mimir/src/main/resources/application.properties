# ── Server ────────────────────────────────────────────────────────────────────
quarkus.analytics.disabled=true
quarkus.http.port=9094
quarkus.http.host=0.0.0.0
quarkus.application.name=mimir

# ── CORS — Chur proxy ─────────────────────────────────────────────────────────
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:13000}
quarkus.http.cors.methods=GET,POST,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,X-Seer-Role,X-Seer-Tenant-Alias

# ── LangChain4j — Active provider selection ──────────────────────────────────
# Quarkiverse 1.9.x: when multiple providers are on the classpath (openai/anthropic/ollama),
# 'quarkus.langchain4j.chat-model.provider' MUST be set explicitly.
# Default: openai → DeepSeek via OpenAI-compatible API.
# To switch to Anthropic: set QUARKUS_LANGCHAIN4J_CHAT_MODEL_PROVIDER=anthropic (+ ANTHROPIC_API_KEY).
quarkus.langchain4j.chat-model.provider=openai

# ── DeepSeek via OpenAI-compatible API ───────────────────────────────────────
quarkus.langchain4j.openai.base-url=https://api.deepseek.com/v1
quarkus.langchain4j.openai.api-key=${DEEPSEEK_API_KEY:PLACEHOLDER}
quarkus.langchain4j.openai.chat-model.model-name=deepseek-chat
quarkus.langchain4j.openai.chat-model.max-tokens=2048
quarkus.langchain4j.openai.chat-model.temperature=0.1
quarkus.langchain4j.openai.timeout=30s

# ── Anthropic Claude Sonnet (Tier 1 — opt-in via env or %prod profile) ───────
# To switch: set QUARKUS_LANGCHAIN4J_DEFAULT_CONFIG=anthropic + ANTHROPIC_API_KEY.
quarkus.langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY:PLACEHOLDER}
quarkus.langchain4j.anthropic.chat-model.model-name=claude-sonnet-4-6
quarkus.langchain4j.anthropic.chat-model.max-tokens=2048
quarkus.langchain4j.anthropic.chat-model.temperature=0.1
quarkus.langchain4j.anthropic.timeout=30s

# ── Ollama (Tier 2 privacy — wired in MIMIR Tier2 sprint) ────────────────────
quarkus.langchain4j.ollama.base-url=${OLLAMA_URL:http://localhost:11434}
quarkus.langchain4j.ollama.chat-model.model-id=qwen2.5:14b

# ── Chat memory (Quarkiverse synthetic ChatMemoryProvider) ───────────────────
# Quarkiverse generates a per-service ChatMemoryProvider via @RegisterAiService+@MemoryId.
# We do NOT produce our own — see MimirMemoryConfiguration for explanation.
quarkus.langchain4j.chat-memory.max-messages=20

# ── Model routing (ADR-MIMIR-001) ─────────────────────────────────────────────
# Active model when request.model is null. Override: MIMIR_DEFAULT_MODEL env var.
# Values: deepseek | anthropic | ollama
mimir.default-model=${MIMIR_DEFAULT_MODEL:deepseek}

# ── Upstream service URLs ─────────────────────────────────────────────────────
mimir.anvil.url=${ANVIL_URL:http://localhost:9095}
mimir.shuttle.url=${SHUTTLE_URL:http://localhost:8080}
mimir.ygg.url=${YGG_URL:http://localhost:2480}
mimir.ygg.user=${YGG_USER:root}
mimir.ygg.password=${YGG_PASSWORD:playwithdata}

# ── REST client URLs (MicroProfile Rest Client) ───────────────────────────────
quarkus.rest-client.arcadedb-client.url=${YGG_URL:http://localhost:2480}
quarkus.rest-client.heimdall-api.url=${HEIMDALL_URL:http://localhost:9093}
quarkus.rest-client.anvil-client.url=${ANVIL_URL:http://localhost:9095}
quarkus.rest-client.frigg-client.url=${FRIGG_URL:http://localhost:2481}

# ── Tenant routing (Q-MC1) ────────────────────────────────────────────────────
mimir.dbname.template=hound_%s
mimir.dbname.default=hound_default

# ── TIER2 MT-02 — Tier-3 demo cache fallback ─────────────────────────────────
# When true, MimirOrchestrator answers from cache/mimir_responses.json (skipping live model)
# whenever a question matches a fixture. Use on the demo stand without internet.
# When false (default), live model is tried first; cache is consulted on Tier-1 timeout/429/error.
mimir.demo-mode=${MIMIR_DEMO_MODE:false}

# ── TIER2 MT-06 — BYOK per-tenant LLM credentials (ADR-MIMIR-002) ─────────────
# AES-256-GCM master key (base64 of 32 raw bytes). Required when BYOK in use;
# absent or invalid → MIMIR_KEY_ENCRYPTION_KEY error on first encrypt/decrypt.
# Generate: head -c 32 /dev/urandom | base64
# Rotation: yearly. Rotation requires re-encrypting every TenantLlmConfig row.
# (Empty default keeps non-BYOK installations bootable; encryptor only fails on use.)
mimir.byok.cache.ttl-minutes=5
mimir.byok.cache.max-size=1000
mimir.byok.store.skip-init=${MIMIR_BYOK_SKIP_INIT:false}
mimir.frigg.tenants-db=${FRIGG_TENANTS_DB:tenant-config}

# Test profile — disable BYOK store init (no FRIGG running), use a stable test master key
%test.mimir.byok.store.skip-init=true
%test.MIMIR_KEY_ENCRYPTION_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

# Defensive log filter: redact `sk-…` / `Bearer …` from any log line (MT-06.3) —
# wired via @LoggingFilter on com.mimir.log.CredentialMaskingFilter; no extra
# property needed.

# ── Test profile — MimirService mocked via @InjectMock, no real LLM needed ───
# Dummy keys prevent LangChain4j extension from rejecting startup in @QuarkusTest.
%test.quarkus.langchain4j.chat-model.provider=openai
%test.quarkus.langchain4j.openai.api-key=test-key-not-real
%test.quarkus.langchain4j.openai.base-url=http://localhost:9999
%test.quarkus.langchain4j.anthropic.api-key=test-key-not-real
# REST client URLs in test — point to non-existent ports (mocked via WireMock или @InjectMock)
%test.quarkus.rest-client.arcadedb-client.url=http://localhost:9991
%test.quarkus.rest-client.heimdall-api.url=http://localhost:9992
%test.quarkus.rest-client.anvil-client.url=http://localhost:9993
%test.quarkus.rest-client.frigg-client.url=http://localhost:9994
# Suppress Jacoco file-wait timeout so Jacoco noise does not mask startup errors.
%test.quarkus.jacoco.report=false

# ── IT-debug profile — enables raw LLM request/response logging for validation report ──
# Activate via: ./gradlew :services:mimir:test --tests *IT* -Dquarkus.test.profile=it-debug
%it-debug.quarkus.langchain4j.openai.api-key=${DEEPSEEK_API_KEY:sk-placeholder}
%it-debug.quarkus.langchain4j.openai.base-url=https://api.deepseek.com/v1
%it-debug.quarkus.langchain4j.openai.log-requests=true
%it-debug.quarkus.langchain4j.openai.log-responses=true
%it-debug.quarkus.log.category."dev.langchain4j".level=DEBUG
%it-debug.quarkus.log.category."io.quarkiverse.langchain4j".level=DEBUG
%it-debug.quarkus.rest-client.arcadedb-client.url=http://localhost:9991
%it-debug.quarkus.rest-client.heimdall-api.url=http://localhost:9992
%it-debug.quarkus.rest-client.anvil-client.url=http://localhost:9993
%it-debug.quarkus.rest-client.frigg-client.url=http://localhost:9994
%it-debug.quarkus.jacoco.report=false

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.mimir".level=DEBUG
