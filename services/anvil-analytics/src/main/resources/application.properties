# ── Server ────────────────────────────────────────────────────────────────────
quarkus.analytics.disabled=true
quarkus.http.port=9096
quarkus.http.host=0.0.0.0
quarkus.application.name=anvil-analytics

# ── CORS ──────────────────────────────────────────────────────────────────────
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type

# ── YGG — ArcadeDB lineage graph (:2480) ──────────────────────────────────────
quarkus.rest-client.ygg-api.url=${YGG_URL:http://localhost:2480}
quarkus.rest-client.ygg-api.scope=Singleton
quarkus.rest-client.ygg-api.connection-ttl=30000

ygg.db=${YGG_DB:hound_default}
ygg.user=${YGG_USER:root}
ygg.password=${YGG_PASSWORD:playwithdata}

# ── Analytics job configuration ───────────────────────────────────────────────
# PageRank: hourly
analytics.pagerank.cron=${ANALYTICS_PAGERANK_CRON:0 0 * * * ?}
# WCC (weakly connected components): daily at 01:00
analytics.wcc.cron=${ANALYTICS_WCC_CRON:0 0 1 * * ?}
# HITS (hub + authority): daily at 02:00
analytics.hits.cron=${ANALYTICS_HITS_CRON:0 0 2 * * ?}
# Bridges + articulation points: weekly Sunday at 03:00
analytics.topology.cron=${ANALYTICS_TOPOLOGY_CRON:0 0 3 ? * SUN}
# SCC (strongly connected components): weekly Sunday at 04:00
analytics.scc.cron=${ANALYTICS_SCC_CRON:0 0 4 ? * SUN}
# Community assignment: daily at 00:30
analytics.community.cron=${ANALYTICS_COMMUNITY_CRON:0 30 0 * * ?}

# Slow-query threshold for Cypher analytics (HEIMDALL CYPHER_QUERY_SLOW)
analytics.slow.threshold.ms=${ANALYTICS_SLOW_THRESHOLD_MS:5000}

# ── Test overrides ────────────────────────────────────────────────────────────
%test.ygg.db=hound_test
%test.analytics.pagerank.cron=off
%test.analytics.wcc.cron=off
%test.analytics.hits.cron=off
%test.analytics.topology.cron=off
%test.analytics.scc.cron=off
%test.analytics.community.cron=off
